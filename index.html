function SolutionBox({q}){
  if(!q)return null;
  const Row=({step,children})=>(
    <div className="flex items-start gap-2 text-sm font-bold text-gray-700">
      <span className="shrink-0 bg-amber-100 text-amber-700 rounded-lg px-2 py-0.5 text-xs font-black">{step}</span>
      <span className="leading-relaxed">{children}</span>
    </div>
  );
  if(q.category==='math'){
    if(q.hasR){
      const prod=q.b*q.ansC;
      return(
        <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 fade-in">
          <div className="text-xs font-black text-amber-600 mb-3 tracking-wide">📖 풀이 과정</div>
          <div className="space-y-2">
            <Row step="1단계">{q.b} × {q.ansC} = {prod}</Row>
            <Row step="2단계">{q.a} - {prod} = {q.ansR} → 나머지</Row>
            <Row step="정답"><span className="text-green-700">{q.a} ÷ {q.b} = {q.ansC} ··· {q.ansR}</span></Row>
          </div>
        </div>
      );
    }else{
      const prod=q.b*q.ansC;
      return(
        <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 fade-in">
          <div className="text-xs font-black text-amber-600 mb-3 tracking-wide">📖 풀이 과정</div>
          <div className="space-y-2">
            <Row step="계산">{q.a} ÷ {q.b} = {q.ansC}</Row>
            <Row step="검산">{q.b} × {q.ansC} = {prod}</Row>
          </div>
        </div>
      );
    }
  }
  if(q.category==='div'){
    const divs=q.divisors||[];
    if(q.divQType==='count'){
      return(
        <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 fade-in">
          <div className="text-xs font-black text-amber-600 mb-3 tracking-wide">📖 풀이 과정</div>
          <div className="space-y-2">
            <Row step="약수 목록">{q.target}의 약수: {divs.join(', ')}</Row>
            <Row step="개수"><span className="text-green-700">모두 {divs.length}개</span></Row>
          </div>
        </div>
      );
    }else if(q.divQType==='notDiv'){
      return(
        <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 fade-in">
          <div className="text-xs font-black text-amber-600 mb-3 tracking-wide">📖 풀이 과정</div>
          <div className="space-y-2">
            <Row step="약수 목록">{q.target}의 약수: {divs.join(', ')}</Row>
            <Row step="판별"><span className="text-red-600">위 목록에 없는 수 → 약수가 아닌 것</span></Row>
          </div>
        </div>
      );
    }else{
      const pairs=[];
      const half=Math.ceil(divs.length/2);
      for(let i=0;i<half;i++){const a=divs[i],b=divs[divs.length-1-i];if(a<=b)pairs.push(`${a} × ${b} = ${q.target}`);}
      return(
        <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 fade-in">
          <div className="text-xs font-black text-amber-600 mb-3 tracking-wide">📖 풀이 과정</div>
          <div className="space-y-1">
            <div className="text-xs text-gray-400 font-bold mb-2">곱셈 짝으로 찾기</div>
            {pairs.map((p,i)=><div key={i} className="text-sm font-bold text-indigo-600">{p}</div>)}
            <div className="mt-2 text-sm font-bold text-green-700">약수: {divs.join(', ')}</div>
          </div>
        </div>
      );
    }
  }
  return <ExplanationBox q={q}/>;
}

            <div className="text-xs text-gray-400 font-bold mb-1">나머지</div>

  );
}

function PracticeSession({session,setSession,ver,rangeMin,rangeMax,divMin,divMax,userData,onUpdate,onBack}){
  const seenQKeysRef = React.useRef(new Set()); // 세션 내 출제된 문제 텍스트 추적
  const[q,setQ]=useState(()=>makeQ(ver,session.qNum,session.divCountIdxs,rangeMin,rangeMax,divMin,divMax,seenQKeysRef.current));
  const[ans,setAns]=useState({ansQ:'',ansR:'',ansDiv:'',ansCount:''});
  const[fb,setFb]=useState(null);
  const[selMC,setSelMC]=useState(null);
  const[mcOpts,setMcOpts]=useState([]);
  // phase에 'reflection'(성찰) 단계가 추가되었습니다.
  const[phase,setPhase]=useState('question'); 
  const[correctCount,setCorrectCount]=useState(0);
  const[wrongCount,setWrongCount]=useState(0);
  const[questions,setQuestions]=useState([]);
  const[startTime]=useState(Date.now());
  const[qStartTime,setQStartTime]=useState(Date.now());
  const[firstActionTime,setFirstActionTime]=useState(null); // 첫 입력 시각 추적
  const[showConfirm,setShowConfirm]=useState(false); // 제출 확인 모달
  const[activeField,setActiveField]=useState('Q');   // 숫자패드 활성 필드 ('Q'|'R')

  // 첫 입력 이벤트 핸들러 (one-at-a-time 형식이므로 진정한 망설임 시간 측정 가능)
  const handleFirstAction=()=>{
    if(firstActionTime===null)setFirstActionTime(Date.now());
  };

  useEffect(()=>{buildMCOpts()},[q]);
  const buildMCOpts=()=>{
    if(!q.isMC){setMcOpts([]);return}
    // exam5: 이미 choices 배열이 있는 모의고사 포맷
    if(q.category==='exam5'&&q.choices){
      const opts=q.choices.map((c,i)=>({text:c,isC:i===q.answer}));
      setMcOpts(opts);return;
    }
    let opts=[];
    if(q.category==='math'){
      const ansStr=q.hasR?`몫: ${q.ansC}, 나머지: ${q.ansR}`:`${q.ansC}`;
      opts.push({text:ansStr,isC:true});
      while(opts.length<4){const wQ=Math.max(1,q.ansC+randInt(-2,2)||1);const wR=q.hasR?Math.max(0,(q.ansR+randInt(-1,2))%q.b):0;const wStr=q.hasR?`몫: ${wQ}, 나머지: ${wR}`:`${wQ}`;if(!opts.some(o=>o.text===wStr))opts.push({text:wStr,isC:false})}
    }else{
      if(q.divQType==='count'||q.isCount){
        // 약수 개수 — ±1·±2 제외, ±3 이상 차이나는 오답만
        const correct=q.divisors.length;
        opts.push({text:`${correct}개`,isC:true});
        const usedNums=new Set([correct]);
        const pool=[];
        for(let d=3;d<=15;d++){if(correct-d>=1)pool.push(correct-d);pool.push(correct+d);}
        shuffle(pool).forEach(c=>{if(opts.length<4&&!usedNums.has(c)){usedNums.add(c);opts.push({text:`${c}개`,isC:false})}});
        let ext=16;while(opts.length<4){const c=correct+ext;if(!usedNums.has(c)){usedNums.add(c);opts.push({text:`${c}개`,isC:false})}ext++}
      }else if(q.divQType==='notDiv'){
        // 약수 아닌 것 — target+1 같은 뻔한 패턴 배제, 범위 안 비약수 선택
        const divSet=new Set(q.divisors);
        const cands=[];
        for(let n=2;n<q.target;n++){if(!divSet.has(n))cands.push(n);}
        // target/2 이하의 비약수 = 약수처럼 보여서 더 그럴듯한 오답
        const plausible=cands.filter(n=>n<=Math.floor(q.target/2)+1);
        const wrongNum=(plausible.length>0?shuffle(plausible):shuffle(cands))[0]||(q.target+2);
        const usedTexts=new Set([String(wrongNum)]);
        opts.push({text:String(wrongNum),isC:true});
        shuffle([...q.divisors]).forEach(d=>{const s=String(d);if(opts.length<4&&!usedTexts.has(s)){usedTexts.add(s);opts.push({text:s,isC:false})}});
      }else{
        // 약수 모두 — Set으로 중복 완전 차단, 뻔한 비약수(target±1) 삽입 금지
        const correctStr=q.divisors.join(', ');
        const usedFakes=new Set([correctStr]);
        opts.push({text:correctStr,isC:true});
        const divSet=new Set(q.divisors);
        // Fake 1: 중간 원소 제거
        if(q.divisors.length>=3){const f1=[...q.divisors];f1.splice(Math.floor(q.divisors.length/2),1);const s=f1.join(', ');if(!usedFakes.has(s)){usedFakes.add(s);opts.push({text:s,isC:false})}}
        // Fake 2: target/2 근처 비약수 삽입 (target±1 제외)
        let ins=Math.floor(q.target/2);
        while(divSet.has(ins)||Math.abs(ins-q.target)<=1||ins<=1)ins++;
        const f2=[...q.divisors,ins].sort((a,b)=>a-b);const s2=f2.join(', ');
        if(!usedFakes.has(s2)){usedFakes.add(s2);opts.push({text:s2,isC:false})}
        // Fake 3: 마지막 원소 제거
        if(q.divisors.length>=2){const f3=q.divisors.slice(0,-1);const s3=f3.join(', ');if(!usedFakes.has(s3)){usedFakes.add(s3);opts.push({text:s3,isC:false})}}
        // Fake 4: 다른 비약수 삽입 (ins와 다른 값)
        if(opts.length<4){let ins2=ins+1;while(divSet.has(ins2)||ins2===ins||Math.abs(ins2-q.target)<=1)ins2++;const f4=[...q.divisors,ins2].sort((a,b)=>a-b);const s4=f4.join(', ');if(!usedFakes.has(s4)){usedFakes.add(s4);opts.push({text:s4,isC:false})}}
      }
    }
    setMcOpts(shuffle(opts));
  };

  const check=()=>{
    let isOk=false;let uAns='',cAns='';
    if(q.isMC){
      if(selMC===null)return;
      isOk=mcOpts[selMC].isC;
      uAns=mcOpts[selMC].text;
      if(q.category==='exam5'){
        cAns=q.choices?.[q.answer]||'';
      } else {
        cAns=q.category==='math'?(q.hasR?`몫: ${q.ansC}, 나머지: ${q.ansR}`:`${q.ansC}`):(q.divQType==='count'||q.isCount?`${q.divisors.length}개`:q.divQType==='notDiv'?mcOpts[selMC].isC?mcOpts[selMC].text:'(약수 아닌 것)':q.divisors.join(', '));
      }
    } else if(q.category==='math'){
      if(q.hasR){const vQ=parseInt(ans.ansQ),vR=parseInt(ans.ansR);if(isNaN(vQ)||isNaN(vR))return;isOk=vQ===q.ansC&&vR===q.ansR;uAns=`몫: ${vQ}, 나머지: ${vR}`;cAns=`몫: ${q.ansC}, 나머지: ${q.ansR}`}
      else{const vQ=parseInt(ans.ansQ);if(isNaN(vQ))return;isOk=vQ===q.ansC;uAns=`${vQ}`;cAns=`${q.ansC}`}
    }else{
      if(q.isCount){const v=parseInt(ans.ansCount);if(isNaN(v))return;isOk=v===q.divisors.length;uAns=`${v}개`;cAns=`${q.divisors.length}개`}
      else{const raw=ans.ansDiv;if(!raw.trim())return;let arr=raw.split(',').map(v=>parseInt(v.trim())).filter(v=>!isNaN(v));arr=[...new Set(arr)].sort((a,b)=>a-b);isOk=arr.join(',')===q.divisors.join(',');uAns=arr.join(', ')||'(입력없음)';cAns=q.divisors.join(', ')}
    }
    const elapsed=Math.round((Date.now()-qStartTime)/1000);
    const firstActionMs=firstActionTime!=null?firstActionTime-qStartTime:null;
    
    // 🔥 학습분석용 메타데이터 저장 🔥
    // exam5: 모의고사 포맷이므로 q.meta가 이미 있음 (type: '도형과 기하' 등)
    const meta = q.category==='exam5'
      ? (q.meta || { category: 'exam5', type: q.topic||'검정고시', diff: '기초' })
      : { category: q.category, type: q.type || '연산', diff: q.diff || '기본' };
    const topicHash = getTopicHash({meta, topic: meta.type});
    const newQ={qTxt:q.qLogTxt||q.txt, uAns, cAns, isOk, timeSec:elapsed,
      firstClickMs:firstActionMs,  // DailyPractice: 진정한 망설임 시간 (one-at-a-time)
      revisionCount:null,          // 자유입력 형식 → 수정 횟수 미적용
      qTopicHash:topicHash,
      explanation:easyExplanation(q),
      meta};
    
    const newCorrect=correctCount+(isOk?1:0);const newWrong=wrongCount+(isOk?0:1);
    setCorrectCount(newCorrect);setWrongCount(newWrong);
    setQuestions(prev=>[...prev,newQ]);
    setFb({ok:isOk,msg:isOk?'✅ 정답입니다! 잘했어요!':`❌ 아쉬워요! 정답은 ${cAns} 입니다.`});
    setPhase('feedback');
    
    // 10문제 달성 시 바로 끝내지 않고 '감정 성찰(reflection)' 단계로 넘어감
    if(newCorrect>=10){
      setTimeout(()=>setPhase('reflection'), 1200);
    }
  };

  const finishLesson=async(feeling)=>{
    const totalSec=Math.round((Date.now()-startTime)/1000);
    const today=todayStr();const newActiveDates=[...new Set([...(userData.activeDates||[]),today])];
    const typeMap=['기본 나눗셈','심화 나눗셈','혼합 나눗셈','약수 구하기','약수(하드)','중졸 검정고시 연습','고졸 검정고시 연습'];
    
    // feeling(난이도 체감) 데이터 포함 저장
    const log={studentName:userData.name,date:today,time:timeStr(),type:typeMap[ver]||'나눗셈',score:`10 / ${questions.length}`,questions:questions,totalSec, feeling};
    const upd={...userData,totalLessons:(userData.totalLessons||0)+1,todayLessons:(userData.todayLessons||0)+1,todayCorrect:(userData.todayCorrect||0)+correctCount,todayWrong:(userData.todayWrong||0)+wrongCount,lastDate:today,activeDates:newActiveDates,logs:[log,...(userData.logs||[]).slice(0,49)]};
    
    await saveUser(upd);await saveLog(log);onUpdate(upd);
    setPhase('done');
  };

  const nextQ=()=>{
    if(phase==='done'||phase==='reflection'||correctCount>=10)return;
    const nNum=questions.length+1;
    // ── 세션 내 중복 방지: 이미 출제된 문제 키 수집 ──
    const seenKeys=new Set(questions.map(pq=>{
      // ver5(exam5): q.q 텍스트 기준, 나눗셈: "a÷b", 약수: target
      return pq.meta?.type==='exam5'||pq.category==='exam5' ? pq.qTxt?.slice(0,20)||pq.topic
           : pq.category==='div' ? String(pq.target||pq.qTxt)
           : `${pq.uAns}-${pq.cAns}`;
    }));
    let nQ=null;let tries=0;
    while(tries<8){
      nQ=makeQ(ver,nNum,session.divCountIdxs,rangeMin,rangeMax,divMin,divMax,seenQKeysRef.current);
      const newKey=nQ.category==='exam5'? (nQ.q?.slice(0,20)||nQ.topic)
                 : nQ.category==='div' ? String(nQ.target)
                 : nQ.qLogTxt||`${nQ.a}-${nQ.b}`;
      if(!seenKeys.has(newKey))break;
      tries++;
    }
    setQ(nQ);setAns({ansQ:'',ansR:'',ansDiv:'',ansCount:''});setSelMC(null);setFb(null);setPhase('question');setQStartTime(Date.now());setFirstActionTime(null);setShowConfirm(false);setActiveField('Q');
  };

  if(phase==='done')return<PracticeDone userData={userData} correct={correctCount} wrong={wrongCount} onAgain={()=>{setPhase('question');setCorrectCount(0);setWrongCount(0);setQuestions([]);const nQ=makeQ(ver,1,session.divCountIdxs,rangeMin,rangeMax,divMin,divMax);setQ(nQ);setAns({ansQ:'',ansR:'',ansDiv:'',ansCount:''});setSelMC(null);setFb(null);setQStartTime(Date.now());}} onHome={onBack}/>;

  // 🔥 감정 성찰 (메타인지) 화면 렌더링 🔥
  if(phase==='reflection') {
    return(
      <div className="p-4 flex flex-col items-center justify-center min-h-screen text-center pb-36 fade-in">
        <div className="text-7xl mb-6">🧠</div>
        <h2 className="text-2xl font-black text-gray-800 mb-2">10문제 달성 완료!</h2>
        <p className="text-gray-500 mb-8 font-bold text-lg">스스로 생각하기에<br/>오늘 푼 문제들은 어떠셨나요?</p>
        <div className="flex flex-col gap-4 w-full max-w-xs mx-auto">
          <button onClick={() => finishLesson('easy')} className="py-5 bg-green-100 text-green-700 rounded-3xl font-black text-xl shadow-sm active:scale-95 transition-all">쉬웠어요 😊</button>
          <button onClick={() => finishLesson('normal')} className="py-5 bg-blue-100 text-blue-700 rounded-3xl font-black text-xl shadow-sm active:scale-95 transition-all">적당했어요 😐</button>
          <button onClick={() => finishLesson('hard')} className="py-5 bg-red-100 text-red-700 rounded-3xl font-black text-xl shadow-sm active:scale-95 transition-all">어려웠어요 😥</button>
        </div>
      </div>
    );
  }

  const pct=(correctCount/10)*100;
  return(<div className="p-4 space-y-4 pb-36">
    <div className="flex items-center gap-3">
      <button onClick={onBack} className="w-12 h-12 rounded-2xl bg-white shadow flex items-center justify-center text-xl font-bold text-gray-500">◀</button>
      <div className="flex-1 h-3 bg-gray-200 rounded-full overflow-hidden"><div className="h-full bg-gradient-to-r from-indigo-500 to-blue-500 rounded-full transition-all duration-500" style={{width:`${pct}%`}}/></div>
      <div className="bg-indigo-100 text-indigo-700 font-black px-4 py-2 rounded-full text-base">✅ {correctCount}/10</div>
    </div>
    <div className={`bg-white rounded-3xl p-6 shadow-md flex flex-col items-center justify-center ${q.category==='exam5'?(q.graph?'':'min-h-48'):'min-h-40'}`}>
      {q.category==='exam5'
        ?<div className="inline-block bg-indigo-100 text-indigo-800 text-sm font-bold px-3 py-1 rounded-full mb-4">📚 {q.topic||q.meta?.type||'검정고시 영역 연습'}</div>
        :<div className="inline-block bg-yellow-100 text-yellow-800 text-sm font-bold px-3 py-1 rounded-full mb-4">{q.category==='div'?'약수 구하기':'나눗셈'}</div>
      }
      {q.category==='exam5'&&<div className="text-base font-bold text-gray-800 leading-relaxed text-left px-1">{q.q}</div>}
      {q.category==='exam5'&&q.graph&&<div className="flex justify-center mt-3 w-full"><GraphPreview q={q}/></div>}
      {q.category==='math'&&<div className="text-4xl font-black text-gray-800 tracking-wide">{q.a} ÷ {q.b} = ?</div>}
      {q.category==='div'&&<div className="text-3xl font-black text-gray-800 leading-relaxed">
        <span className="text-indigo-600">{q.target}</span> 의<br/>
        {q.divQType==='count'?'약수는 모두 몇 개?':q.divQType==='notDiv'?<span className="text-sm font-bold text-red-600 block mb-1">약수가 <u>아닌</u> 것은?</span>:<span className="text-sm font-bold text-blue-600 block mb-1">약수를 <u>모두</u> 쓴 것은?</span>}
      </div>}
    </div>
    {fb&&<div className={`rounded-2xl px-5 py-4 text-base font-bold flex items-center gap-3 fade-in ${fb.ok?'bg-green-50 text-green-700 border-2 border-green-300':'bg-red-50 text-red-700 border-2 border-red-300'}`}>{fb.msg}</div>}
    {fb&&<SolutionBox q={q}/>}
    {phase==='question'&&(<div className="space-y-3">
      {q.isMC?(
        <React.Fragment>
          {q.category==='exam5'
            ?<div className="flex flex-col gap-3">
              {mcOpts.map((opt,i)=>{
                let cls='border-gray-200 bg-white text-gray-700';
                if(selMC===i) cls='border-indigo-500 bg-indigo-50 text-indigo-700';
                return(<button key={i} onClick={()=>{if(phase==='question')setSelMC(i);}}

        </React.Fragment>
      ):(<div className="space-y-3">
        {q.category==='math'&&<NumPadInput
          q={q} ans={ans} setAns={setAns}

          handleFirstAction={handleFirstAction}

        {/* 약수 문제는 항상 사지선다 – 직접입력 없음 */}

    {phase==='feedback'&&correctCount<10&&<button onClick={nextQ} className="w-full py-5 bg-gradient-to-r from-green-500 to-emerald-600 text-white rounded-3xl text-xl font-black shadow-lg active:scale-95 transition-transform">다음 문제 →</button>}
    {/* ── 제출 확인 바텀시트 ── */}
    {showConfirm&&(

          <p className="text-center text-base font-black text-gray-800 leading-relaxed">
            {q.isMC
              ?<React.Fragment>「<span className="text-indigo-600">{selMC!==null?mcOpts[selMC]?.text:''}</span>」를 선택했습니다.</React.Fragment>
              :q.hasR
                ?<React.Fragment>몫 <span className="text-indigo-600 text-xl">{ans.ansQ}</span>, 나머지 <span className="text-indigo-600 text-xl">{ans.ansR}</span> 입력했습니다.</React.Fragment>

              제출
            </button>
          </div>
        </div>
      </div>
    )}
  </div>);
}

function GeometryLearn({sz, userData, onUpdate}){
  const[tab,setTab]=useState('rad');
  const[zoom,setZoom]=useState(1);
  const[panX,setPanX]=useState(0);
  const[panY,setPanY]=useState(0);
  const[fs,setFs]=useState(false); // fullscreen
  const contentRef=useRef(null);
  const[measuredW,setMeasuredW]=useState(0);

  /* ── 탐색 활동 계측 (체류 시간이 아닌 '상호작용 기반' 측정) ──
     · 체류 시간은 유휴/배경 노출을 포함해 학습 신호로 부적절하므로 사용하지 않음
     · 대신 ①실질 조작 시간(유휴 보정) ②상호작용 횟수 ③탐색한 개념 폭을 누적
     · 성취도가 아닌 '자기주도 탐색·호기심' 지표로 분리 수집 */
  const EXPLORE_IDLE_CAP_MS=60000;  // 상호작용 간격이 60초 미만일 때만 실질 활동으로 인정
  const xpRef=useRef({count:0,activeMs:0,lastTs:0,concepts:{}});
  const tabRef=useRef('rad');
  useEffect(()=>{tabRef.current=tab;},[tab]);
  const bumpInteract=useCallback(()=>{
    const x=xpRef.current; const now=Date.now();
    if(x.lastTs){const gap=now-x.lastTs; if(gap>0&&gap<EXPLORE_IDLE_CAP_MS)x.activeMs+=gap;}
    x.lastTs=now; x.count++;
    x.concepts[tabRef.current]=(x.concepts[tabRef.current]||0)+1;
  },[]);
  // 첫 진입 개념도 한 번 기록
  useEffect(()=>{xpRef.current.concepts['rad']=(xpRef.current.concepts['rad']||0);},[]);
  // 그래프 영역의 모든 직접 조작(점 드래그·슬라이더 등)을 버블링으로 포착
  useEffect(()=>{
    const el=contentRef.current; if(!el)return;
    const h=()=>bumpInteract();
    el.addEventListener('pointerdown',h,{passive:true});
    el.addEventListener('touchstart',h,{passive:true});
    return()=>{el.removeEventListener('pointerdown',h);el.removeEventListener('touchstart',h);};
  },[bumpInteract,fs]);
  // 탐험 종료 시(언마운트) 누적치를 사용자 데이터에 병합 저장
  useEffect(()=>()=>{
    const x=xpRef.current;
    if(!userData||userData.role==='admin')return;
    // 사소한 방문(상호작용 3회 미만 또는 실질 활동 8초 미만)은 기록하지 않음 → 노이즈 차단
    if(x.count<3||x.activeMs<8000)return;
    const prev=userData.geoExplore||{sessions:0,totalActiveSec:0,totalInteractions:0,concepts:{}};
    const mergedConcepts={...(prev.concepts||{})};
    Object.keys(x.concepts).forEach(k=>{mergedConcepts[k]=(mergedConcepts[k]||0)+x.concepts[k];});
    const geoExplore={
      sessions:(prev.sessions||0)+1,
      totalActiveSec:(prev.totalActiveSec||0)+Math.round(x.activeMs/1000),
      totalInteractions:(prev.totalInteractions||0)+x.count,
      concepts:mergedConcepts,
      updatedAt:Date.now()
    };
    const upd={...userData,geoExplore};
    try{
      db.collection('users').doc(upd.name).set({geoExplore},{merge:true});
      if(onUpdate)onUpdate(upd);
    }catch(e){/* 저장 실패는 조용히 무시 (탐색 보조 지표) */}
  },[userData,onUpdate]);

  useEffect(()=>{
    if(!contentRef.current)return;
    const ro=new ResizeObserver(e=>setMeasuredW(e[0].contentRect.width));
    ro.observe(contentRef.current);
    return()=>ro.disconnect();
  },[]);

  const Active=GEO_TABS.find(t=>t.k===tab)?.C;
  const baseSC=measuredW>0?Math.floor(Math.min(measuredW,sz.W)/13):sz.SC;
  const baseSz={SC:baseSC,W:baseSC*13,H:baseSC*13};
  const onPan=useCallback((px,py)=>{setPanX(px);setPanY(py)},[]);
  const onZoom=useCallback((nz,npx,npy)=>{setZoom(Math.max(0.5,Math.min(3,nz)));if(npx!==undefined)setPanX(Math.max(-12,Math.min(12,npx)));if(npy!==undefined)setPanY(Math.max(-12,Math.min(12,npy)))},[]);
  const zoomedSz=useMemo(()=>({W:baseSz.W,H:baseSz.H,SC:Math.round(baseSz.SC*zoom),panX,panY,zoom,onPan,onZoom}),[baseSz,zoom,panX,panY,onPan,onZoom]);

  const szLive=useRef({});
  szLive.current={SC:Math.round(baseSC*zoom),W:baseSz.W,H:baseSz.H,zoom,panX,panY};
  useEffect(()=>{
    const el=contentRef.current;if(!el)return;
    const onWheel=e=>{
      const svgEl=e.target.closest('svg');if(!svgEl)return;
      e.preventDefault();
      const{SC,W,H,zoom,panX,panY}=szLive.current;
      const r=svgEl.getBoundingClientRect();
      const mx=e.clientX-r.left,my=e.clientY-r.top;
      const midMX=(mx-W/2)/SC+panX,midMY=(H/2-my)/SC+panY;
      const factor=e.deltaY>0?1/1.12:1.12;
      const nz=Math.max(0.5,Math.min(3,zoom*factor));
      const sc=nz/zoom;
      onZoom(nz,Math.max(-12,Math.min(12,midMX+(panX-midMX)/sc)),Math.max(-12,Math.min(12,midMY+(panY-midMY)/sc)));
    };
    el.addEventListener('wheel',onWheel,{passive:false});
    return()=>el.removeEventListener('wheel',onWheel);
  },[onZoom]);

  const handleTab=k=>{setTab(k);setPanX(0);setPanY(0);bumpInteract();};
  const resetAll=()=>{setZoom(1);setPanX(0);setPanY(0);};
  const hasPan=panX!==0||panY!==0;

        <button onClick={resetAll} style={{background:'#374151',color:'#9ca3af',border:'none',borderRadius:8,padding:'4px 10px',fontWeight:700,fontSize:12,cursor:'pointer'}}>초기화</button>

        {Active&&<Active sz={zoomedSz}/>}

  return(<div className="flex flex-col flex-1 overflow-auto">
    <div className="tab-scroll bg-gray-50 border-b flex-shrink-0">
      <div className="flex px-1 min-w-max">{GEO_TABS.map(t=><button key={t.k} onClick={()=>handleTab(t.k)} className={`px-3 py-2.5 text-xs font-bold border-b-2 whitespace-nowrap ${tab===t.k?'border-blue-500 text-blue-600':'border-transparent text-gray-500'}`}>{t.lbl}</button>)}</div>
    </div>
    {/* ── 배율 조정 바: tab-scroll과 동일한 독립 가로 스크롤 컨테이너 ── */}
    <div className="tab-scroll bg-white border-b flex-shrink-0" style={{overflowX:'auto',overflowY:'hidden'}}>
      <div style={{display:'flex',alignItems:'center',gap:0,padding:'0',minWidth:'max-content',height:44}}>

        {/* 배율 스텝 버튼들 */}
        {[0.5,0.7,1.0,1.3,1.6,2.0,2.5,3.0].map(v=>(
          <button key={v} onClick={()=>setZoom(v)}
            style={{flexShrink:0,padding:'6px 12px',fontSize:12,fontWeight:700,borderBottom:`2px solid ${Math.abs(zoom-v)<0.03?'#6366f1':'transparent'}`,color:Math.abs(zoom-v)<0.03?'#6366f1':'#94a3b8',background:'none',whiteSpace:'nowrap',height:'100%',transition:'all 0.15s'}}>

/* ===== MOCK EXAM TAB ===== */
function MockExamTab({userData,onUpdate}){
  const[screen,setScreen]=useState('start');
  const[examLevel,setExamLevel]=useState(null);
  const[questions,setQuestions]=useState([]);
  const[sel,setSel]=useState({});
  const[isGraded,setIsGraded]=useState(false);
  const[saved,setSaved]=useState(false);
  const[startTime,setStartTime]=useState(null);
  const[mode,setMode]=useState('');
  // ── 행동 추적 (신규) ──
  const[firstClickTimes,setFirstClickTimes]=useState({}); // {qIdx: ms from startTime to first click}
  const[revisionCounts,setRevisionCounts]=useState({});   // {qIdx: number of answer changes after first}

  const HIGH_DOMAIN_GENS={'다항식 계산':genMockPoly,'방정식과 부등식':genMockEqInequal,'도형과 기하':genMockGeometry,'집합과 함수':genMockSetFunc,'확률과 통계':genMockProbStat};
  const DOMAIN_GENS=examLevel==='middle'?MID_DOMAIN_GENS:HIGH_DOMAIN_GENS;
  const DOMAINS=Object.keys(DOMAIN_GENS);

  const computeStats=(logs)=>{
    const s={};DOMAINS.forEach(d=>s[d]={c:0,t:0});
    (logs||[]).forEach(log=>{
      if(!log.questions)return;
      log.questions.forEach(q=>{
        const type=(q.meta?.type||log.type||'').toLowerCase();
        const cat=(q.meta?.category||'').toLowerCase();
        const exact=DOMAINS.find(d=>type.includes(d.toLowerCase()));
        if(exact){s[exact].t++;if(q.isOk)s[exact].c++;return;}
        if(examLevel==='middle')return;
        if(type.includes('다항식')||cat==='poly'||type.includes('나눗셈')||type.includes('나머지')||type.includes('인수분해')||type.includes('항등식'))
          {s['다항식 계산'].t++;if(q.isOk)s['다항식 계산'].c++;}
        else if(type.includes('방정식')||type.includes('부등식')||type.includes('스토리')||type.includes('문장제')||cat==='eq'||cat==='ineq')
          {s['방정식과 부등식'].t++;if(q.isOk)s['방정식과 부등식'].c++;}
        else if(type.includes('기하')||type.includes('도형')||cat==='geometry'||type.includes('대칭')||type.includes('거리')||type.includes('직선')||type.includes('내분'))
          {s['도형과 기하'].t++;if(q.isOk)s['도형과 기하'].c++;}
        else if(type.includes('함수')||type.includes('집합')||type.includes('명제')||cat==='set'||cat==='func')
          {s['집합과 함수'].t++;if(q.isOk)s['집합과 함수'].c++;}
        else if(type.includes('확률')||type.includes('통계')||type.includes('순열')||type.includes('조합')||cat==='div'||cat==='stat'||type.includes('약수')||type.includes('배수'))
          {s['확률과 통계'].t++;if(q.isOk)s['확률과 통계'].c++;}
      });
    });
    return s;
  };

  const startExam=(examMode)=>{
    setMode(examMode);
    const stats=computeStats(userData.logs||[]);
    const weakDomains=DOMAINS.filter(d=>stats[d].t===0||(stats[d].c/stats[d].t)<0.7);
    const safeGen=(gen)=>{try{const q=gen();return q||null;}catch(e){return null;}};
    let pool=[];
    if(examMode==='weak'){
      const targets=weakDomains.length>0?weakDomains:DOMAINS;
      for(let i=0;i<10;i++){
        const dom=i<7?targets[i%targets.length]:DOMAINS[i%DOMAINS.length];
        const q=safeGen(DOMAIN_GENS[dom]);if(q)pool.push(q);
      }
    }else{
      DOMAINS.forEach(dom=>{for(let j=0;j<2;j++){const q=safeGen(DOMAIN_GENS[dom]);if(q)pool.push(q);}});
      pool=shuffle(pool);
    }
    let safety=0;
    while(pool.length<10&&safety++<50){const q=safeGen(pick(Object.values(DOMAIN_GENS)));if(q)pool.push(q);}
    setQuestions(pool.slice(0,10));setSel({});setIsGraded(false);setSaved(false);setStartTime(Date.now());setScreen('exam');
    setFirstClickTimes({});setRevisionCounts({});
  };

  const saveResult=async(feeling)=>{
    if(saved||!userData)return;
    const totalSec=Math.round((Date.now()-startTime)/1000);
    const correctCount=questions.filter((q,i)=>sel[i]===q.answer).length;
    const qs=questions.map((q,i)=>{
      const fms=firstClickTimes[i]??null;
      return{
        qTxt:q.q.length>70?q.q.slice(0,70)+'…':q.q,
        uAns:sel[i]!==undefined?q.choices[sel[i]]:'미입력',
        cAns:q.choices[q.answer],
        isOk:sel[i]===q.answer,
        // timeSec: 리스트 형식에서는 firstClickMs 환산값 사용 (균등배분 오류 수정)
        timeSec:fms!=null?Math.round(fms/1000):null,
        firstClickMs:fms,            // 세션 시작~첫 선택 ms
        revisionCount:revisionCounts[i]??0,  // 첫 선택 후 변경 횟수

function StudentDashboard({userData,onLogout,onUpdate}){

  // ── 접속 heartbeat: 30초마다 Firestore onlineStatus 갱신 ──
  useEffect(()=>{
    if(userData.role==='admin')return;
    const updateOnline=()=>{
      db.collection('onlineStatus').doc(userData.name).set({
        name:userData.name,
        lastSeen:new Date(),
        ts:Date.now()
      }).catch(()=>{});
    };
    updateOnline();
    const hb=setInterval(updateOnline,30000);
    const clearOnline=()=>{
      db.collection('onlineStatus').doc(userData.name).delete().catch(()=>{});
    };
    window.addEventListener('beforeunload',clearOnline);
    return()=>{clearInterval(hb);clearOnline();window.removeEventListener('beforeunload',clearOnline);};
  },[userData.name,userData.role]);

  // 학생 본인의 피드백 불러오기 및 안읽음 알림 체크

    const fetchFb = async () => {

        const snap = await db.collection('feedback').where('studentName','==',userData.name).get();
        let arr = [];
        snap.forEach(d=>arr.push({id:d.id, ...d.data()}));
        arr.sort((a,b)=> {

          const timeB = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : new Date(b.createdAt).getTime();

        if(arr.some(f => !f.read)) setShowFbModal(true);

      <DarkToggle/>

    </header>
    <div className="flex-1 overflow-auto scroll-body">
      {tab==='home'&&<HomeTab userData={userData} onUpdate={onUpdate} onGoPractice={()=>setTab('practice')}/>}
      {tab==='practice'&&<DailyPracticeTab userData={userData} onUpdate={onUpdate}/>}
      {tab==='geometry'&&<GeometryTab userData={userData} onUpdate={onUpdate}/>}
      {tab==='exam'&&<MockExamTab userData={userData} onUpdate={onUpdate}/>}
      {/* 기록 탭으로 가져온 피드백 데이터를 넘겨줌 */}
      {tab==='history'&&<HistoryTab userData={userData} feedbacks={feedbacks}/>}
    </div>
    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg z-20 max-w-lg mx-auto">
      <div className="flex">{TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} className={`flex-1 flex flex-col items-center py-3 gap-1 transition-all ${tab===t.k?'text-indigo-600':'text-gray-400'}`}><span className="text-2xl">{t.icon}</span><span className="text-xs font-bold">{t.lbl}</span></button>)}</div>
      <div className="text-center text-[10px] text-gray-300 font-semibold pb-1 tracking-wide">Made by 소명 🎓</div>
    </nav>

    {/* 피드백 도착 알림 모달 */}
    {showFbModal && (
      <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div className="bg-white rounded-3xl p-6 shadow-2xl w-full max-w-sm max-h-[80vh] flex flex-col fade-in">
          <div className="text-center mb-4 flex-shrink-0">
            <div className="text-5xl mb-2">💌</div>
            <div className="text-xl font-black text-gray-800">선생님의 피드백 도착!</div>

                <div className="text-gray-800 font-bold text-base leading-relaxed">{fb.message}</div>

/* ===== TEACHER DASHBOARD ===== */

/* ── 객관적 학습 지표 분석 엔진 (v8 재설계) ──
   설계 원칙:
   - 출제자 주관 태그(getDiffWeight) 완전 폐기
   - 학생 행동 로그(firstClickMs, revisionCount, timeSec)에서 직접 추출
   - 크로스-학생 토픽 통계(qStats)로 상대적 난이도 측정
   - 데이터 없을 때 "데이터 부족" 명시 → 가짜 지표 표시 금지

   객관 지표 4축:
   1. 실질 참여 추정      - 유휴 추정 포함 세션 시간 분석 (estimateActiveTime)
   2. 망설임 패턴 분포    - firstClickMs 기반 행동 분류
   3. 답안 수정 패턴      - revisionCount 기반 행동 분류
   4. 영역 상대 성취도    - qStats(크로스-학생) 기반 동적 난이도 대비 성취

   + 시계열 모멘텀 (순수 정답률 추이, 객관)
*/

// ── 기본 집계 (주관 가중치 없이 순수 정답률) ──
function calcRawAccuracy(questions){
  if(!questions||questions.length===0)return null;
  const c=questions.filter(q=>q.isOk).length;
  return Math.round((c/questions.length)*100);
}

// ── 시계열 모멘텀 (순수 정답률 기반 - 객관적) ──
function detectMomentum(logs){
  const sessions=logs.slice(0,10)
    .map(l=>calcRawAccuracy(l.questions))
    .filter(v=>v!==null);
  if(sessions.length<3)return{trend:'insufficient',delta:0,sessions};
  const half=Math.floor(sessions.length/2);
  const avgRecent=sessions.slice(0,half).reduce((a,b)=>a+b,0)/half;
  const avgOlder=sessions.slice(half).reduce((a,b)=>a+b,0)/(sessions.length-half);
  const delta=Math.round(avgRecent-avgOlder);
  const trend=delta>=8?'rising':delta<=-8?'declining':'stable';
  return{trend,delta,sessions,avgRecent:Math.round(avgRecent),avgOlder:Math.round(avgOlder)};
}

// ── 망설임 패턴 분포 집계 ──
function buildHesitationProfile(logs){
  const base={impulsive:0,fluent:0,effortful:0,struggling:0,moderate:0,unknown:0};
  // DailyPractice(순차 1문항씩) vs ListFormat(기하/모의고사 동시 렌더)은 firstClickMs 해석이 다름
  const isListFormat=t=>t?.includes('모의고사')||t?.includes('기하:')||t?.includes('약점');

  const seq={...base};let seqTotal=0;  // DailyPractice: 진짜 망설임 시간
  const lst={...base};let lstTotal=0;  // ListFormat: 세션 내 참여 타이밍

  logs.slice(0,8).forEach(l=>{
    const isList=isListFormat(l.type);
    if(!l.questions)return;
    l.questions.forEach(q=>{
      const cls=classifyHesitation(q.firstClickMs,q.isOk);
      if(isList){lst[cls]=(lst[cls]||0)+1;lstTotal++;}
      else{seq[cls]=(seq[cls]||0)+1;seqTotal++;}
    });
  });
  return{
    seq:{counts:seq,total:seqTotal,hasData:seqTotal>0&&seq.unknown<seqTotal},
    lst:{counts:lst,total:lstTotal,hasData:lstTotal>0&&lst.unknown<lstTotal},
  };
}

// ── 답안 수정 패턴 분포 집계 (ListFormat 전용: DailyPractice는 revisionCount 미수집) ──
function buildRevisionProfile(logs){
  const counts={fixated:0,confident:0,uncertain_capable:0,searching:0,reconsidered:0};
  let total=0;
  const isListFormat=t=>t?.includes('모의고사')||t?.includes('기하:')||t?.includes('약점');

  logs.slice(0,8).forEach(l=>{
    if(!isListFormat(l.type))return; // DailyPractice 명시적 제외
    if(!l.questions)return;
    l.questions.forEach(q=>{
      if(q.revisionCount===null||q.revisionCount===undefined)return; // 구버전 로그 무시
      const cls=classifyRevision(q.revisionCount,q.isOk);
      counts[cls]=(counts[cls]||0)+1;
      total++;
    });
  });
  return{counts,total,hasData:total>0};
}

// ── 세션별 참여 시간 집계 ──
function buildActiveTimeSummary(logs){
  let totalActive=0,totalIdle=0,flaggedSessions=0;
  const recentLogs=logs.slice(0,6);
  recentLogs.forEach(l=>{
    if(!l.totalSec)return;
    const qCount=l.questions?.length||10;
    const{activeSec,idleSec,flagged}=estimateActiveTime(l.totalSec,qCount);
    totalActive+=activeSec;
    totalIdle+=idleSec;
    if(flagged)flaggedSessions++;
  });
  return{
    totalActive,totalIdle,flaggedSessions,
    sessionCount:recentLogs.filter(l=>l.totalSec).length,
    avgActiveMin:recentLogs.length>0?Math.round(totalActive/Math.max(recentLogs.filter(l=>l.totalSec).length,1)/60):0
  };
}

/* ── 자기주도 탐색 요약 (그래프 탐험 상호작용 기반) ──
   체류 시간 대신 상호작용 횟수·실질 조작 시간·탐색 개념 폭을 집계.
   '성취도'가 아닌 '탐색 참여' 지표이며, 동일 개념 퀴즈 정답률과 연계 해석을 위한
   conceptLink를 함께 산출한다(탐색이 실제 실력으로 이어졌는지 확인하는 용도). */
const GEO_CONCEPT_LABELS={rad:'무리함수',rat:'유리함수',qua:'이차함수',dis:'점↔직선',cir:'원',sym:'대칭이동'};
function buildExploreSummary(student){
  const x=student.geoExplore;
  if(!x||!x.sessions)return{has:false};
  const conceptsObj=x.concepts||{};
  const breadth=Object.keys(conceptsObj).filter(k=>conceptsObj[k]>0).length; // 탐색한 개념 수(0~6)
  const activeMin=Math.round((x.totalActiveSec||0)/60*10)/10;
  const perSession=x.sessions>0?Math.round((x.totalInteractions||0)/x.sessions):0;

  // 탐색-성취 연계: 많이 탐색한 개념의 기하 퀴즈 정답률을 매칭
  const logs=student.logs||[];
  const quizByConcept={}; // 개념라벨 → {c,t}
  logs.forEach(l=>{
    (l.questions||[]).forEach(q=>{
      const t=q.meta?.type; if(!t)return;
      if(!quizByConcept[t])quizByConcept[t]={c:0,t:0};
      quizByConcept[t].t++; if(q.isOk)quizByConcept[t].c++;
    });
  });
  const conceptLink=Object.keys(conceptsObj)
    .filter(k=>conceptsObj[k]>0)
    .map(k=>{
      const lbl=GEO_CONCEPT_LABELS[k]||k;
      const qz=quizByConcept[lbl];
      return{concept:lbl,explores:conceptsObj[k],quizRate:qz&&qz.t>0?Math.round((qz.c/qz.t)*100):null,quizN:qz?qz.t:0};
    })
    .sort((a,b)=>b.explores-a.explores);

  return{has:true,sessions:x.sessions,activeMin,totalInteractions:x.totalInteractions||0,perSession,breadth,conceptLink};
}

// ── 크로스-학생 qStats 로드 (비동기, 교사 대시보드용) ──
async function fetchQStatsForLogs(logs){
  const hashes=new Set();
  logs.slice(0,8).forEach(l=>{
    if(!l.questions)return;
    l.questions.forEach(q=>{if(q.qTopicHash)hashes.add(q.qTopicHash);});
  });
  if(hashes.size===0)return{};
  try{
    const snap=await db.collection('qStats').get();
    const map={};
    snap.forEach(d=>{if(hashes.has(d.id))map[d.id]=d.data();});
    return map;
  }catch(e){return{};}
}

// ── 영역 상대 성취도 (qStats 기반) ──
function buildRelativeMastery(logs,qStats){
  const topicMap={};
  logs.slice(0,8).forEach(l=>{
    if(!l.questions)return;
    l.questions.forEach(q=>{
      const h=q.qTopicHash;
      if(!h)return;
      const topic=q.meta?.type||'기타';
      if(!topicMap[h])topicMap[h]={topic,myTotal:0,myCorrect:0,allTotal:0,allCorrect:0};
      topicMap[h].myTotal++;
      if(q.isOk)topicMap[h].myCorrect++;
      if(qStats[h]){
        topicMap[h].allTotal=qStats[h].total;
        topicMap[h].allCorrect=qStats[h].correct;
      }
    });
  });
  return Object.entries(topicMap)
    .filter(([,v])=>v.myTotal>=2)
    .map(([hash,v])=>{
      const myRate=Math.round((v.myCorrect/v.myTotal)*100);
      const allRate=v.allTotal>=5?Math.round((v.allCorrect/v.allTotal)*100):null; // N<5 미신뢰
      const gap=allRate!=null?myRate-allRate:null;
      return{hash,topic:v.topic,myRate,allRate,gap,myTotal:v.myTotal,allTotal:v.allTotal};
    })
    .sort((a,b)=>a.myRate-b.myRate);
}

// ── 신호등 분류 (순수 정답률 기반) ──
function analyzeStudent(sData){
  let daysInactive=999;
  if(sData.lastDate){
    const today=new Date();today.setHours(0,0,0,0);
    const last=new Date(sData.lastDate);last.setHours(0,0,0,0);
    daysInactive=Math.floor((today-last)/(1000*60*60*24));
  }
  let recentAcc=100;
  const logs=sData.logs||[];
  if(logs.length>0){
    const recentQs=logs.slice(0,3).flatMap(l=>l.questions||[]);
    if(recentQs.length>0)recentAcc=Math.round((recentQs.filter(q=>q.isOk).length/recentQs.length)*100);
  }
  let color='light-grn',icon='🟢',text='순항 중';
  if(daysInactive>=5||(recentAcc>0&&recentAcc<40)){color='light-red';icon='🔴';text='집중 케어 필요';}
  else if(daysInactive>=3||(recentAcc>=40&&recentAcc<70)){color='light-yel';icon='🟡';text='격려 필요';}
  return{daysInactive,recentAcc,status:{color,icon,text}};
}
const daysText=d=>d===0?'오늘':d===1?'어제':d===999?'기록없음':`${d}일 전`;

          const VW=320, VH=80, PL=28, PR=12, PT=10, PB=18;
          const W=VW-PL-PR, H=VH-PT-PB;
          const n=chartData.length;
          const xOf=i=>PL + (n===1?W/2:i*(W/(n-1)));
          const yOf=v=>PT + H*(1 - v/100);
          const pts=chartData.map((d,i)=>`${xOf(i)},${yOf(d.acc)}`).join(' ');
          return(
            <svg viewBox={`0 0 ${VW} ${VH}`} width="100%" height="90" style={{display:'block'}}>
              <defs>
                <linearGradient id="cGrad" x1="0" x2="0" y1="0" y2="1">
                  <stop offset="0%" stopColor="#6366f1" stopOpacity="0.2"/>
                  <stop offset="100%" stopColor="#6366f1" stopOpacity="0"/>
                </linearGradient>
              </defs>
              {/* 70% 기준선 */}
              <line x1={PL} y1={yOf(70)} x2={VW-PR} y2={yOf(70)} stroke="#e0e7ff" strokeWidth="1" strokeDasharray="4,3"/>
              <text x={PL-3} y={yOf(70)+3} fontSize="7" fill="#c7d2fe" textAnchor="end">70</text>
              {/* 0% / 100% 보조 레이블 */}
              <text x={PL-3} y={PT+4} fontSize="7" fill="#e5e7eb" textAnchor="end">100</text>
              <text x={PL-3} y={PT+H+4} fontSize="7" fill="#e5e7eb" textAnchor="end">0</text>
              {/* 면적 */}
              <polygon
                points={`${xOf(0)},${PT+H} ${pts} ${xOf(n-1)},${PT+H}`}
                fill="url(#cGrad)"
              />
              {/* 연결선 */}
              <polyline points={pts} fill="none" stroke="#6366f1" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
              {/* 데이터 포인트 */}
              {chartData.map((d,i)=>{
                const x=xOf(i), y=yOf(d.acc);
                const isFirst=i===0, isLast=i===n-1;
                return(
                  <g key={i}>
                    <circle cx={x} cy={y} r={isLast||isFirst?4:2.5}

              <text x={xOf(n-1)} y={VH-3} textAnchor="middle" fontSize="7" fill="#d1d5db">{chartData[n-1].date?.slice(5)}</text>
            </svg>
          );
        })() : <div className="text-xs text-gray-400 p-4 text-center pb-4">최소 2회 이상 기록이 필요합니다.</div>}

              <div className="p-3 space-y-2 bg-gray-50">
                {log.questions.map((q,j)=>{
                  const hCls=q.firstClickMs!=null?HESI_CFG[classifyHesitation(q.firstClickMs,q.isOk)]?.cls:'';
                  const rCls=q.revisionCount!=null?REV_CFG[classifyRevision(q.revisionCount,q.isOk)]?.cls:'';
                  return(
                    <div key={j} className={`rounded-xl p-3 text-xs border ${q.isOk?'bg-white border-gray-200':'bg-red-50 border-red-200'}`}>
                      <div className="flex gap-2 mb-1">
                        <span className="font-black text-gray-500">Q{j+1}.</span>
                        <span className="font-bold text-gray-800 flex-1 leading-relaxed">{q.qTxt}</span>
                        <span className={`font-black text-sm flex-shrink-0 ${q.isOk?'text-green-500':'text-red-500'}`}>{q.isOk?'O':'X'}</span>
                      </div>
                      {/* 행동 지표 뱃지 */}
                      <div className="flex items-center gap-1.5 pl-6 flex-wrap mt-1">
                        {q.meta&&<span className="text-[10px] text-indigo-400 font-bold bg-indigo-50 px-1.5 py-0.5 rounded-full">{q.meta.type}</span>}
                        {q.firstClickMs!=null&&(
                          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full border ${hCls}`}>
                            🕐 {Math.round(q.firstClickMs/1000)}s
                          </span>
                        )}
                        {q.revisionCount!=null&&q.revisionCount>0&&(
                          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full border ${rCls}`}>
                            ↩ {q.revisionCount}회 수정
                          </span>
                        )}
                        {q.timeSec!=null&&q.timeSec>0&&!q.firstClickMs&&(
                          <span className="text-[10px] text-gray-400 font-bold">⏱️{q.timeSec}초</span>
                        )}
                      </div>
                      {!q.isOk&&<div className="mt-1.5 pl-6 text-gray-500">내 답: {q.uAns} → <span className="text-red-600 font-bold">{q.cAns}</span></div>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>)}
  </div>);
}

function WorksheetTab(){
  const[wsType,setWsType]=useState('div');
  const[title,setTitle]=useState('');
  const[count,setCount]=useState(20);
  const[gcdMin,setGcdMin]=useState(12); const[gcdMax,setGcdMax]=useState(50);
  const[lcmMin,setLcmMin]=useState(2); const[lcmMax,setLcmMax]=useState(9);
  const[storyCounts,setStoryCounts]=useState({low:5, mid:3, high:2});
  const[opRatios,setOpRatios]=useState({add:25, sub:25, mul:25, div:25});
  const[wsList,setWsList]=useState([]);const[loading,setLoading]=useState(false);const[toast,setToast]=useState('');
  
  // 이름 수정 전용 상태
  const[editingWsId, setEditingWsId] = useState(null);
  const[editTitle, setEditTitle] = useState('');

  // 모의고사 문제지 전용 상태
  const[examSheet,setExamSheet]=useState(null); // 생성된 문제지 미리보기
  const[examMode,setExamMode]=useState('random'); // 'random' | 'weak'
  const[targetStudent,setTargetStudent]=useState(''); // 취약점 분석 대상 학생

  // 채점(Grading) 전용 상태
  const[gradeModal, setGradeModal] = useState(null);
  const[studentList, setStudentList] = useState([]);
  const[selStudent, setSelStudent] = useState('');
  const[grades, setGrades] = useState({});

  const TYPE_DESC={div:'세 자리 수 ÷ 두 자리 수 (가로셈, 나머지 있음)',gcd:'두 수의 약수, 공약수, 최대공약수 구하기',lcm:'두 수의 배수 7개씩, 공배수, 최소공배수 구하기',story:'초3~초4 맞춤형 스토리텔링 문장제 문제',mock_middle:'2021~2026 중졸 검정고시 최근 핵심 유형 변형 (10문항 사지선다)',mock_high:'2021~2026 고졸 검정고시 최근 핵심 유형 변형 (10문항 사지선다)',geo:'기하학 6파트 (무리/유리/이차함수·거리·원·대칭이동) 사지선다 문제'};

  // 영역별 정답률 계산 (학생 로그 기반)
  const HIGH_DOMAIN_GENS_T={'다항식 계산':genMockPoly,'방정식과 부등식':genMockEqInequal,'도형과 기하':genMockGeometry,'집합과 함수':genMockSetFunc,'확률과 통계':genMockProbStat};
  const DOMAIN_GENS_T=wsType==='mock_middle'?MID_DOMAIN_GENS:HIGH_DOMAIN_GENS_T;
  const DOMAINS_T=Object.keys(DOMAIN_GENS_T);
  const computeStatsT=(logs)=>{
    const s={};DOMAINS_T.forEach(d=>s[d]={c:0,t:0});
    (logs||[]).forEach(log=>{
      if(!log.questions)return;
      log.questions.forEach(q=>{
        const type=(q.meta?.type||log.type||'').toLowerCase();
        const cat=(q.meta?.category||'').toLowerCase();
        const exact=DOMAINS_T.find(d=>type.includes(d.toLowerCase()));
        if(exact){s[exact].t++;if(q.isOk)s[exact].c++;return;}
        if(wsType==='mock_middle')return;
        if(type.includes('다항식')||cat==='poly'||type.includes('항등식')||type.includes('인수분해')||type.includes('나머지'))
          {s['다항식 계산'].t++;if(q.isOk)s['다항식 계산'].c++;}
        else if(type.includes('방정식')||type.includes('부등식')||cat==='eq'||cat==='ineq')
          {s['방정식과 부등식'].t++;if(q.isOk)s['방정식과 부등식'].c++;}
        else if(type.includes('기하')||type.includes('도형')||cat==='geometry')
          {s['도형과 기하'].t++;if(q.isOk)s['도형과 기하'].c++;}
        else if(type.includes('함수')||type.includes('집합')||type.includes('명제')||cat==='set'||cat==='func')
          {s['집합과 함수'].t++;if(q.isOk)s['집합과 함수'].c++;}
        else if(type.includes('확률')||type.includes('순열')||type.includes('조합')||cat==='stat')
          {s['확률과 통계'].t++;if(q.isOk)s['확률과 통계'].c++;}
      });
    });
    return s;
  };

  // 모의고사 문제지 생성
  const createExamSheet=()=>{
    const safeGen=(gen)=>{try{const q=gen();return q||null;}catch(e){return null;}};
    let pool=[];
    if(examMode==='weak'&&targetStudent){
      const stu=studentList.find(s=>s.name===targetStudent);
      const stats=stu?computeStatsT(stu.logs||[]):{};
      const weakDomains=DOMAINS_T.filter(d=>!stats[d]||stats[d].t===0||(stats[d].c/stats[d].t)<0.7);
      const targets=weakDomains.length>0?weakDomains:DOMAINS_T;
      // ── 취약점 모드 중복 방지: 토픽 + 문제 텍스트 기준 ──
      const seenQ=new Set();
      let safety=0;
      while(pool.length<10&&safety<60){
        safety++;
        const dom=targets[pool.length%targets.length];
        const q=safeGen(DOMAIN_GENS_T[dom]);
        if(q){
          const qKey=`${q.topic}::${q.q?.slice(0,30)||''}`;
          if(!seenQ.has(qKey)){seenQ.add(qKey);pool.push(q);}
        }
      }
    }else{
      // ── 랜덤 모드: 토픽 중복 방지 + 문제 텍스트 중복 방지 ──
      const usedTopics=new Set();
      const usedQTexts=new Set();
      DOMAINS_T.forEach(dom=>{
        let added=0,retries=0;
        while(added<2&&retries<15){
          const q=safeGen(DOMAIN_GENS_T[dom]);
          if(q){
            const qKey=`${q.topic}::${q.q?.slice(0,30)||''}`;
            const topicOk=!usedTopics.has(q.topic);
            const textOk=!usedQTexts.has(qKey);
            if(topicOk&&textOk){
              usedTopics.add(q.topic);usedQTexts.add(qKey);pool.push(q);added++;
            } else if(retries>=13&&textOk){
              // 토픽 중복은 허용하되 문제 텍스트 중복은 끝까지 방지
              usedQTexts.add(qKey);pool.push(q);added++;
            }
          }
          retries++;
        }
      });
      pool=shuffle(pool);
    }
    let safety=0;
    const usedTopicsAll=new Set(pool.map(q=>q.topic));
    const usedQAll=new Set(pool.map(q=>`${q.topic}::${q.q?.slice(0,30)||''}`));
    while(pool.length<10&&safety++<30){
      const q=safeGen(pick(Object.values(DOMAIN_GENS_T)));
      if(q){
        const qKey=`${q.topic}::${q.q?.slice(0,30)||''}`;
        if(!usedQAll.has(qKey)){usedTopicsAll.add(q.topic);usedQAll.add(qKey);pool.push(q);}
        else if(safety>20){usedQAll.add(qKey);pool.push(q);} // 최후 수단
      }
    }
    const level=wsType==='mock_middle'?'중졸':'고졸';
    const t=title.trim()||`${level} 검정고시 모의고사 (${todayStr()})`;
    const mode=examMode==='weak'&&targetStudent?`취약점 공략 - ${targetStudent} 학생`:'랜덤 혼합';
    setExamSheet({title:t,mode,level,wsType,questions:pool.slice(0,10)});
    setExamSaved(false);
  };

  // 모의고사 문제지 인쇄 (브라우저 프린트)
  const printExamSheet=(showAns)=>{
    if(!examSheet)return;
    const ORD=['①','②','③','④'];
    let html=`<html><head><style>
      body{font-family:'Noto Sans KR',sans-serif;padding:32px;color:#111;}
      h1{text-align:center;font-size:22px;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:6px;}
      .meta{text-align:center;font-size:12px;color:#666;margin-bottom:24px;}
      .q{margin-bottom:22px;page-break-inside:avoid;}
      .qnum{font-weight:900;color:#4338ca;margin-right:6px;}
      .qtag{font-size:11px;background:#eef2ff;color:#4338ca;padding:2px 8px;border-radius:20px;margin-left:6px;font-weight:700;}
      .choices{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;margin-left:16px;}
      .choice{font-size:13px;padding:4px 0;}
      .ans{margin-top:6px;margin-left:16px;font-size:12px;color:#dc2626;font-weight:700;display:${showAns?'block':'none'};}
      .exp{margin-top:6px;margin-left:16px;padding:8px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:11px;line-height:1.55;color:#78350f;display:${showAns?'block':'none'};}
      @media print{body{padding:16px;} .q{margin-bottom:16px;}}
    </style></head><body>
    <h1>${examSheet.title}</h1>
    <div class="meta">${examSheet.level||'고졸'} · 출제 방식: ${examSheet.mode} · 총 10문항 · 검정고시 기출 변형</div>`;
    examSheet.questions.forEach((q,i)=>{
      html+=`<div class="q">
        <div><span class="qnum">${i+1}.</span>${q.q}<span class="qtag">${q.topic}</span></div>
        <div class="choices">${q.choices.map((c,j)=>`<div class="choice">${ORD[j]} ${c}</div>`).join('')}</div>
        <div class="ans">정답: ${ORD[q.answer]} ${q.choices[q.answer]}</div>
        <div class="exp"><b>쉬운 해설:</b> ${easyExplanation(q)}</div>
      </div>`;
    });
    html+=`</body></html>`;
    const w=window.open('','_blank','width=800,height=900');
    w.document.write(html);w.document.close();
    setTimeout(()=>w.print(),400);
  };

  // 모의고사 문제지 Firestore 저장
  const[examSaved,setExamSaved]=useState(false);
  const saveExamSheet=async()=>{
    if(!examSheet||examSaved)return;
    try{
      const ws={title:examSheet.title,wsType:examSheet.wsType||'mock_high',level:examSheet.level||'고졸',mode:examSheet.mode,questions:examSheet.questions,createdAt:new Date()};
      await db.collection('worksheets').add(ws);
      setExamSaved(true);
      showToast('✅ 저장된 문제지에 추가되었습니다!');
      loadWsList();
    }catch(e){showToast('❌ 저장 실패. 인터넷을 확인하세요.');}
  };

  useEffect(()=>{
    db.collection('users').where('role','==','student').get().then(snap => {
       const arr = []; snap.forEach(d => arr.push(d.data())); setStudentList(arr);
    });
    loadWsList(); // 학습지 탭 첫 진입 시 문제집 폴더 자동 로딩(새로고침 불필요)
  },[]);
  
  const loadWsList=async()=>{try{const snap=await db.collection('worksheets').orderBy('createdAt','desc').limit(30).get();const arr=[];snap.forEach(d=>arr.push({id:d.id,...d.data()}));setWsList(arr)}catch(e){}};
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),2500)};

  const handleRatioChange = (op, val) => {
    let newVal = Math.max(0, parseInt(val) || 0);
    setOpRatios(prev => ({ ...prev, [op]: newVal }));
  };

  const create=async()=>{
    if (wsType === 'story') {
      const totalRatio = opRatios.add + opRatios.sub + opRatios.mul + opRatios.div;
      if (totalRatio !== 100) { showToast(`❌ 비율의 합이 100%가 되어야 합니다! (현재: ${totalRatio}%)`); return; }
    }
    if(wsType.startsWith('mock_')||wsType==='geo'){showToast('먼저 [생성 →] 버튼으로 문제를 만든 후 저장하세요.');setLoading(false);return;}
    setLoading(true);try{
      let qs=[];
      if (wsType === 'story') qs = generateStoryWorksheet(storyCounts, opRatios);
      else {
        // ── 학습지 중복 방지: 같은 (a,b) 쌍이 나오지 않도록 ──
        const seenPairs = new Set();
        let attempts = 0;
        const MAX_ATTEMPTS = count * 20;
        while(qs.length < count && attempts < MAX_ATTEMPTS){
          attempts++;
          let q;
          if(wsType==='gcd')       q = genGCDQuestion(gcdMin, gcdMax);
          else if(wsType==='lcm')  q = genLCMQuestion(lcmMin, lcmMax);
          else                     q = generate3By2Div();
          // 키: a와 b의 조합 (순서 무관)
          const key = wsType==='div' ? `${q.a}-${q.b}` : `${Math.min(q.a,q.b)}-${Math.max(q.a,q.b)}`;
          if(!seenPairs.has(key)){
            seenPairs.add(key);
            qs.push(q);
          }
        }
        // fallback: 중복 허용하여 나머지 채우기
        while(qs.length < count){
          if(wsType==='gcd')       qs.push(genGCDQuestion(gcdMin, gcdMax));
          else if(wsType==='lcm')  qs.push(genLCMQuestion(lcmMin, lcmMax));
          else                     qs.push(generate3By2Div());
        }
      }
      const ws={title:title.trim()||`${todayStr()} 학습지`,wsType,questions:qs,createdAt:new Date()};
      await db.collection('worksheets').add(ws);setTitle('');showToast('✅ 문제지 생성 완료!');loadWsList();
    }catch(e){showToast('❌ 생성 실패. 인터넷을 확인하세요.')}setLoading(false);
  };
  
const del=async(id)=>{if(!confirm('이 문제지를 삭제하시겠습니까?'))return;try{await db.collection('worksheets').doc(id).delete();showToast('🗑️ 삭제되었습니다.');loadWsList()}catch(e){}};
  
  const renameWs = async (id) => {
    if(!editTitle.trim()) { setEditingWsId(null); return; }
    try {
      await db.collection('worksheets').doc(id).update({title: editTitle.trim()});
      showToast('✅ 이름이 변경되었습니다.');
      setEditingWsId(null);
      loadWsList();
    } catch(e) { showToast('❌ 변경 실패. 인터넷을 확인하세요.'); }
  };

  // ── 오프라인 학습지 채점 제출 함수 ──
  const submitGrades = async () => {
    if(!selStudent) { alert('채점할 학생을 먼저 선택해주세요!'); return; }
    const targetStudent = studentList.find(s => s.name === selStudent);
    if(!targetStudent) return;
    
    // 문제 포맷을 로그 포맷으로 변환
    // 채점 완료 시 gradedCount 업데이트
    try{
      const wsRef=db.collection('worksheets').doc(gradeModal.id);
      await wsRef.update({gradedCount:(gradeModal.gradedCount||0)+1});
    }catch(e){}
    const qs = gradeModal.questions.map((q, i) => {
       const isStory = gradeModal.wsType === 'story';
       let qTxt = isStory ? q.txt : (q.type==='gcd' ? `${q.a}와 ${q.b} 최대공약수` : (q.type==='lcm' ? `${q.a}와 ${q.b} 최소공배수` : `${q.a} ÷ ${q.b}`));
       let cAns = isStory ? q.ans : (q.type==='gcd' ? q.gcdVal : (q.type==='lcm' ? q.lcmVal : `몫 ${q.q}, 나머지 ${q.r}`));
       let isOk = !!grades[i]; // 체크했으면 true, 아니면 false
       return {
          qTxt, 
           uAns: isOk ? '정답' : '오답 (선생님 채점)',
           cAns: String(cAns), 
           isOk, 
           explanation: easyExplanation({...q,topic:isStory?'문장제 문제':q.type||'계산 문제'}),
           timeSec: 0 // 오프라인이라 시간 측정 불가
       };
    });
    
    const correctCount = qs.filter(q => q.isOk).length;
    const log = {
        date: todayStr(), time: timeStr(), type: `학습지: ${gradeModal.title}`,
        score: `${correctCount} / ${qs.length}`, questions: qs, totalSec: 0
    };
    
    const upd = {...targetStudent, logs: [log, ...(targetStudent.logs||[])]};
    try {
        await db.collection('users').doc(upd.name).set(upd, {merge:true});
        alert(`✅ ${selStudent} 학생의 학습 기록에 추가되었습니다!`);
        setGradeModal(null);
    } catch(e) { alert('기록 저장 중 오류가 발생했습니다.'); }
  };

  // ── 모의고사 문제지 미리보기 화면 ──
  if(examSheet){
    const ORD=['①','②','③','④'];
    return(<div className="p-4 pb-36 space-y-4">
      <button onClick={()=>setExamSheet(null)} className="text-gray-500 font-bold text-sm">← 뒤로</button>
      <div className="bg-indigo-600 text-white rounded-3xl p-5 shadow-lg">
        <div className="font-black text-lg mb-1">{examSheet.title}</div>
        <div className="text-xs opacity-80">출제 방식: {examSheet.mode} · 총 10문항</div>
      </div>
      <div className="flex gap-2">
        <button onClick={()=>printExamSheet(false)} className="flex-1 py-3 bg-white border-2 border-indigo-300 text-indigo-700 rounded-2xl font-black text-sm active:scale-95 transition-transform">🖨️ 문제지 인쇄</button>
        <button onClick={()=>printExamSheet(true)} className="flex-1 py-3 bg-indigo-100 border-2 border-indigo-300 text-indigo-700 rounded-2xl font-black text-sm active:scale-95 transition-transform">📋 답지 포함 인쇄</button>
      </div>
      <button onClick={saveExamSheet} disabled={examSaved} className={`w-full py-3 rounded-2xl font-black text-sm transition-all ${examSaved?'bg-green-100 text-green-700 border-2 border-green-300 cursor-default':'bg-emerald-500 text-white active:scale-95'}`}>
        {examSaved?'✅ 저장 완료 (저장된 문제지에서 확인)':'💾 문제집 폴더에 저장하기'}
      </button>
      {examSheet.questions.map((q,i)=>(
        <div key={i} className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
          <div className="flex items-center gap-2 mb-2">
            <span className="w-6 h-6 rounded-full bg-indigo-500 text-white text-xs font-black flex items-center justify-center">{i+1}</span>
            <span className="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">{q.topic}</span>
          </div>
          <div className="text-sm font-bold text-gray-800 leading-relaxed mb-3">{q.q}</div>
          {q.graph&&<div className="flex justify-center mb-2"><GraphPreview q={q}/></div>}
          <div className="grid grid-cols-2 gap-1.5">
            {q.choices.map((c,j)=><div key={j} className={`text-xs px-3 py-2 rounded-xl border font-semibold ${j===q.answer?'bg-green-50 border-green-300 text-green-800':'bg-gray-50 border-gray-200 text-gray-600'}`}>{ORD[j]} <MathText v={c}/></div>)}
          </div>
          <div className="mt-2 text-xs text-green-700 font-black bg-green-50 px-3 py-1.5 rounded-xl inline-block">정답: {ORD[q.answer]} <MathText v={q.choices[q.answer]}/></div>
          <ExplanationBox q={q}/>
        </div>
      ))}
      <button onClick={createExamSheet} className="w-full py-4 bg-gray-100 text-gray-600 rounded-2xl font-bold">🎲 다시 생성하기</button>
    </div>);
  }

  // ── 모달 렌더링 ──
  if (gradeModal) {
    return (
      <div className="p-4 pb-36 space-y-4 max-w-2xl mx-auto">
        <button onClick={() => setGradeModal(null)} className="text-gray-500 font-bold mb-2">← 뒤로 가기</button>
        <div className="bg-white rounded-3xl p-6 shadow-md border-2 border-indigo-100">
          <div className="text-xl font-black text-gray-800 mb-2">📝 {gradeModal.title} 채점하기</div>
          <div className="text-sm text-gray-500 mb-6">오프라인으로 푼 학습지를 채점하여 학생의 데이터로 남깁니다.</div>
          
          <div className="mb-6 bg-indigo-50 p-4 rounded-2xl border border-indigo-100">
             <div className="text-sm font-bold text-indigo-800 mb-2">학생 선택</div>
             <select value={selStudent} onChange={e=>setSelStudent(e.target.value)} className="w-full p-3 rounded-xl border border-gray-200 font-bold outline-none focus:border-indigo-400">
               <option value="">학생을 선택하세요</option>
               {studentList.map(s => <option key={s.name} value={s.name}>{s.name} 학생</option>)}
             </select>
          </div>

          <div className="space-y-3">
             <div className="flex justify-between text-xs font-bold text-gray-400 uppercase px-2">
                <span>문항 및 정답</span>
                <span>맞았나요?</span>
             </div>
             {gradeModal.questions.map((q, i) => {
                 const isStory = gradeModal.wsType === 'story';
                 const cAns = isStory ? q.ans : (q.type==='gcd' ? q.gcdVal : (q.type==='lcm' ? q.lcmVal : `몫 ${q.q}, 나머지 ${q.r}`));
                 const isChecked = !!grades[i];
                 return (
                   <div key={i} className="flex items-center justify-between p-3 bg-gray-50 rounded-xl border border-gray-100 gap-4">
                      <div className="flex-1 overflow-hidden">
                         <div className="font-bold text-sm text-gray-800 whitespace-nowrap overflow-hidden text-ellipsis"><span className="text-indigo-500 mr-2">{i+1}.</span>{isStory ? q.txt : '연산 문제'}</div>
                         <div className="text-xs text-red-500 font-bold mt-1">정답: {cAns}</div>
                      </div>
                      <button 
                        onClick={() => setGrades(prev => ({...prev, [i]: !prev[i]}))}
                        className={`w-12 h-12 flex-shrink-0 rounded-xl text-2xl flex items-center justify-center font-black transition-colors ${isChecked ? 'bg-green-100 text-green-600 border-2 border-green-300' : 'bg-white border-2 border-gray-200 text-gray-300'}`}>
                        {isChecked ? 'O' : 'X'}
                      </button>
                   </div>
                 );
             })}
          </div>
          
          <button onClick={submitGrades} className="w-full mt-6 py-4 bg-indigo-600 text-white text-lg font-black rounded-2xl active:scale-95 transition-transform">
             이 학생의 기록으로 저장하기 📊
          </button>
        </div>
      </div>
    );
  }

  // ── 기존 WorksheetTab 렌더링 코드 ──
  const exportWS=async(ws,isAns)=>{
      // 모의고사(mock) 타입은 브라우저 인쇄창 활용
      if(String(ws.wsType||'').startsWith('mock')){
        const ORD=['①','②','③','④'];
        let html=`<html><head><style>
          body{font-family:'Noto Sans KR',sans-serif;padding:32px;color:#111;}
          h1{text-align:center;font-size:22px;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:6px;}
          .meta{text-align:center;font-size:12px;color:#666;margin-bottom:24px;}
          .q{margin-bottom:22px;page-break-inside:avoid;}
          .qnum{font-weight:900;color:#4338ca;margin-right:6px;}
          .qtag{font-size:11px;background:#eef2ff;color:#4338ca;padding:2px 8px;border-radius:20px;margin-left:6px;font-weight:700;}
          .choices{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;margin-left:16px;}
          .choice{font-size:13px;padding:4px 0;}
          .ans{margin-top:6px;margin-left:16px;font-size:12px;color:#dc2626;font-weight:700;display:${isAns?'block':'none'};}
          .exp{margin-top:6px;margin-left:16px;padding:8px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:11px;line-height:1.55;color:#78350f;display:${isAns?'block':'none'};}
          @media print{body{padding:16px;}.q{margin-bottom:16px;}}
        </style></head><body>
        <h1>${ws.title}</h1>
        <div class="meta">${ws.level||'고졸'} · 출제 방식: ${ws.mode||'랜덤 혼합'} · 총 ${ws.questions.length}문항 · 검정고시 기출 변형</div>`;
        ws.questions.forEach((q,i)=>{
          html+=`<div class="q">
            <div><span class="qnum">${i+1}.</span>${q.q}<span class="qtag">${q.topic}</span></div>
            <div class="choices">${q.choices.map((c,j)=>`<div class="choice">${ORD[j]} ${c}</div>`).join('')}</div>
            <div class="ans">정답: ${ORD[q.answer]} ${q.choices[q.answer]}</div>
            <div class="exp"><b>쉬운 해설:</b> ${easyExplanation(q)}</div>
          </div>`;
        });
        html+=`</body></html>`;
        const w=window.open('','_blank','width=800,height=900');
        w.document.write(html);w.document.close();
        setTimeout(()=>w.print(),400);
        return;
      }
      const renderArea=document.getElementById('pdf-render-area');const jsPDF=window.jspdf.jsPDF;
      // 🔥 약수/배수 (GCD/LCM) 고품질 & 와이드 PDF 렌더링 🔥
      if(ws.wsType==='gcd'||ws.wsType==='lcm'){
        const builder=ws.wsType==='gcd'?buildGCDHTML:buildLCMHTML;
        let html='';
        const perPage = 4; // 한 페이지에 4문제만 큼직하게 배치!
        for(let p=0;p*perPage<ws.questions.length;p++){
          const pageQs=ws.questions.slice(p*perPage,(p+1)*perPage);
          html+=`<div style="width:794px;min-height:1123px;background:white;padding:50px 60px;box-sizing:border-box;page-break-after:always;display:flex;flex-direction:column;">
            <div style="text-align:center;font-size:26px;font-weight:900;margin-bottom:30px;border-bottom:3px solid #000;padding-bottom:15px">${ws.title} ${isAns?'- 정답':''}(${p+1}/${Math.ceil(ws.questions.length/perPage)})</div>
            <div style="flex:1; display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:30px;">
              ${pageQs.map((q,i)=>builder(q,p*perPage+i+1,isAns)).join('')}
            </div>
          </div>`;
        }
        renderArea.innerHTML=html;await new Promise(r=>setTimeout(r,200));
        const pdf=new jsPDF('p','mm','a4');const pages=renderArea.querySelectorAll('[style*="page-break"]');
        for(let i=0;i<pages.length;i++){const c=await window.html2canvas(pages[i],{scale:2,backgroundColor:'#fff',useCORS:true,allowTaint:true,windowWidth:794,scrollX:0,scrollY:0});if(i>0)pdf.addPage();const _w=210,_h=Math.round((c.height/c.width)*_w*100)/100;pdf.addImage(c.toDataURL('image/png'),'PNG',0,0,_w,_h,undefined,'FAST')}
        renderArea.innerHTML='';pdf.save(`${ws.title}_${isAns?'답지':'문제지'}.pdf`);return;
      }
  
      const isStory = ws.wsType === 'story';
      const isDiv = ws.wsType === 'div';
      
      if (isAns) {
        // 정답지: 나눗셈은 최대 40문항 한 페이지, 그 이후 페이지 분할
        const ansPerPage = isStory ? 30 : 40;
        let html = '';
        for(let p=0;p*ansPerPage<ws.questions.length;p++){
          const pageQs=ws.questions.slice(p*ansPerPage,(p+1)*ansPerPage);
          const cols = isStory ? 3 : 5;
          html+=`<div style="width:794px;min-min-height:1123px;background:white;padding:40px 50px;box-sizing:border-box;page-break-after:always">`;
          html+=`<div style="text-align:center;font-size:24px;font-weight:900;margin-bottom:24px;border-bottom:3px solid #000;padding-bottom:10px">${ws.title} - 정답${ws.questions.length>ansPerPage?' ('+(p+1)+'p)':''}</div>`;
          html+=`<div style="display:grid;grid-template-columns:repeat(${cols}, 1fr);gap:10px;font-size:15px;">`;
          pageQs.forEach((q,i)=>{
            const ansText=isStory?q.ans:isDiv?`몫 ${q.q}, 나머지 ${q.r}`:`${q.q}`;
            const exp=easyExplanation({...q,topic:isStory?'문장제 문제':isDiv?'나눗셈':'계산 문제'});
            html+=`<div style="padding:9px;border:1px solid #eee;border-radius:8px;background:#fafafa;"><span style="font-weight:900;color:#555;margin-right:6px;">${p*ansPerPage+i+1}.</span><b style="color:#4f46e5">${ansText}</b><div style="font-size:10px;line-height:1.45;color:#92400e;margin-top:5px;">${exp}</div></div>`;
          });
          html+=`</div></div>`;
        }
        renderArea.innerHTML=html;await new Promise(r=>setTimeout(r,200));
        const pdf=new jsPDF('p','mm','a4');const pages=renderArea.querySelectorAll('[style*="page-break"]');
        for(let i=0;i<pages.length;i++){const cv=await window.html2canvas(pages[i],{scale:2,backgroundColor:'#fff',useCORS:true,allowTaint:true,windowWidth:794,scrollX:0,scrollY:0});if(i>0)pdf.addPage();const _w=210,_h=Math.round((cv.height/cv.width)*_w*100)/100;pdf.addImage(cv.toDataURL('image/png'),'PNG',0,0,_w,_h,undefined,'FAST')}
        renderArea.innerHTML='';pdf.save(`${ws.title}_답지.pdf`);
        return;
      }
  
      // 문제지: 나눗셈은 2열×5행(10문항/페이지), 문장제는 5문항/페이지
      const perPage = isStory ? 5 : 10;
      let html='';
      for(let p=0;p*perPage<ws.questions.length;p++){
        const pageQs=ws.questions.slice(p*perPage,(p+1)*perPage);
        if(isDiv){
          // 나눗셈: 2열 5행 가로셈 레이아웃
          html+=`<div style="width:794px;min-min-height:1123px;background:white;padding:40px 50px;box-sizing:border-box;page-break-after:always">`;
          html+=`<div style="text-align:center;font-size:24px;font-weight:900;margin-bottom:30px;border-bottom:3px solid #000;padding-bottom:10px">${ws.title} (${p+1})</div>`;
          html+=`<div style="display:grid;grid-template-columns:1fr 1fr;gap:28px 40px;">`;
          pageQs.forEach((q,i)=>{
            html+=`<div style="display:flex;align-items:center;gap:10px;font-size:26px;font-weight:900;padding:18px;border:2px solid #e2e8f0;border-radius:12px;background:#fafafa;">
              <span style="color:#555;font-size:16px;min-width:28px;">${p*perPage+i+1}.</span>
              <span>${q.txt||((q.a||'')+'÷'+(q.b||''))}</span>
              <span style="color:#cbd5e1;margin-left:auto">=</span>
              <div style="border-bottom:2px solid #94a3b8;width:80px;"></div>
            </div>`;
          });
          html+=`</div></div>`;
        }else{
          html+=`<div style="width:794px;min-min-height:1123px;background:white;padding:40px 50px;box-sizing:border-box;page-break-after:always"><div style="text-align:center;font-size:24px;font-weight:900;margin-bottom:40px;border-bottom:3px solid #000;padding-bottom:10px">${ws.title} (${p+1})</div><div style="display:flex;flex-direction:column;gap:50px;height:calc(100% - 130px)">${pageQs.map((q,i)=>`<div style="${isStory?'font-size:18px;line-height:1.7;':'font-size:28px;'}font-weight:800;display:flex;align-items:flex-start;gap:12px"><span style="font-size:16px;font-weight:900;color:#555;min-width:36px">${p*perPage+i+1}.</span><div style="flex:1">${q.txt} ${isStory?`<span style="font-size:12px;color:#aaa;font-weight:normal;margin-left:5px;">[${q.diff}]</span>`:''}<div style="margin-top:20px;height:50px;"></div></div></div>`).join('')}</div></div>`;
        }
      }
      renderArea.innerHTML=html;await new Promise(r=>setTimeout(r,200));
      const pdf=new jsPDF('p','mm','a4');const pages=renderArea.querySelectorAll('[style*="page-break"]');
      for(let i=0;i<pages.length;i++){const cv=await window.html2canvas(pages[i],{scale:2,backgroundColor:'#fff',useCORS:true,allowTaint:true,windowWidth:794,scrollX:0,scrollY:0});if(i>0)pdf.addPage();const _w=210,_h=Math.round((cv.height/cv.width)*_w*100)/100;pdf.addImage(cv.toDataURL('image/png'),'PNG',0,0,_w,_h,undefined,'FAST')}
      renderArea.innerHTML='';pdf.save(`${ws.title}_${isAns?'답지':'문제지'}.pdf`);
  };
  const buildGCDHTML=(q,n,isAns)=>`<div style="border:2px solid #cbd5e1; border-radius:20px; padding:25px; display:flex; flex-direction:column; background-color:#f8fafc; font-family:sans-serif;"><div style="font-size:20px; font-weight:900; color:#1e293b; margin-bottom:20px; display:flex; align-items:center; gap:10px;"><span style="background-color:#4f46e5; color:white; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-size:16px;">${n}</span>${q.a}와(과) ${q.b}의 약수와 최대공약수</div>${isAns?`<div style="flex:1; display:flex; flex-direction:column; gap:18px; font-size:18px;"><div><b style="color:#475569;">① ${q.a}의 약수:</b> <span style="color:#111827; letter-spacing:1px; line-height:2;">${q.divisorsA.map(d=>q.common.includes(d)?`<span style="color:#ef4444; font-weight:900; border:2px solid #ef4444; border-radius:50%; display:inline-block; width:34px; height:34px; line-height:30px; text-align:center;">${d}</span>`:d).join(', ')}</span></div><div><b style="color:#475569;">② ${q.b}의 약수:</b> <span style="color:#111827; letter-spacing:1px; line-height:2;">${q.divisorsB.map(d=>q.common.includes(d)?`<span style="color:#ef4444; font-weight:900; border:2px solid #ef4444; border-radius:50%; display:inline-block; width:34px; height:34px; line-height:30px; text-align:center;">${d}</span>`:d).join(', ')}</span></div><div style="margin-top:auto; padding-top:20px; border-top:2px dashed #cbd5e1; font-size:22px;">③ 최대공약수: <b style="color:#4f46e5; font-size:28px;">${q.gcdVal}</b></div></div>`:`<div style="flex:1; display:flex; flex-direction:column; gap:28px; font-size:18px;"><div><b style="color:#475569;">① ${q.a}의 약수:</b> <div style="border-bottom:2px solid #94a3b8; width:100%; height:45px;"></div></div><div><b style="color:#475569;">② ${q.b}의 약수:</b> <div style="border-bottom:2px solid #94a3b8; width:100%; height:45px;"></div></div><div style="margin-top:auto; padding-top:10px;">③ 공약수에 ○표 하고, 최대공약수를 적으세요.<br/><div style="border-bottom:2px solid #94a3b8; width:140px; height:45px; margin-top:20px;"></div></div></div>`}</div>`;
  const buildLCMHTML=(q,n,isAns)=>`<div style="border:2px solid #cbd5e1; border-radius:20px; padding:25px; display:flex; flex-direction:column; background-color:#f8fafc; font-family:sans-serif;"><div style="font-size:20px; font-weight:900; color:#1e293b; margin-bottom:20px; display:flex; align-items:center; gap:10px;"><span style="background-color:#4f46e5; color:white; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-size:16px;">${n}</span>${q.a}와(과) ${q.b}의 배수와 최소공배수</div>${isAns?`<div style="flex:1; display:flex; flex-direction:column; gap:18px; font-size:18px;"><div><b style="color:#475569;">① ${q.a}의 배수:</b> <span style="color:#111827; letter-spacing:1px; line-height:2;">${q.multA.map(v=>q.commonMult.includes(v)?`<span style="color:#ef4444; font-weight:900; border:2px solid #ef4444; border-radius:50%; display:inline-block; width:36px; height:36px; line-height:32px; text-align:center;">${v}</span>`:v).join(', ')}</span></div><div><b style="color:#475569;">② ${q.b}의 배수:</b> <span style="color:#111827; letter-spacing:1px; line-height:2;">${q.multB.map(v=>q.commonMult.includes(v)?`<span style="color:#ef4444; font-weight:900; border:2px solid #ef4444; border-radius:50%; display:inline-block; width:36px; height:36px; line-height:32px; text-align:center;">${v}</span>`:v).join(', ')}</span></div><div style="margin-top:auto; padding-top:20px; border-top:2px dashed #cbd5e1; font-size:22px;">③ 최소공배수: <b style="color:#4f46e5; font-size:28px;">${q.lcmVal}</b></div></div>`:`<div style="flex:1; display:flex; flex-direction:column; gap:28px; font-size:18px;"><div><b style="color:#475569;">① ${q.a}의 배수 (7개):</b> <div style="border-bottom:2px solid #94a3b8; width:100%; height:45px;"></div></div><div><b style="color:#475569;">② ${q.b}의 배수 (7개):</b> <div style="border-bottom:2px solid #94a3b8; width:100%; height:45px;"></div></div><div style="margin-top:auto; padding-top:10px;">③ 공배수에 ○표 하고, 최소공배수를 적으세요.<br/><div style="border-bottom:2px solid #94a3b8; width:140px; height:45px; margin-top:20px;"></div></div></div>`}</div>`;

  return(<div className="p-4 pb-36 space-y-4">

    <div className="bg-white rounded-3xl p-5 shadow-md">
      <div className="text-sm font-bold text-gray-400 uppercase mb-3">📝 새 문제지 만들기</div>
      <div className="flex gap-2 mb-3 flex-wrap">
        {[['div','나눗셈'],['gcd','약수/최대공약수'],['lcm','배수/최소공배수'],['story','문장제(초3-4)'],['mock_middle','검정고시_중졸'],['mock_high','검정고시_고졸'],['geo','기하학']].map(([k,lbl])=><button key={k} onClick={()=>setWsType(k)} className={`px-4 py-2 rounded-xl font-bold text-sm ${wsType===k?(k.startsWith('mock_')?'bg-purple-600 text-white':k==='geo'?'bg-blue-600 text-white':'bg-indigo-500 text-white'):'bg-gray-100 text-gray-600'}`}>{lbl}</button>)}
      </div>
      <div className="text-xs text-gray-500 font-semibold mb-3 bg-gray-50 rounded-xl p-2">{TYPE_DESC[wsType]}</div>
      
      {wsType === 'story' ? (
        <div className="space-y-4 mb-4 border-2 border-indigo-50 rounded-2xl p-4">
          <div>
            <div className="text-sm font-bold text-gray-700 mb-2">난이도별 문제 수 <span className="text-xs text-gray-400 font-bold">(총 {storyCounts.low + storyCounts.mid + storyCounts.high}문제)</span></div>
            <div className="space-y-2">
              {Object.entries({low:'하 (쉬움)', mid:'중 (보통)', high:'상 (어려움)'}).map(([k, lbl]) => (
                <div key={k} className="flex items-center justify-between bg-gray-50 rounded-xl px-3 py-2">
                  <span className="text-sm font-bold text-gray-600">{lbl}</span>
                  <div className="flex items-center gap-3">
                    <button onClick={()=>setStoryCounts(p=>({...p, [k]: Math.max(0, p[k]-1)}))} className="w-9 h-9 bg-white border border-gray-200 text-indigo-600 rounded-full font-black text-lg flex items-center justify-center">−</button>
                    <span className="font-black text-gray-800 text-lg w-7 text-center">{storyCounts[k]}</span>
                    <button onClick={()=>setStoryCounts(p=>({...p, [k]: Math.min(20, p[k]+1)}))} className="w-9 h-9 bg-white border border-gray-200 text-indigo-600 rounded-full font-black text-lg flex items-center justify-center">+</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div>
            <div className="text-sm font-bold text-gray-700 mb-2">사칙연산 비율 (%) <span className="text-xs text-indigo-500 font-bold ml-1">합계 100% 필수</span></div>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-2">
              {Object.entries({add:'덧셈(+)', sub:'뺄셈(-)', mul:'곱셈(×)', div:'나눗셈(÷)'}).map(([op, lbl]) => (
                <div key={op} className="bg-gray-50 p-2 rounded-xl">
                  <div className="text-xs font-bold text-gray-500 mb-1 text-center">{lbl}</div>
                  <div className="flex items-center gap-1 justify-center">
                    <input type="number" value={opRatios[op]} onChange={(e)=>handleRatioChange(op, e.target.value)} className="w-16 text-center font-black bg-white border border-gray-200 rounded-lg p-1 outline-none focus:border-indigo-400" />
                    <span className="text-xs text-gray-400">%</span>
                  </div>
                </div>
