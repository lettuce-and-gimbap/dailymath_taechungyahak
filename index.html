<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontSize: {
          'xs': ['1rem', { lineHeight: '1.5rem' }],       /* 원래 12px -> 16px (제일 작은 글씨도 잘 보이게) */
          'sm': ['1.125rem', { lineHeight: '1.75rem' }],  /* 원래 14px -> 18px */
          'base': ['1.25rem', { lineHeight: '1.75rem' }], /* 원래 16px -> 20px (기본 글씨 크기 대폭 상향) */
          'lg': ['1.375rem', { lineHeight: '2rem' }],     /* 원래 18px -> 22px */
          'xl': ['1.5rem', { lineHeight: '2.25rem' }],    /* 원래 20px -> 24px */
          '2xl': ['1.75rem', { lineHeight: '2.5rem' }],   /* 원래 24px -> 28px */
          '3xl': ['2rem', { lineHeight: '2.5rem' }],      /* 원래 30px -> 32px */
          '4xl': ['2.5rem', { lineHeight: '3rem' }],      /* 40px */
        }
      }
    }
  }
</script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;font-family:'Apple SD Gothic Neo','Noto Sans KR',-apple-system,'Malgun Gothic',sans-serif;background:#eef2ff;-webkit-tap-highlight-color:transparent;overflow-x:hidden;overflow-y:auto;max-width:100vw;width:100vw;position:relative}
#root{min-height:100vh;width:100%;max-width:100vw;overflow-x:hidden;position:relative}
button{cursor:pointer;font-family:inherit;border:none;background:none;padding:0}
.tab-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;width:100%;max-width:100%;flex-shrink:0}
/* 전체 가로 스크롤 완전 차단: 어떤 요소도 뷰포트 너비를 초과하지 않도록 */
.min-h-screen,.flex-col{max-width:100%}
/* tab-scroll 내부 flex는 min-w-max 허용 (스크롤 컨테이너 안에서만) */
.tab-scroll>*{max-width:none}
.tab-scroll::-webkit-scrollbar{display:none}
svg{touch-action:none}
/* 세로 스크롤바만 얇게, 가로 스크롤바는 완전 숨김 */
::-webkit-scrollbar{width:5px;height:0px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}
::-webkit-scrollbar:horizontal{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes goldShine{
  0%{box-shadow:0 0 6px #FFD700,0 0 12px #FFD700;background:linear-gradient(135deg,#FFF9C4,#FFD700)}
  50%{box-shadow:0 0 20px #FFC200,0 0 36px #FFD700;background:linear-gradient(135deg,#FFD700,#FFA500)}
  100%{box-shadow:0 0 6px #FFD700,0 0 12px #FFD700;background:linear-gradient(135deg,#FFF9C4,#FFD700)}}
@keyframes glowBorder{
  0%{box-shadow:0 0 5px #5B7BFF}
  50%{box-shadow:0 0 22px #5B7BFF,0 0 12px #3A5EE8}
  100%{box-shadow:0 0 5px #5B7BFF}}
.stamp-gold{animation:goldShine 1.4s ease-in-out infinite}
.goal-glow{animation:glowBorder 2s infinite alternate}
.fade-in{animation:fadeIn .25s ease}
.ring-fill{transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1)}
@media print{
  body *{visibility:hidden!important}
  .ws-print-area,.ws-print-area *{visibility:visible!important}
  .ws-print-area{position:fixed!important;left:0!important;top:0!important;width:100%!important;padding:8mm!important;display:grid!important;grid-template-columns:1fr 1fr!important;gap:4mm!important;background:white!important}
  .ws-problem{page-break-inside:avoid!important;border:1px solid #333!important}
  /* 세션(회차) 문제+해설 인쇄 영역 */
  .session-print-area,.session-print-area *{visibility:visible!important}
  .session-print-area{position:absolute!important;left:0!important;top:0!important;width:100%!important;padding:10mm!important;background:white!important}
  .session-print-item{page-break-inside:avoid!important}
  .no-print{display:none!important}
  /* 인쇄 시 버튼 최소높이 강제 해제 (레이아웃 깨짐 방지) */
  button{min-height:0!important}
  }

  /* 🟢 [새로 추가] 모바일 환경 시니어 터치 최적화 (오터치 방지 및 가독성 확보) */
  button, input, select {
    min-height: 54px !important; /* 스마트폰에서 손가락으로 누르기 쉽게 터치 영역 최소 54px 보장 */
  }

  /* 글씨가 커지면서 레이아웃이 찢어지지 않도록 단어 단위로 예쁘게 줄바꿈 적용 */
  div, p, span, button {
    word-break: keep-all !important;
    overflow-wrap: break-word !important;
    max-width: 100%;
  }
  /* tab-scroll 직계 자식(min-w-max flex)은 가로 제한 해제 */
  .tab-scroll > div, .tab-scroll > div > button {
    max-width: none;
    overflow-wrap: normal;
  }

  /* 모바일 화면(스마트폰)에서 버튼 사이의 여백을 더 넓게 하여 잘못 누르는 것 방지 */
  @media (max-width: 640px) {
    #root { padding-bottom: 3rem; } /* 맨 아래 답답하지 않게 여백 추가 */
    .gap-2 { gap: 1rem !important; } /* 다닥다닥 붙은 버튼들을 넓게 띄워줌 */
    .p-4 { padding: 1.5rem !important; } /* 박스 안쪽 여백도 넓게 */
  }

  /* 👨‍🏫 [새로 추가] 선생님 대시보드 전용 폰트 리셋 (분석 및 리포트를 위해 작은 글씨 유지) */
  .teacher-ui .text-xs { font-size: 0.75rem !important; line-height: 1rem !important; }
  .teacher-ui .text-sm { font-size: 0.875rem !important; line-height: 1.25rem !important; }
  .teacher-ui .text-base { font-size: 1rem !important; line-height: 1.5rem !important; }
  .teacher-ui .text-lg { font-size: 1.125rem !important; line-height: 1.75rem !important; }
  .teacher-ui .text-xl { font-size: 1.25rem !important; line-height: 1.75rem !important; }
  .teacher-ui .text-2xl { font-size: 1.5rem !important; line-height: 2rem !important; }

/* ── 모바일 네브바 가림 방지: fixed 네브바 높이만큼 스크롤 영역 하단 확보 ── */
.scroll-body {
  padding-bottom: calc(110px + env(safe-area-inset-bottom, 0px)) !important;
}

/* ════════════════════════════════════════════════
   🌙 다크 모드 (body.dark 스코프)
   - 중립(흰색/회색) 표면·텍스트·테두리만 어둡게 리매핑
   - 인디고/블루 등 강조색은 그대로 두어 대비 유지
   ════════════════════════════════════════════════ */
body.dark{background:#0b1120;}
body.dark #root{background:#0b1120;}
body.dark .min-h-screen{background:#0b1120;}

/* 표면 */
body.dark .bg-white{background-color:#1e293b!important;}
body.dark .bg-gray-50{background-color:#111827!important;}
body.dark .bg-gray-100{background-color:#334155!important;}
body.dark .bg-gray-200{background-color:#475569!important;}

/* 그라데이션(로그인·상단 카드)은 살짝 어둡게 */
body.dark .from-indigo-100{--tw-gradient-from:#1e293b var(--tw-gradient-from-position)!important;}
body.dark .via-blue-50{--tw-gradient-via:#0f172a var(--tw-gradient-via-position)!important;}
body.dark .to-purple-100{--tw-gradient-to:#1e1b4b var(--tw-gradient-to-position)!important;}

/* 텍스트 */
body.dark .text-gray-800,body.dark .text-gray-900,body.dark .text-black{color:#e5e7eb!important;}
body.dark .text-gray-700{color:#d1d5db!important;}
body.dark .text-gray-600{color:#cbd5e1!important;}
body.dark .text-gray-500{color:#94a3b8!important;}
body.dark .text-gray-400{color:#64748b!important;}
body.dark .text-gray-300{color:#475569!important;}

/* 테두리 */
body.dark .border-gray-100,body.dark .border-gray-200{border-color:#334155!important;}
body.dark .border-gray-300{border-color:#475569!important;}
body.dark .border-b,body.dark .border-t,body.dark .border{border-color:#334155;}

/* 옅은 강조 배경은 어둡게 톤다운(가독성 유지) */
body.dark .bg-indigo-50{background-color:#1e2542!important;}
body.dark .bg-blue-50{background-color:#16233f!important;}
body.dark .bg-gray-50.border{background-color:#111827!important;}

/* 입력창 */
body.dark input,body.dark textarea,body.dark select{background-color:#0f172a!important;color:#e5e7eb!important;border-color:#334155!important;}
body.dark input::placeholder,body.dark textarea::placeholder{color:#64748b!important;}

/* 그림자 약화 */
body.dark .shadow-sm,body.dark .shadow,body.dark .shadow-md,body.dark .shadow-lg,body.dark .shadow-2xl{box-shadow:0 4px 14px rgba(0,0,0,0.45)!important;}

/* 그래프 SVG 카드: 어두운 배경에서도 흰 도화지 유지(그래프 가독성) */
body.dark svg.bg-white{background-color:#f8fafc!important;}

/* 다크 토글 버튼 */
.dark-toggle{display:flex;align-items:center;justify-content:center;width:40px;height:40px;min-height:40px!important;border-radius:9999px;font-size:18px;line-height:1;background:rgba(255,255,255,0.18);transition:transform .15s;flex-shrink:0;}
.dark-toggle:active{transform:scale(0.9);}
body.dark .dark-toggle{background:rgba(255,255,255,0.12);}
</style>
</head>
