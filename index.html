function StudentFeedbackPanel(){
  const[msgs,setMsgs]=React.useState([]);const[loading,setLoading]=React.useState(false);
  const load=async()=>{setLoading(true);try{const snap=await db.collection('studentFeedback').orderBy('sentAt','desc').limit(30).get();const arr=[];snap.forEach(d=>arr.push({id:d.id,...d.data()}));setMsgs(arr);}catch(e){}setLoading(false);};
  React.useEffect(()=>{load();},[]);
  const fmtTime=ts=>{if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ko-KR')+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});};
  const markRead=async(id)=>{try{await db.collection('studentFeedback').doc(id).set({read:true},{merge:true});setMsgs(prev=>prev.map(m=>m.id===id?{...m,read:true}:m));}catch(e){}};
  const del=async(id)=>{if(!confirm('이 의견을 삭제할까요?'))return;try{await db.collection('studentFeedback').doc(id).delete();setMsgs(prev=>prev.filter(m=>m.id!==id));}catch(e){alert('삭제 실패');}};
  return(<div className="bg-white rounded-3xl p-5 shadow-md mb-4">
    <div className="flex items-center justify-between mb-3">
      <div className="text-sm font-bold text-gray-400 uppercase">💬 학생 의견 수신함</div>
      <button onClick={load} className="text-xs px-3 py-1 bg-indigo-100 text-indigo-700 rounded-lg font-bold">새로고침</button>
    </div>
    {loading&&<div className="text-center text-gray-400 py-4">로딩 중...</div>}
    {!loading&&msgs.length===0&&<div className="text-center text-gray-400 py-4 text-sm">받은 의견이 없어요.</div>}
    {msgs.map(m=><div key={m.id} className={`border rounded-2xl p-3.5 mb-2.5 ${m.read?'border-gray-100 bg-gray-50':'border-indigo-200 bg-indigo-50'}`}>
      <div className="flex items-center gap-2 mb-1.5 flex-wrap">
        <span className="font-black text-gray-800 text-sm">👤 {m.studentName}</span>
        {!m.read&&<span className="text-[11px] bg-indigo-500 text-white font-bold px-2 py-0.5 rounded-full">NEW</span>}
        <span className="text-[11px] text-gray-400 ml-auto">{fmtTime(m.sentAt)}</span>
      </div>
      <p className="text-sm text-gray-700 font-medium leading-relaxed break-keep">{m.message}</p>
      <div className="flex gap-2 mt-2.5 justify-end">
        {!m.read&&<button onClick={()=>markRead(m.id)} className="text-[11px] px-3 py-1.5 bg-green-50 text-green-600 rounded-lg font-bold">✓ 읽음 처리</button>}
        <button onClick={()=>del(m.id)} className="text-[11px] px-3 py-1.5 bg-red-50 text-red-500 rounded-lg font-bold">🗑️ 삭제</button>
      </div>
    </div>)}
  </div>);
}
function FeedbackTab(){
  const[showStudentFb,setShowStudentFb]=useState(true);
  const[sid,setSid]=useState('');
  const[student,setStudent]=useState(null);
  const[msg,setMsg]=useState('');
  const[relatedLogIdx,setRelatedLogIdx]=useState(''); // index로 관리하여 데이터 접근 용이하게 함
  const[loading,setLoading]=useState(false);
  const[feedbacks,setFeedbacks]=useState([]);
  const[sent,setSent]=useState(false);
  const[editFbId,setEditFbId]=useState(null);
  const[editFbText,setEditFbText]=useState('');

  const search=async()=>{
    if(!sid.trim())return;
    setLoading(true);
    try{
      const doc=await db.collection('users').doc(sid.trim()).get();
      if(doc.exists && doc.data().role!=='admin'){
        setStudent(doc.data());
        const fbSnap=await db.collection('feedback').where('studentName','==',sid.trim()).get();
        let arr=[];
        fbSnap.forEach(d=>arr.push({id:d.id, ...d.data()}));
        arr.sort((a, b) => {
          const timeA = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : new Date(a.createdAt).getTime();
          const timeB = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : new Date(b.createdAt).getTime();
          return timeB - timeA;
        });
        setFeedbacks(arr.slice(0, 10));
        setRelatedLogIdx(''); 
      }else{
        alert('해당 학생을 찾을 수 없거나 선생님 계정입니다.');
      }
    }catch(e){
      alert('검색 실패: ' + e.message);
    }
    setLoading(false);
  };

  const send=async()=>{
    if(!msg.trim())return;
    try{
      let logStr = '';
      if(relatedLogIdx !== '' && student?.logs?.[relatedLogIdx]) {
         const l = student.logs[relatedLogIdx];
         logStr = `${fmtDate(l.date)} ${l.time} | ${l.type} | 점수: ${l.score}`;
      }
      await db.collection('feedback').add({
        studentName: sid.trim(),
        message: msg.trim(),
        relatedLog: logStr, // 텍스트 꼬리표로 저장
        read: false, 
        createdAt: new Date()
      });
      setMsg(''); setRelatedLogIdx(''); setSent(true);
      setTimeout(()=>setSent(false), 2000);
      search(); 
    }catch(e){
      alert('피드백 저장 실패: ' + e.message);
    }
  };

  const deleteFb=async(id)=>{
    if(!confirm('이 피드백을 정말 삭제하시겠습니까?')) return;
    try{
      await db.collection('feedback').doc(id).delete();
      search(); 
    }catch(e){
      alert('삭제 실패: ' + e.message);
    }
  };

  // 학생이 아직 읽지 않은 피드백만 수정 가능

  const saveFbEdit=async(id)=>{
    if(!editFbText.trim())return;
    try{
      await db.collection('feedback').doc(id).set({message:editFbText.trim()},{merge:true});
      setEditFbId(null);setEditFbText('');
      search();
    }catch(e){alert('수정 실패: '+e.message);}
  };

  const selLog = relatedLogIdx !== '' ? student?.logs?.[relatedLogIdx] : null;

  return(<div className="p-4 pb-36 space-y-4">
    <StudentFeedbackPanel/>
    <div className="bg-white rounded-3xl p-5 shadow-md">
      <div className="text-sm font-bold text-gray-400 uppercase mb-3">💬 학생 피드백 & 기록</div>
      <div className="flex flex-col gap-2 mb-3">
        <input type="text" value={sid} onChange={e=>setSid(e.target.value)} onKeyDown={e=>e.key==='Enter'&&search()} placeholder="학생 이름 입력" className="w-full border-2 border-gray-200 rounded-2xl px-4 py-3 text-base font-bold focus:border-indigo-400 outline-none"/>
        <button onClick={search} className="w-full py-3 bg-indigo-500 text-white rounded-2xl font-black text-base">{loading?'검색 중...':'🔍 학생 조회'}</button>
      </div>

        </div>

               <span className="text-[11px] text-gray-400 ml-auto">{fb.createdAt?.toDate?.()?.toLocaleDateString('ko-KR') || new Date(fb.createdAt).toLocaleDateString('ko-KR')}</span>
            </div>
            {fb.relatedLog && <div className="text-[11px] text-indigo-600 font-black mb-2 inline-block bg-white px-2 py-1 rounded-lg border border-indigo-100 break-keep">관련: {fb.relatedLog}</div>}
            {editFbId===fb.id?(
              <div className="space-y-2">
                <textarea value={editFbText} onChange={e=>setEditFbText(e.target.value)} rows={3} className="w-full border-2 border-indigo-200 rounded-xl px-3 py-2 text-base font-bold resize-none outline-none focus:border-indigo-400"/>
                <div className="flex gap-2">
                  <button onClick={()=>saveFbEdit(fb.id)} className="flex-1 py-2.5 bg-indigo-500 text-white rounded-xl font-bold text-sm">저장</button>
                  <button onClick={()=>setEditFbId(null)} className="flex-1 py-2.5 bg-gray-200 text-gray-600 rounded-xl font-bold text-sm">취소</button>
                </div>
              </div>
            ):(
              <>
                <div className="text-gray-800 font-bold text-base leading-relaxed break-keep">{fb.message}</div>
                <div className="flex gap-2 mt-3 justify-end">
                  {!fb.read&&<button onClick={()=>startFbEdit(fb)} className="text-[11px] px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg font-bold">✏️ 수정</button>}
                  <button onClick={()=>deleteFb(fb.id)} className="text-[11px] px-3 py-1.5 bg-red-50 text-red-500 rounded-lg font-bold">🗑️ 삭제</button>
                </div>
                {!fb.read&&<div className="text-[10px] text-gray-400 mt-1.5 text-right">아직 안 읽었을 때만 수정할 수 있어요</div>}
              </>
            )}
          </div>)}
        </div>}
      </div>}
    </div>
  </div>);
}

const QUOTE_BGS=[
  'linear-gradient(135deg,#667eea 0%,#764ba2 100%)',
  'linear-gradient(135deg,#f093fb 0%,#f5576c 100%)',
  'linear-gradient(135deg,#4facfe 0%,#00f2fe 100%)',
  'linear-gradient(135deg,#fa709a 0%,#fee140 100%)',
  'linear-gradient(135deg,#43e97b 0%,#38f9d7 100%)',
  'linear-gradient(135deg,#30cfd0 0%,#330867 100%)',
  'linear-gradient(135deg,#a8edea 0%,#fed6e3 100%)',
  'linear-gradient(135deg,#5ee7df 0%,#b490ca 100%)',
  'linear-gradient(135deg,#f6d365 0%,#fda085 100%)',
  'linear-gradient(135deg,#84fab0 0%,#8fd3f4 100%)'
];

function QuoteSplash({onDone}){
  const DURATION=4500;
  // 접속할 때마다 다음 글귀가 나오도록 인덱스 회전
  const startIdx=React.useRef((()=>{
    let i=0;try{i=parseInt(localStorage.getItem('yakHakQuoteIdx')||'0',10)||0;}catch(e){}
    i=((i%LEARN_QUOTES.length)+LEARN_QUOTES.length)%LEARN_QUOTES.length;
    try{localStorage.setItem('yakHakQuoteIdx',String((i+1)%LEARN_QUOTES.length));}catch(e){}
    return i;
  })()).current;
  const quoteEntry=LEARN_QUOTES[startIdx];
  const quote=typeof quoteEntry==='string'?quoteEntry:quoteEntry.text;
  const quoteAuthor=typeof quoteEntry==='string'?'태청야학 수학반':quoteEntry.author;
  const bg=QUOTE_BGS[startIdx%QUOTE_BGS.length];
  const cardRef=React.useRef();
  const[pct,setPct]=React.useState(100);
  const[paused,setPaused]=React.useState(false);
  const[saving,setSaving]=React.useState(false);
  const elapsedRef=React.useRef(0);
  const lastRef=React.useRef(Date.now());
  const doneRef=React.useRef(false);

  React.useEffect(()=>{
    lastRef.current=Date.now();
    let raf;
    const tick=()=>{
      const now=Date.now();
      if(!paused){
        elapsedRef.current += now-lastRef.current;
        const p=Math.max(0,100-(elapsedRef.current/DURATION)*100);
        setPct(p);
        if(elapsedRef.current>=DURATION&&!doneRef.current){doneRef.current=true;onDone();return;}
      }
      lastRef.current=now;
      raf=requestAnimationFrame(tick);
    };
    raf=requestAnimationFrame(tick);
    return()=>cancelAnimationFrame(raf);
  },[paused]);

  const finish=()=>{if(!doneRef.current){doneRef.current=true;onDone();}};

  const capture=async()=>{
    if(typeof html2canvas==='undefined'){alert('스크린샷으로 간직해 주세요!');return;}
    setSaving(true);setPaused(true);
    try{
      const canvas=await html2canvas(cardRef.current,{backgroundColor:null,scale:2,useCORS:true});
      const link=document.createElement('a');
      link.download='태청야학_오늘의_글귀.png';
      link.href=canvas.toDataURL('image/png');
      link.click();
    }catch(e){alert('이미지 저장에 실패했어요. 화면을 스크린샷으로 간직해 주세요!');}
    setSaving(false);setPaused(false);
  };

  const stop=e=>{e.stopPropagation();};

  return(
    <div
      onPointerDown={()=>setPaused(true)}
      onPointerUp={()=>setPaused(false)}
      onPointerLeave={()=>setPaused(false)}
      onPointerCancel={()=>setPaused(false)}
      style={{position:'fixed',inset:0,zIndex:9999,background:bg,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'28px',touchAction:'none',userSelect:'none'}}>
      {/* 진행 바 */}
      <div style={{position:'absolute',top:0,left:0,right:0,height:'4px',background:'rgba(255,255,255,0.25)'}}>
        <div style={{height:'100%',width:pct+'%',background:'rgba(255,255,255,0.9)',transition:'width .1s linear'}}/>
      </div>

      {/* 글귀 카드 (캡쳐 대상) */}
      <div ref={cardRef} style={{background:bg,borderRadius:'28px',padding:'40px 28px',maxWidth:'440px',width:'100%',textAlign:'center',boxShadow:'0 20px 60px rgba(0,0,0,0.25)'}}>
        <div style={{fontSize:'40px',marginBottom:'18px'}}>🎓</div>
        <div style={{fontSize:'15px',fontWeight:800,color:'rgba(255,255,255,0.85)',letterSpacing:'0.05em',marginBottom:'18px'}}>오늘의 배움 한 줄</div>
        <p style={{fontSize:'24px',lineHeight:1.55,fontWeight:900,color:'#fff',wordBreak:'keep-all',textShadow:'0 2px 12px rgba(0,0,0,0.22)',margin:0}}>{quote}</p>
        <div style={{marginTop:'26px',fontSize:'13px',fontWeight:700,color:'rgba(255,255,255,0.8)'}}>— {quoteAuthor} —</div>
      </div>

      {/* 안내 + 버튼 (캡쳐 영역 밖) */}
      <div style={{marginTop:'22px',display:'flex',flexDirection:'column',alignItems:'center',gap:'12px',width:'100%',maxWidth:'440px'}}>
        <div style={{fontSize:'13px',fontWeight:700,color:'rgba(255,255,255,0.9)',height:'18px'}}>
          {paused?'⏸ 잠시 멈췄어요 (손을 떼면 다시 진행돼요)':'화면을 꾹 누르면 멈춰서 더 오래 볼 수 있어요'}
        </div>
        <div style={{display:'flex',gap:'10px',width:'100%'}}>
          <button onPointerDown={stop} onClick={capture} disabled={saving}
            style={{flex:1,padding:'14px',borderRadius:'16px',background:'rgba(255,255,255,0.95)',color:'#444',fontWeight:900,fontSize:'15px'}}>
            {saving?'저장 중...':'📸 글귀 간직하기'}
          </button>
          <button onPointerDown={stop} onClick={finish}
            style={{flex:1,padding:'14px',borderRadius:'16px',background:'rgba(0,0,0,0.22)',color:'#fff',fontWeight:900,fontSize:'15px'}}>
            들어가기 →
          </button>
        </div>
      </div>
    </div>
  );
}

/* ===== APP ===== */
function App(){
  const[user,setUser]=useState(null);const[checking,setChecking]=useState(true);
  const[showSplash,setShowSplash]=useState(false);

  useEffect(()=>{
    const saved=localStorage.getItem('yakHakUser2');
    if(saved){const{name}=JSON.parse(saved);loadUser(name).then(data=>{if(data){const d={...data};const curMon=getKSTMonday();if(d.lastDate!==todayStr()){d.todayLessons=0;d.todayCorrect=0;d.todayWrong=0;d.lastDate=todayStr()}if(!d.currentWeekStart)d.currentWeekStart=curMon;else if(d.currentWeekStart!==curMon){if(!d.stampArchive)d.stampArchive=[];const oldDates=(d.activeDates||[]).filter(x=>x>=d.currentWeekStart&&x<curMon);if(oldDates.length>0)d.stampArchive.unshift({weekStart:d.currentWeekStart,activeDates:oldDates});d.currentWeekStart=curMon}d.lastLoginAt=`${todayStr()} ${timeStr()}`;saveUser(d);setUser(d);
      // 자동 로그인: 이번 탭 세션에 아직 스플래시를 안 봤을 때만 노출
      if(!sessionStorage.getItem('yakHakSplashDone'))setShowSplash(true);
    }setChecking(false)})}else setChecking(false);
  },[]);

  // 명시적 로그인: 마찬가지로 세션 플래그 확인
  const login=data=>{localStorage.setItem('yakHakUser2',JSON.stringify({name:data.name}));setUser(data);if(!sessionStorage.getItem('yakHakSplashDone'))setShowSplash(true);};
  // 로그아웃 시 플래그 초기화 → 다음 접속 때 스플래시 다시 보임
  const logout=()=>{localStorage.removeItem('yakHakUser2');setUser(null);setShowSplash(false);sessionStorage.removeItem('yakHakSplashDone');};
  const update=newData=>{setUser(newData)};
  // 스플래시 닫힐 때 이번 세션에 본 것으로 기록 (새로고침·탭 이동 때 재노출 방지)
  const handleSplashDone=()=>{sessionStorage.setItem('yakHakSplashDone','1');setShowSplash(false);};

  if(checking)return<div className="min-h-screen flex items-center justify-center text-2xl font-black text-indigo-600">🎓 불러오는 중...</div>;
  if(!user)return<AuthScreen onLogin={login}/>;
  const main = user.role==='admin'
    ? <TeacherDashboard userData={user} onLogout={logout} onUpdate={update}/>
    : <StudentDashboard userData={user} onLogout={logout} onUpdate={update}/>;
  return(<>{main}{showSplash&&<QuoteSplash onDone={handleSplashDone}/>}</>);
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
