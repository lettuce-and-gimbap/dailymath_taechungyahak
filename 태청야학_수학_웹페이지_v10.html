/* ===== STREAK CALCULATOR ===== */
function calcStreak(activeDates){
  if(!activeDates?.length)return{total:0,streak:0};
  const u=[...new Set(activeDates)].sort((a,b)=>b.localeCompare(a));const total=u.length;
  let streak=0;const cur=new Date();cur.setHours(0,0,0,0);
  const last=new Date(u[0]);last.setHours(0,0,0,0);
  const diff=(cur-last)/(1000*60*60*24);if(diff>1)return{total,streak:0};
  streak=1;for(let i=1;i<u.length;i++){const d1=new Date(u[i-1]),d2=new Date(u[i]);if((d1-d2)/(1000*60*60*24)===1)streak++;else break}
  return{total,streak};
}

function DailyPracticeTab({userData,onUpdate}){
  const[screen,setScreen]=useState('menu');// menu | session | done
  const[session,setSession]=useState(null);
  const[ver,setVer]=useState(userData.ver||0);
  const[rangeMin,setRangeMin]=useState(userData.rangeMin||10);
  const[rangeMax,setRangeMax]=useState(userData.rangeMax||99);
  const[divMin,setDivMin]=useState(userData.divRangeMin||10);
  const[divMax,setDivMax]=useState(userData.divRangeMax||99);
  const[goal,setGoal]=useState(userData.goal||3);

  const saveSettings=()=>{
  const upd={...userData,ver,
    rangeMin: rangeMin===''?1:Math.max(1,Number(rangeMin)),
    rangeMax: rangeMax===''?2:Math.max(2,Number(rangeMax)),
    divRangeMin: divMin===''?1:Math.max(1,Number(divMin)),
    divRangeMax: divMax===''?2:Math.max(2,Number(divMax)),
    goal};
  saveUser(upd);onUpdate(upd);
};  
  const startSession=()=>{
  // л№Ҳ м№ёмқҙл©ҙ мһҗлҸҷ мұ„мӣҖ: мҷјмӘҪ=1, мҳӨлҘёмӘҪ=мҷјмӘҪ+1
  const effRMin = rangeMin===''||Number(rangeMin)<1 ? 1 : Math.floor(Number(rangeMin));
  const effRMax = rangeMax===''||Number(rangeMax)<=effRMin ? effRMin+1 : Math.floor(Number(rangeMax));
  const effDMin = divMin===''||Number(divMin)<1 ? 1 : Math.floor(Number(divMin));
  const effDMax = divMax===''||Number(divMax)<=effDMin ? effDMin+1 : Math.floor(Number(divMax));
  setRangeMin(effRMin); setRangeMax(effRMax);
  setDivMin(effDMin);   setDivMax(effDMax);
  const divCountIdxs=[];while(divCountIdxs.length<2){const r=randInt(1,10);if(!divCountIdxs.includes(r))divCountIdxs.push(r)}
  setSession({qNum:1,correct:0,wrong:0,startTime:Date.now(),qStartTime:Date.now(),questions:[],divCountIdxs,currentQ:null,selectedMC:null,fb:null,phase:'question'});
  setScreen('session');
};

  if(screen==='menu')return<PracticeMenu ver={ver} setVer={v=>{setVer(v)}} rangeMin={rangeMin} setRangeMin={setRangeMin} rangeMax={rangeMax} setRangeMax={setRangeMax} divMin={divMin} setDivMin={setDivMin} divMax={divMax} setDivMax={setDivMax} goal={goal} setGoal={setGoal} todayLessons={userData.todayLessons} onSave={saveSettings} onStart={startSession}/>;
  if(screen==='session')return<PracticeSession session={session} setSession={setSession} ver={ver} rangeMin={rangeMin} rangeMax={rangeMax} divMin={divMin} divMax={divMax} userData={userData} onUpdate={onUpdate} onDone={(result)=>{setScreen('done');}} onBack={()=>setScreen('menu')}/>;
  if(screen==='done')return<PracticeDone userData={userData} onAgain={startSession} onHome={()=>setScreen('menu')}/>;
  return null;
}

function makeQ(ver,qNum,divCountIdxs,rangeMin,rangeMax,divMin,divMax,seenSet=null){
  let qType=ver;if(qType===2)qType=Math.random()<0.5?0:1;
  const isMC=Math.random()<0.25;
  if(qType===3||qType===4){
    const{target,divisors}=genDivisors(divMin,divMax,qType===4);
    const divQType=pick(['notDiv','allDiv','count']);
    return{category:'div',target,divisors,divQType,isMC:true,
      qLogTxt:divQType==='count'?`${target}мқҳ м•ҪмҲҳ к°ңмҲҳ`:divQType==='notDiv'?`${target}мқҳ м•ҪмҲҳ м•„лӢҢ кІғ кі лҘҙкё°`:`${target}мқҳ лӘЁл“  м•ҪмҲҳ`};
  }
  // в”Җв”Җ ver:5 кІҖм •кі мӢң мҳҒм—ӯ м—°мҠө (лҸ„нҳ•/м§‘н•©/нҷ•лҘ  3к°ң мҳҒм—ӯ мӮ¬м§Җм„ лӢӨ) в”Җв”Җ
  if(qType===5){
    const AREA_GENS=[genMockGeometry,genMockSetFunc,genMockProbStat];
    const areaLabels=['лҸ„нҳ•кіј кё°н•ҳ','м§‘н•©кіј н•ЁмҲҳ','нҷ•лҘ кіј нҶөкі„'];
    const areaIdx=qNum%3;
    let q=null;let tries=0;
    // seenSetмқҙ мһҲмңјл©ҙ л¬ём ң н…ҚмҠӨнҠё мӨ‘ліө л°©м§Җ
    while(tries<12){
      try{q=AREA_GENS[areaIdx]();}catch(e){q=null;}
      if(!q){tries++;continue;}
      const key=q.q?.slice(0,30)||q.topic||'';
      if(!seenSet||!seenSet.has(key)){if(seenSet)seenSet.add(key);break;}
      tries++;q=null;
    }
    if(!q){try{q=genMockProbStat();}catch(e){}}
    if(!q)q={topic:'нҷ•лҘ ',q:'3лӘ… мӨ‘ 2лӘ…мқ„ мҲңм„ңлҢҖлЎң лҪ‘лҠ” кІҪмҡ°мқҳ мҲҳлҠ”?',choices:['3','6','9','12'],answer:1,meta:{category:'stat',type:'нҷ•лҘ кіј нҶөкі„',diff:'кё°мҙҲ'}};
    return{...q,category:'exam5',isMC:true,
      qLogTxt:q.q?.slice(0,30)||q.topic||areaLabels[areaIdx]};
  }
  if(qType===0){const q=genDivBasic(rangeMin,rangeMax);return{...q,category:'math',isMC}}
  return{...genDivRemainder(rangeMin,rangeMax),category:'math',isMC};
}

          <div className="space-y-2">
            <Row step="кі„мӮ°">{q.a} Г· {q.b} = {q.ansC}</Row>
            <Row step="кІҖмӮ°">{q.b} Г— {q.ansC} = {prod}</Row>
          </div>
        </div>
      );
    }
  }
  if(q.category==='div'){
    const divs=q.divisors||[];
    if(q.divQType==='count'){
      return(
        <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 fade-in">
          <div className="text-xs font-black text-amber-600 mb-3 tracking-wide">рҹ“– н’Җмқҙ кіјм •</div>
          <div className="space-y-2">
            <Row step="м•ҪмҲҳ лӘ©лЎқ">{q.target}мқҳ м•ҪмҲҳ: {divs.join(', ')}</Row>
            <Row step="к°ңмҲҳ"><span className="text-green-700">лӘЁл‘җ {divs.length}к°ң</span></Row>
          </div>
        </div>
      );
    }else if(q.divQType==='notDiv'){
      return(
        <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 fade-in">
          <div className="text-xs font-black text-amber-600 mb-3 tracking-wide">рҹ“– н’Җмқҙ кіјм •</div>
          <div className="space-y-2">
            <Row step="м•ҪмҲҳ лӘ©лЎқ">{q.target}мқҳ м•ҪмҲҳ: {divs.join(', ')}</Row>
            <Row step="нҢҗлі„"><span className="text-red-600">мң„ лӘ©лЎқм—җ м—ҶлҠ” мҲҳ вҶ’ м•ҪмҲҳк°Җ м•„лӢҢ кІғ</span></Row>
          </div>
        </div>
      );
    }else{
      const pairs=[];
      const half=Math.ceil(divs.length/2);
      for(let i=0;i<half;i++){const a=divs[i],b=divs[divs.length-1-i];if(a<=b)pairs.push(`${a} Г— ${b} = ${q.target}`);}
      return(
        <div className="bg-amber-50 border-2 border-amber-200 rounded-2xl p-4 fade-in">
          <div className="text-xs font-black text-amber-600 mb-3 tracking-wide">рҹ“– н’Җмқҙ кіјм •</div>
          <div className="space-y-1">
            <div className="text-xs text-gray-400 font-bold mb-2">кіұм…Ҳ м§қмңјлЎң м°ҫкё°</div>
            {pairs.map((p,i)=><div key={i} className="text-sm font-bold text-indigo-600">{p}</div>)}
            <div className="mt-2 text-sm font-bold text-green-700">м•ҪмҲҳ: {divs.join(', ')}</div>
          </div>
        </div>
      );
    }
  }
  return null;
}

/* ===== м»ӨмҠӨн…Җ мҲ«мһҗ нӮӨнҢЁл“ң ===== */
function NumPadInput({q,ans,setAns,activeField,setActiveField,onConfirmRequest,handleFirstAction}){
  const press=k=>{
    handleFirstAction();
    setAns(v=>{
      const fk=q.hasR?(activeField==='R'?'ansR':'ansQ'):'ansQ';
      const cur=v[fk]||'';
      if(k==='C')return{...v,[fk]:''};
      if(k==='вҶҗ')return{...v,[fk]:cur.slice(0,-1)};
      if(cur.length>=4)return v;
      return{...v,[fk]:cur+k};
    });
  };
  const canSubmit=q.hasR?(ans.ansQ!==''&&ans.ansR!==''):(ans.ansQ!=='');
  const PAD=['7','8','9','4','5','6','1','2','3','C','0','вҶҗ'];
  const padCls=k=>k==='C'?'bg-red-50 border-red-200 text-red-600 text-base':k==='вҶҗ'?'bg-orange-50 border-orange-200 text-orange-600 text-xl':'bg-white border-gray-200 text-gray-800 text-xl';
  return(
    <div className="space-y-3">
      {q.hasR?(
        <div className="flex gap-3">
          <button onClick={()=>setActiveField('Q')} className={`flex-1 py-3 rounded-2xl border-2 text-center transition-all ${activeField==='Q'?'border-indigo-500 bg-indigo-50':'border-gray-200 bg-white'}`}>
            <div className="text-xs text-gray-400 font-bold mb-1">лӘ«</div>
            <div className={`text-2xl font-black ${activeField==='Q'?'text-indigo-700':'text-gray-500'}`}>{ans.ansQ||<span className="opacity-25">_</span>}</div>
          </button>
          <button onClick={()=>setActiveField('R')} className={`flex-1 py-3 rounded-2xl border-2 text-center transition-all ${activeField==='R'?'border-indigo-500 bg-indigo-50':'border-gray-200 bg-white'}`}>
            <div className="text-xs text-gray-400 font-bold mb-1">лӮҳлЁём§Җ</div>
            <div className={`text-2xl font-black ${activeField==='R'?'text-indigo-700':'text-gray-500'}`}>{ans.ansR||<span className="opacity-25">_</span>}</div>
          </button>
        </div>
      ):(
        <div className="w-full py-3 rounded-2xl border-2 border-indigo-400 bg-indigo-50 text-center">
          <div className="text-3xl font-black text-indigo-700">{ans.ansQ||<span className="opacity-25">0</span>}</div>
        </div>
      )}
      <div className="grid grid-cols-3 gap-2">
        {PAD.map(k=>(
          <button key={k} onClick={()=>press(k)}
            className={`py-4 rounded-2xl border font-black shadow-sm active:scale-95 transition-all ${padCls(k)}`}>
            {k}
          </button>
        ))}
      </div>
      <button onClick={()=>{if(canSubmit)onConfirmRequest();}}
        disabled={!canSubmit}
        className={`w-full py-5 rounded-3xl text-xl font-black shadow-lg transition-all ${canSubmit?'bg-gradient-to-r from-indigo-500 to-blue-600 text-white active:scale-95':'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
        нҷ•мқё вң“
      </button>
    </div>
  );
}

function PracticeSession({session,setSession,ver,rangeMin,rangeMax,divMin,divMax,userData,onUpdate,onBack}){
  const seenQKeysRef = React.useRef(new Set()); // м„ём…ҳ лӮҙ м¶ңм ңлҗң л¬ём ң н…ҚмҠӨнҠё м¶”м Ғ
  const[q,setQ]=useState(()=>makeQ(ver,session.qNum,session.divCountIdxs,rangeMin,rangeMax,divMin,divMax,seenQKeysRef.current));
  const[ans,setAns]=useState({ansQ:'',ansR:'',ansDiv:'',ansCount:''});
  const[fb,setFb]=useState(null);
  const[selMC,setSelMC]=useState(null);
  const[mcOpts,setMcOpts]=useState([]);
  // phaseм—җ 'reflection'(м„ұм°°) лӢЁкі„к°Җ м¶”к°Җлҗҳм—ҲмҠөлӢҲлӢӨ.
  const[phase,setPhase]=useState('question'); 
  const[correctCount,setCorrectCount]=useState(0);
  const[wrongCount,setWrongCount]=useState(0);
  const[questions,setQuestions]=useState([]);
  const[startTime]=useState(Date.now());
  const[qStartTime,setQStartTime]=useState(Date.now());
  const[firstActionTime,setFirstActionTime]=useState(null); // мІ« мһ…л Ҙ мӢңк°Ғ м¶”м Ғ
  const[showConfirm,setShowConfirm]=useState(false); // м ңм¶ң нҷ•мқё лӘЁлӢ¬
  const[activeField,setActiveField]=useState('Q');   // мҲ«мһҗнҢЁл“ң нҷңм„ұ н•„л“ң ('Q'|'R')

  // мІ« мһ…л Ҙ мқҙлІӨнҠё н•ёл“Өлҹ¬ (one-at-a-time нҳ•мӢқмқҙлҜҖлЎң м§„м •н•ң л§қм„Өмһ„ мӢңк°„ мёЎм • к°ҖлҠҘ)
  const handleFirstAction=()=>{
    if(firstActionTime===null)setFirstActionTime(Date.now());
  };

  useEffect(()=>{buildMCOpts()},[q]);
  const buildMCOpts=()=>{
    if(!q.isMC){setMcOpts([]);return}
    // exam5: мқҙлҜё choices л°°м—ҙмқҙ мһҲлҠ” лӘЁмқҳкі мӮ¬ нҸ¬л§·
    if(q.category==='exam5'&&q.choices){
      const opts=q.choices.map((c,i)=>({text:c,isC:i===q.answer}));
      setMcOpts(opts);return;
    }
    let opts=[];
    if(q.category==='math'){
      const ansStr=q.hasR?`лӘ«: ${q.ansC}, лӮҳлЁём§Җ: ${q.ansR}`:`${q.ansC}`;
      opts.push({text:ansStr,isC:true});
      while(opts.length<4){const wQ=Math.max(1,q.ansC+randInt(-2,2)||1);const wR=q.hasR?Math.max(0,(q.ansR+randInt(-1,2))%q.b):0;const wStr=q.hasR?`лӘ«: ${wQ}, лӮҳлЁём§Җ: ${wR}`:`${wQ}`;if(!opts.some(o=>o.text===wStr))opts.push({text:wStr,isC:false})}
    }else{
      if(q.divQType==='count'||q.isCount){
        // м•ҪмҲҳ к°ңмҲҳ вҖ” Вұ1В·Вұ2 м ңмҷё, Вұ3 мқҙмғҒ м°ЁмқҙлӮҳлҠ” мҳӨлӢөл§Ң
        const correct=q.divisors.length;
        opts.push({text:`${correct}к°ң`,isC:true});
        const usedNums=new Set([correct]);
        const pool=[];
        for(let d=3;d<=15;d++){if(correct-d>=1)pool.push(correct-d);pool.push(correct+d);}
        shuffle(pool).forEach(c=>{if(opts.length<4&&!usedNums.has(c)){usedNums.add(c);opts.push({text:`${c}к°ң`,isC:false})}});
        let ext=16;while(opts.length<4){const c=correct+ext;if(!usedNums.has(c)){usedNums.add(c);opts.push({text:`${c}к°ң`,isC:false})}ext++}
      }else if(q.divQType==='notDiv'){
        // м•ҪмҲҳ м•„лӢҢ кІғ вҖ” target+1 к°ҷмқҖ л»”н•ң нҢЁн„ҙ л°°м ң, лІ”мң„ м•Ҳ л№„м•ҪмҲҳ м„ нғқ
        const divSet=new Set(q.divisors);
        const cands=[];
        for(let n=2;n<q.target;n++){if(!divSet.has(n))cands.push(n);}
        // target/2 мқҙн•ҳмқҳ л№„м•ҪмҲҳ = м•ҪмҲҳмІҳлҹј ліҙм—¬м„ң лҚ” к·ёлҹҙл“Ҝн•ң мҳӨлӢө
        const plausible=cands.filter(n=>n<=Math.floor(q.target/2)+1);
        const wrongNum=(plausible.length>0?shuffle(plausible):shuffle(cands))[0]||(q.target+2);
        const usedTexts=new Set([String(wrongNum)]);
        opts.push({text:String(wrongNum),isC:true});
        shuffle([...q.divisors]).forEach(d=>{const s=String(d);if(opts.length<4&&!usedTexts.has(s)){usedTexts.add(s);opts.push({text:s,isC:false})}});
      }else{
        // м•ҪмҲҳ лӘЁл‘җ вҖ” SetмңјлЎң мӨ‘ліө мҷ„м „ м°ЁлӢЁ, л»”н•ң л№„м•ҪмҲҳ(targetВұ1) мӮҪмһ… кёҲм§Җ
        const correctStr=q.divisors.join(', ');
        const usedFakes=new Set([correctStr]);
        opts.push({text:correctStr,isC:true});
        const divSet=new Set(q.divisors);
        // Fake 1: мӨ‘к°„ мӣҗмҶҢ м ңкұ°
        if(q.divisors.length>=3){const f1=[...q.divisors];f1.splice(Math.floor(q.divisors.length/2),1);const s=f1.join(', ');if(!usedFakes.has(s)){usedFakes.add(s);opts.push({text:s,isC:false})}}
        // Fake 2: target/2 к·јмІҳ л№„м•ҪмҲҳ мӮҪмһ… (targetВұ1 м ңмҷё)
        let ins=Math.floor(q.target/2);
        while(divSet.has(ins)||Math.abs(ins-q.target)<=1||ins<=1)ins++;
        const f2=[...q.divisors,ins].sort((a,b)=>a-b);const s2=f2.join(', ');
        if(!usedFakes.has(s2)){usedFakes.add(s2);opts.push({text:s2,isC:false})}
        // Fake 3: л§Ҳм§Җл§ү мӣҗмҶҢ м ңкұ°
        if(q.divisors.length>=2){const f3=q.divisors.slice(0,-1);const s3=f3.join(', ');if(!usedFakes.has(s3)){usedFakes.add(s3);opts.push({text:s3,isC:false})}}
        // Fake 4: лӢӨлҘё л№„м•ҪмҲҳ мӮҪмһ… (insмҷҖ лӢӨлҘё к°’)
        if(opts.length<4){let ins2=ins+1;while(divSet.has(ins2)||ins2===ins||Math.abs(ins2-q.target)<=1)ins2++;const f4=[...q.divisors,ins2].sort((a,b)=>a-b);const s4=f4.join(', ');if(!usedFakes.has(s4)){usedFakes.add(s4);opts.push({text:s4,isC:false})}}
      }
    }
    setMcOpts(shuffle(opts));
  };

  const check=()=>{
    let isOk=false;let uAns='',cAns='';
    if(q.isMC){
      if(selMC===null)return;
      isOk=mcOpts[selMC].isC;
      uAns=mcOpts[selMC].text;
      if(q.category==='exam5'){
        cAns=q.choices?.[q.answer]||'';
      } else {
        cAns=q.category==='math'?(q.hasR?`лӘ«: ${q.ansC}, лӮҳлЁём§Җ: ${q.ansR}`:`${q.ansC}`):(q.divQType==='count'||q.isCount?`${q.divisors.length}к°ң`:q.divQType==='notDiv'?mcOpts[selMC].isC?mcOpts[selMC].text:'(м•ҪмҲҳ м•„лӢҢ кІғ)':q.divisors.join(', '));
      }
    } else if(q.category==='math'){
      if(q.hasR){const vQ=parseInt(ans.ansQ),vR=parseInt(ans.ansR);if(isNaN(vQ)||isNaN(vR))return;isOk=vQ===q.ansC&&vR===q.ansR;uAns=`лӘ«: ${vQ}, лӮҳлЁём§Җ: ${vR}`;cAns=`лӘ«: ${q.ansC}, лӮҳлЁём§Җ: ${q.ansR}`}
      else{const vQ=parseInt(ans.ansQ);if(isNaN(vQ))return;isOk=vQ===q.ansC;uAns=`${vQ}`;cAns=`${q.ansC}`}
    }else{
      if(q.isCount){const v=parseInt(ans.ansCount);if(isNaN(v))return;isOk=v===q.divisors.length;uAns=`${v}к°ң`;cAns=`${q.divisors.length}к°ң`}
      else{const raw=ans.ansDiv;if(!raw.trim())return;let arr=raw.split(',').map(v=>parseInt(v.trim())).filter(v=>!isNaN(v));arr=[...new Set(arr)].sort((a,b)=>a-b);isOk=arr.join(',')===q.divisors.join(',');uAns=arr.join(', ')||'(мһ…л Ҙм—ҶмқҢ)';cAns=q.divisors.join(', ')}
    }
    const elapsed=Math.round((Date.now()-qStartTime)/1000);
    const firstActionMs=firstActionTime!=null?firstActionTime-qStartTime:null;
    
    // рҹ”Ҙ н•ҷмҠөл¶„м„қмҡ© л©”нғҖлҚ°мқҙн„° м ҖмһҘ рҹ”Ҙ
    // exam5: лӘЁмқҳкі мӮ¬ нҸ¬л§·мқҙлҜҖлЎң q.metaк°Җ мқҙлҜё мһҲмқҢ (type: 'лҸ„нҳ•кіј кё°н•ҳ' л“ұ)
    const meta = q.category==='exam5'
      ? (q.meta || { category: 'exam5', type: q.topic||'кІҖм •кі мӢң', diff: 'кё°мҙҲ' })
      : { category: q.category, type: q.type || 'м—°мӮ°', diff: q.diff || 'кё°ліё' };
    const topicHash = getTopicHash({meta, topic: meta.type});
    const newQ={qTxt:q.qLogTxt||q.txt, uAns, cAns, isOk, timeSec:elapsed,
      firstClickMs:firstActionMs,  // DailyPractice: м§„м •н•ң л§қм„Өмһ„ мӢңк°„ (one-at-a-time)
      revisionCount:null,          // мһҗмң мһ…л Ҙ нҳ•мӢқ вҶ’ мҲҳм • нҡҹмҲҳ лҜём Ғмҡ©
      qTopicHash:topicHash,
      meta};
    
    const newCorrect=correctCount+(isOk?1:0);const newWrong=wrongCount+(isOk?0:1);
    setCorrectCount(newCorrect);setWrongCount(newWrong);
    setQuestions(prev=>[...prev,newQ]);
    setFb({ok:isOk,msg:isOk?'вң… м •лӢөмһ…лӢҲлӢӨ! мһҳн–Ҳм–ҙмҡ”!':`вқҢ м•„мү¬мӣҢмҡ”! м •лӢөмқҖ ${cAns} мһ…лӢҲлӢӨ.`});
    setPhase('feedback');
    
    // 10л¬ём ң лӢ¬м„ұ мӢң л°”лЎң лҒқлӮҙм§Җ м•Ҡкі  'к°җм • м„ұм°°(reflection)' лӢЁкі„лЎң л„ҳм–ҙк°җ
    if(newCorrect>=10){
      setTimeout(()=>setPhase('reflection'), 1200);
    }
  };

  const finishLesson=async(feeling)=>{
    const totalSec=Math.round((Date.now()-startTime)/1000);
    const today=todayStr();const newActiveDates=[...new Set([...(userData.activeDates||[]),today])];
    const typeMap=['кё°ліё лӮҳлҲ—м…Ҳ','мӢ¬нҷ” лӮҳлҲ—м…Ҳ','нҳјн•© лӮҳлҲ—м…Ҳ','м•ҪмҲҳ кө¬н•ҳкё°','м•ҪмҲҳ(н•ҳл“ң)','кІҖм •кі мӢң мҳҒм—ӯ м—°мҠө'];
    
    // feeling(лӮңмқҙлҸ„ мІҙк°җ) лҚ°мқҙн„° нҸ¬н•Ё м ҖмһҘ
    const log={studentName:userData.name,date:today,time:timeStr(),type:typeMap[ver]||'лӮҳлҲ—м…Ҳ',score:`10 / ${questions.length}`,questions:questions,totalSec, feeling};
    const upd={...userData,totalLessons:(userData.totalLessons||0)+1,todayLessons:(userData.todayLessons||0)+1,todayCorrect:(userData.todayCorrect||0)+correctCount,todayWrong:(userData.todayWrong||0)+wrongCount,lastDate:today,activeDates:newActiveDates,logs:[log,...(userData.logs||[]).slice(0,49)]};
    
    await saveUser(upd);await saveLog(log);onUpdate(upd);
    setPhase('done');
  };

  const nextQ=()=>{
    if(phase==='done'||phase==='reflection'||correctCount>=10)return;
    const nNum=questions.length+1;
    // в”Җв”Җ м„ём…ҳ лӮҙ мӨ‘ліө л°©м§Җ: мқҙлҜё м¶ңм ңлҗң л¬ём ң нӮӨ мҲҳм§‘ в”Җв”Җ
    const seenKeys=new Set(questions.map(pq=>{
      // ver5(exam5): q.q н…ҚмҠӨнҠё кё°мӨҖ, лӮҳлҲ—м…Ҳ: "aГ·b", м•ҪмҲҳ: target
      return pq.meta?.type==='exam5'||pq.category==='exam5' ? pq.qTxt?.slice(0,20)||pq.topic
           : pq.category==='div' ? String(pq.target||pq.qTxt)
           : `${pq.uAns}-${pq.cAns}`;
    }));
    let nQ=null;let tries=0;
    while(tries<8){
      nQ=makeQ(ver,nNum,session.divCountIdxs,rangeMin,rangeMax,divMin,divMax,seenQKeysRef.current);
      const newKey=nQ.category==='exam5'? (nQ.q?.slice(0,20)||nQ.topic)
                 : nQ.category==='div' ? String(nQ.target)
                 : nQ.qLogTxt||`${nQ.a}-${nQ.b}`;
      if(!seenKeys.has(newKey))break;
      tries++;
    }
    setQ(nQ);setAns({ansQ:'',ansR:'',ansDiv:'',ansCount:''});setSelMC(null);setFb(null);setPhase('question');setQStartTime(Date.now());setFirstActionTime(null);setShowConfirm(false);setActiveField('Q');
  };

  if(phase==='done')return<PracticeDone userData={userData} correct={correctCount} wrong={wrongCount} onAgain={()=>{setPhase('question');setCorrectCount(0);setWrongCount(0);setQuestions([]);const nQ=makeQ(ver,1,session.divCountIdxs,rangeMin,rangeMax,divMin,divMax);setQ(nQ);setAns({ansQ:'',ansR:'',ansDiv:'',ansCount:''});setSelMC(null);setFb(null);setQStartTime(Date.now());}} onHome={onBack}/>;

  // рҹ”Ҙ к°җм • м„ұм°° (л©”нғҖмқём§Җ) нҷ”л©ҙ л ҢлҚ”л§Ғ рҹ”Ҙ
  if(phase==='reflection') {
    return(
      <div className="p-4 flex flex-col items-center justify-center min-h-screen text-center pb-36 fade-in">
        <div className="text-7xl mb-6">рҹ§ </div>
        <h2 className="text-2xl font-black text-gray-800 mb-2">10л¬ём ң лӢ¬м„ұ мҷ„лЈҢ!</h2>
        <p className="text-gray-500 mb-8 font-bold text-lg">мҠӨмҠӨлЎң мғқк°Ғн•ҳкё°м—җ<br/>мҳӨлҠҳ н‘ј л¬ём ңл“ӨмқҖ м–ҙл– м…ЁлӮҳмҡ”?</p>
        <div className="flex flex-col gap-4 w-full max-w-xs mx-auto">

function GeometryLearn({sz, userData, onUpdate}){
  const[tab,setTab]=useState('rad');
  const[zoom,setZoom]=useState(1);
  const[panX,setPanX]=useState(0);
  const[panY,setPanY]=useState(0);
  const[fs,setFs]=useState(false); // fullscreen
  const contentRef=useRef(null);
  const[measuredW,setMeasuredW]=useState(0);

  /* в”Җв”Җ нғҗмғү нҷңлҸҷ кі„мёЎ (мІҙлҘҳ мӢңк°„мқҙ м•„лӢҢ 'мғҒнҳёмһ‘мҡ© кё°л°ҳ' мёЎм •) в”Җв”Җ
     В· мІҙлҘҳ мӢңк°„мқҖ мң нңҙ/л°°кІҪ л…ём¶ңмқ„ нҸ¬н•Ён•ҙ н•ҷмҠө мӢ нҳёлЎң л¶Җм Ғм Ҳн•ҳлҜҖлЎң мӮ¬мҡ©н•ҳм§Җ м•ҠмқҢ
     В· лҢҖмӢ  в‘ мӢӨм§Ҳ мЎ°мһ‘ мӢңк°„(мң нңҙ ліҙм •) в‘ЎмғҒнҳёмһ‘мҡ© нҡҹмҲҳ в‘ўнғҗмғүн•ң к°ңл…җ нҸӯмқ„ лҲ„м Ғ
     В· м„ұм·ЁлҸ„к°Җ м•„лӢҢ 'мһҗкё°мЈјлҸ„ нғҗмғүВ·нҳёкё°мӢ¬' м§Җн‘ңлЎң л¶„лҰ¬ мҲҳм§‘ */
  const EXPLORE_IDLE_CAP_MS=60000;  // мғҒнҳёмһ‘мҡ© к°„кІ©мқҙ 60мҙҲ лҜёл§Ңмқј л•Ңл§Ң мӢӨм§Ҳ нҷңлҸҷмңјлЎң мқём •
  const xpRef=useRef({count:0,activeMs:0,lastTs:0,concepts:{}});
  const tabRef=useRef('rad');
  useEffect(()=>{tabRef.current=tab;},[tab]);
  const bumpInteract=useCallback(()=>{
    const x=xpRef.current; const now=Date.now();
    if(x.lastTs){const gap=now-x.lastTs; if(gap>0&&gap<EXPLORE_IDLE_CAP_MS)x.activeMs+=gap;}
    x.lastTs=now; x.count++;
    x.concepts[tabRef.current]=(x.concepts[tabRef.current]||0)+1;
  },[]);
  // мІ« м§„мһ… к°ңл…җлҸ„ н•ң лІҲ кё°лЎқ
  useEffect(()=>{xpRef.current.concepts['rad']=(xpRef.current.concepts['rad']||0);},[]);
  // к·ёлһҳн”„ мҳҒм—ӯмқҳ лӘЁл“  м§Ғм ‘ мЎ°мһ‘(м җ л“ңлһҳк·ёВ·мҠ¬лқјмқҙлҚ” л“ұ)мқ„ лІ„лё”л§ҒмңјлЎң нҸ¬м°©
  useEffect(()=>{
    const el=contentRef.current; if(!el)return;
    const h=()=>bumpInteract();
    el.addEventListener('pointerdown',h,{passive:true});
    el.addEventListener('touchstart',h,{passive:true});
    return()=>{el.removeEventListener('pointerdown',h);el.removeEventListener('touchstart',h);};
  },[bumpInteract,fs]);
  // нғҗн—ҳ мў…лЈҢ мӢң(м–ёл§ҲмҡҙнҠё) лҲ„м Ғм№ҳлҘј мӮ¬мҡ©мһҗ лҚ°мқҙн„°м—җ лі‘н•© м ҖмһҘ
  useEffect(()=>()=>{
    const x=xpRef.current;
    if(!userData||userData.role==='admin')return;
    // мӮ¬мҶҢн•ң л°©л¬ё(мғҒнҳёмһ‘мҡ© 3нҡҢ лҜёл§Ң лҳҗлҠ” мӢӨм§Ҳ нҷңлҸҷ 8мҙҲ лҜёл§Ң)мқҖ кё°лЎқн•ҳм§Җ м•ҠмқҢ вҶ’ л…ёмқҙмҰҲ м°ЁлӢЁ
    if(x.count<3||x.activeMs<8000)return;
    const prev=userData.geoExplore||{sessions:0,totalActiveSec:0,totalInteractions:0,concepts:{}};
    const mergedConcepts={...(prev.concepts||{})};
    Object.keys(x.concepts).forEach(k=>{mergedConcepts[k]=(mergedConcepts[k]||0)+x.concepts[k];});
    const geoExplore={
      sessions:(prev.sessions||0)+1,
      totalActiveSec:(prev.totalActiveSec||0)+Math.round(x.activeMs/1000),
      totalInteractions:(prev.totalInteractions||0)+x.count,
      concepts:mergedConcepts,
      updatedAt:Date.now()
    };
    const upd={...userData,geoExplore};
    try{
      db.collection('users').doc(upd.name).set({geoExplore},{merge:true});
      if(onUpdate)onUpdate(upd);
    }catch(e){/* м ҖмһҘ мӢӨнҢЁлҠ” мЎ°мҡ©нһҲ л¬ҙмӢң (нғҗмғү ліҙмЎ° м§Җн‘ң) */}
  },[userData,onUpdate]);

  useEffect(()=>{
    if(!contentRef.current)return;
    const ro=new ResizeObserver(e=>setMeasuredW(e[0].contentRect.width));
    ro.observe(contentRef.current);
    return()=>ro.disconnect();
  },[]);

  const Active=GEO_TABS.find(t=>t.k===tab)?.C;
  const baseSC=measuredW>0?Math.floor(Math.min(measuredW,sz.W)/13):sz.SC;
  const baseSz={SC:baseSC,W:baseSC*13,H:baseSC*13};
  const onPan=useCallback((px,py)=>{setPanX(px);setPanY(py)},[]);
  const onZoom=useCallback((nz,npx,npy)=>{setZoom(Math.max(0.5,Math.min(3,nz)));if(npx!==undefined)setPanX(Math.max(-12,Math.min(12,npx)));if(npy!==undefined)setPanY(Math.max(-12,Math.min(12,npy)))},[]);
  const zoomedSz=useMemo(()=>({W:baseSz.W,H:baseSz.H,SC:Math.round(baseSz.SC*zoom),panX,panY,zoom,onPan,onZoom}),[baseSz,zoom,panX,panY,onPan,onZoom]);

  const szLive=useRef({});
  szLive.current={SC:Math.round(baseSC*zoom),W:baseSz.W,H:baseSz.H,zoom,panX,panY};
  useEffect(()=>{
    const el=contentRef.current;if(!el)return;
    const onWheel=e=>{
      const svgEl=e.target.closest('svg');if(!svgEl)return;
      e.preventDefault();
      const{SC,W,H,zoom,panX,panY}=szLive.current;
      const r=svgEl.getBoundingClientRect();
      const mx=e.clientX-r.left,my=e.clientY-r.top;
      const midMX=(mx-W/2)/SC+panX,midMY=(H/2-my)/SC+panY;
      const factor=e.deltaY>0?1/1.12:1.12;
      const nz=Math.max(0.5,Math.min(3,zoom*factor));
      const sc=nz/zoom;
      onZoom(nz,Math.max(-12,Math.min(12,midMX+(panX-midMX)/sc)),Math.max(-12,Math.min(12,midMY+(panY-midMY)/sc)));
    };

                {prob.choices.map((ch,j)=>{

                  if(isGraded) {
                    if(sel[i]===j) cls = j===prob.answer ? 'bg-green-100 border-green-400 text-green-800 font-bold' : 'bg-red-100 border-red-400 text-red-700';

                  return <button key={j} onClick={()=>{

      </div>
      
      {/* лӘЁл‘җ н’Җм—Ҳмқ„ л•Ң лӮҳнғҖлӮҳлҠ” [мұ„м җн•ҳкё°] лІ„нҠј */}

          <div className="font-bold text-gray-700 mb-4 text-base">мқҙлІҲ кё°н•ҳн•ҷ нҖҙмҰҲлҠ” м–ҙл– м…ЁлӮҳмҡ”? нҸүк°Җ нӣ„ кё°лЎқмқҙ м ҖмһҘлҗ©лӢҲлӢӨ.</div>

function MockExamTab({userData,onUpdate}){
  const[screen,setScreen]=useState('start');
  const[questions,setQuestions]=useState([]);
  const[sel,setSel]=useState({});
  const[isGraded,setIsGraded]=useState(false);
  const[saved,setSaved]=useState(false);
  const[startTime,setStartTime]=useState(null);
  const[mode,setMode]=useState('');
  // в”Җв”Җ н–үлҸҷ м¶”м Ғ (мӢ к·ң) в”Җв”Җ
  const[firstClickTimes,setFirstClickTimes]=useState({}); // {qIdx: ms from startTime to first click}
  const[revisionCounts,setRevisionCounts]=useState({});   // {qIdx: number of answer changes after first}

  const DOMAIN_GENS={'лӢӨн•ӯмӢқ кі„мӮ°':genMockPoly,'л°©м •мӢқкіј л¶Җл“ұмӢқ':genMockEqInequal,'лҸ„нҳ•кіј кё°н•ҳ':genMockGeometry,'м§‘н•©кіј н•ЁмҲҳ':genMockSetFunc,'нҷ•лҘ кіј нҶөкі„':genMockProbStat};
  const DOMAINS=Object.keys(DOMAIN_GENS);

  const computeStats=(logs)=>{
    const s={};DOMAINS.forEach(d=>s[d]={c:0,t:0});
    (logs||[]).forEach(log=>{
      if(!log.questions)return;
      log.questions.forEach(q=>{
        const type=(q.meta?.type||log.type||'').toLowerCase();
        const cat=(q.meta?.category||'').toLowerCase();
        if(type.includes('лӢӨн•ӯмӢқ')||cat==='poly'||type.includes('лӮҳлҲ—м…Ҳ')||type.includes('лӮҳлЁём§Җ')||type.includes('мқёмҲҳл¶„н•ҙ')||type.includes('н•ӯл“ұмӢқ'))
          {s['лӢӨн•ӯмӢқ кі„мӮ°'].t++;if(q.isOk)s['лӢӨн•ӯмӢқ кі„мӮ°'].c++;}
        else if(type.includes('л°©м •мӢқ')||type.includes('л¶Җл“ұмӢқ')||type.includes('мҠӨнҶ лҰ¬')||type.includes('л¬ёмһҘм ң')||cat==='eq'||cat==='ineq')
          {s['л°©м •мӢқкіј л¶Җл“ұмӢқ'].t++;if(q.isOk)s['л°©м •мӢқкіј л¶Җл“ұмӢқ'].c++;}
        else if(type.includes('кё°н•ҳ')||type.includes('лҸ„нҳ•')||cat==='geometry'||type.includes('лҢҖм№ӯ')||type.includes('кұ°лҰ¬')||type.includes('м§Ғм„ ')||type.includes('лӮҙл¶„'))
          {s['лҸ„нҳ•кіј кё°н•ҳ'].t++;if(q.isOk)s['лҸ„нҳ•кіј кё°н•ҳ'].c++;}
        else if(type.includes('н•ЁмҲҳ')||type.includes('м§‘н•©')||type.includes('лӘ…м ң')||cat==='set'||cat==='func')
          {s['м§‘н•©кіј н•ЁмҲҳ'].t++;if(q.isOk)s['м§‘н•©кіј н•ЁмҲҳ'].c++;}
        else if(type.includes('нҷ•лҘ ')||type.includes('нҶөкі„')||type.includes('мҲңм—ҙ')||type.includes('мЎ°н•©')||cat==='div'||cat==='stat'||type.includes('м•ҪмҲҳ')||type.includes('л°°мҲҳ'))
          {s['нҷ•лҘ кіј нҶөкі„'].t++;if(q.isOk)s['нҷ•лҘ кіј нҶөкі„'].c++;}
      });
    });
    return s;
  };

  const startExam=(examMode)=>{
    setMode(examMode);
    const stats=computeStats(userData.logs||[]);
    const weakDomains=DOMAINS.filter(d=>stats[d].t===0||(stats[d].c/stats[d].t)<0.7);
    const safeGen=(gen)=>{try{const q=gen();return q||null;}catch(e){return null;}};
    let pool=[];
    if(examMode==='weak'){
      const targets=weakDomains.length>0?weakDomains:DOMAINS;
      for(let i=0;i<10;i++){
        const dom=i<7?targets[i%targets.length]:DOMAINS[i%DOMAINS.length];
        const q=safeGen(DOMAIN_GENS[dom]);if(q)pool.push(q);
      }
    }else{
      DOMAINS.forEach(dom=>{for(let j=0;j<2;j++){const q=safeGen(DOMAIN_GENS[dom]);if(q)pool.push(q);}});
      pool=shuffle(pool);
    }
    let safety=0;
    while(pool.length<10&&safety++<50){const q=safeGen(pick(Object.values(DOMAIN_GENS)));if(q)pool.push(q);}
    setQuestions(pool.slice(0,10));setSel({});setIsGraded(false);setSaved(false);setStartTime(Date.now());setScreen('exam');
    setFirstClickTimes({});setRevisionCounts({});
  };

  const saveResult=async(feeling)=>{
    if(saved||!userData)return;
    const totalSec=Math.round((Date.now()-startTime)/1000);
    const correctCount=questions.filter((q,i)=>sel[i]===q.answer).length;
    const qs=questions.map((q,i)=>{
      const fms=firstClickTimes[i]??null;
      return{
        qTxt:q.q.length>70?q.q.slice(0,70)+'вҖҰ':q.q,
        uAns:sel[i]!==undefined?q.choices[sel[i]]:'лҜёмһ…л Ҙ',
        cAns:q.choices[q.answer],
        isOk:sel[i]===q.answer,
        // timeSec: лҰ¬мҠӨнҠё нҳ•мӢқм—җм„ңлҠ” firstClickMs нҷҳмӮ°к°’ мӮ¬мҡ© (к· л“ұл°°л¶„ мҳӨлҘҳ мҲҳм •)
        timeSec:fms!=null?Math.round(fms/1000):null,
        firstClickMs:fms,            // м„ём…ҳ мӢңмһ‘~мІ« м„ нғқ ms
        revisionCount:revisionCounts[i]??0,  // мІ« м„ нғқ нӣ„ ліҖкІҪ нҡҹмҲҳ
        qTopicHash:getTopicHash(q),  // нҒ¬лЎңмҠӨ-н•ҷмғқ м§‘кі„мҡ©
        meta:q.meta
      };
    });
    const typeLabel=mode==='weak'?'рҹ“қ м•Ҫм җ м§‘мӨ‘ лӘЁмқҳкі мӮ¬':'рҹ“қ лһңлҚӨ нҳјн•© лӘЁмқҳкі мӮ¬';
    const log={date:todayStr(),time:timeStr(),type:typeLabel,score:`${correctCount} / 10`,questions:qs,totalSec,feeling};
    const newLogs=[log,...(userData.logs||[])];
    const newTodayLessons=(userData.todayLessons||0)+1;
    const activeDates=[...new Set([...(userData.activeDates||[]),todayStr()])];
    const upd={...userData,logs:newLogs,todayLessons:newTodayLessons,activeDates,lastDate:todayStr()};
    try{
      await db.collection('users').doc(upd.name).set(upd,{merge:true});
      if(onUpdate)onUpdate(upd);
      setSaved(true);
      updateQStats(qs); // fire-and-forget: qStats м§‘кі„ (мӢӨнҢЁн•ҙлҸ„ л¬ҙмӢң)
    }catch(e){alert('м ҖмһҘ мӢӨнҢЁ. мқён„°л„· м—°кІ°мқ„ нҷ•мқён•ҙмЈјм„ёмҡ”.');}
  };

  const ORD=['в‘ ','в‘Ў','в‘ў','в‘Ј'];
  const correctCount=questions.filter((q,i)=>sel[i]===q.answer).length;
  const answered=Object.keys(sel).length;

  if(screen==='start'){
    const stats=computeStats(userData.logs||[]);
    const weakDomains=DOMAINS.filter(d=>stats[d].t===0||(stats[d].c/stats[d].t)<0.7);
    const GRADE_COLOR={0:'bg-gray-200',1:'bg-orange-400',2:'bg-lime-400',3:'bg-green-500',4:'bg-emerald-500'};
    const getGrade=(st)=>{if(st.t===0)return 0;const r=st.c/st.t;return r<0.4?1:r<0.7?2:r<0.9?3:4;};
    const ICONS=['рҹҢұ','рҹҢұ','рҹҢҝ','рҹҢі','рҹҚҺ'];
    return(<div className="p-4 pb-36 space-y-4 fade-in">
      <div className="bg-gradient-to-r from-indigo-600 to-violet-600 rounded-3xl p-6 text-white shadow-lg">
        <h2 className="text-xl font-black mb-1">рҹ“қ кё°м¶ң нҳјн•© лӘЁмқҳкі мӮ¬</h2>
        <p className="text-sm opacity-90">2021~2026 кё°м¶ң нҢЁн„ҙ AI ліҖнҳ• В· л§ӨлІҲ мғҲ л¬ём ң</p>
      </div>
      {weakDomains.length>0&&(<div className="bg-orange-50 border border-orange-200 rounded-2xl p-4">
        <div className="text-sm font-black text-orange-700 mb-2">рҹҺҜ нҳ„мһ¬ м·Ём•Ҫ мҳҒм—ӯ (м •лӢөлҘ  70% лҜёл§Ң)</div>
        <div className="flex flex-wrap gap-2">{weakDomains.map(d=><span key={d} className="bg-orange-100 text-orange-700 text-xs font-bold px-3 py-1.5 rounded-full border border-orange-200">{d}</span>)}</div>
      </div>)}
      <div className="space-y-3">
        <button onClick={()=>startExam('weak')} className="w-full p-5 bg-gradient-to-r from-orange-500 to-red-500 text-white rounded-3xl font-black text-lg shadow-lg active:scale-95 transition-transform">
          рҹҺҜ м•Ҫм җ м§‘мӨ‘ кіөлһө 10л¬ём ң
          <div className="text-xs font-normal opacity-80 mt-1">м·Ём•Ҫ мҳҒм—ӯ м§‘мӨ‘ + кё°м¶ң ліҖнҳ• мһҗлҸҷ м¶ңм ң</div>
        </button>
        <button onClick={()=>startExam('random')} className="w-full p-5 bg-gradient-to-r from-indigo-500 to-blue-600 text-white rounded-3xl font-black text-lg shadow-lg active:scale-95 transition-transform">
          рҹҺІ лһңлҚӨ нҳјн•© лӘЁмқҳкі мӮ¬ 10л¬ём ң
          <div className="text-xs font-normal opacity-80 mt-1">5к°ң мҳҒм—ӯ кіЁкі лЈЁ В· л§ӨлІҲ мғҲ л¬ём ң</div>
        </button>
      </div>
      <div className="bg-white rounded-2xl p-4 shadow-sm border border-gray-100">
        <div className="text-sm font-black text-gray-600 mb-3">рҹҢі лӮҳмқҳ мҲҳн•ҷ лӮҳл¬ҙ мҲІ нҳ„нҷ©</div>
        <div className="space-y-2.5">
          {DOMAINS.map(d=>{
            const st=stats[d];const g=getGrade(st);const rate=st.t===0?0:Math.round((st.c/st.t)*100);
            return(<div key={d} className="flex items-center gap-2">
              <span className="text-base w-5">{ICONS[g]}</span>
              <span className="text-xs font-bold text-gray-700 w-28 flex-shrink-0">{d}</span>
              <div className="flex-1 bg-gray-100 rounded-full h-2.5">
                <div className={`${GRADE_COLOR[g]} h-2.5 rounded-full transition-all`} style={{width:`${st.t===0?4:Math.max(4,rate)}%`}}/>
              </div>
              <span className="text-xs font-bold text-gray-500 w-14 text-right">{st.t===0?'лҜён•ҷмҠө':`${rate}%`}</span>
            </div>);
          })}
        </div>
      </div>
    </div>);
  }

  if(screen==='exam'){
    return(<div className="p-4 pb-36 space-y-4 fade-in">
      <div className="sticky top-0 bg-white border-b py-3 flex items-center gap-3 z-10 -mx-4 px-4 shadow-sm">
        <button onClick={()=>setScreen('start')} className="text-gray-500 text-sm font-bold">вҶҗ лӮҳк°Җкё°</button>
        <span className="flex-1 text-sm font-black text-gray-700">{mode==='weak'?'рҹҺҜ м•Ҫм җ м§‘мӨ‘':'рҹҺІ лһңлҚӨ нҳјн•©'} ({answered}/10)</span>
        {isGraded&&<span className="text-sm font-black text-indigo-600">{correctCount}/10м җ</span>}
      </div>
      {questions.map((q,i)=>{
        const isSel=sel[i]!==undefined,isCorrect=sel[i]===q.answer;
        return(<div key={i} className="bg-white p-5 rounded-3xl shadow-sm border border-gray-100">
          <div className="flex items-center gap-2 mb-3">
            <span className="w-7 h-7 rounded-full bg-indigo-500 text-white text-xs font-black flex items-center justify-center flex-shrink-0">{i+1}</span>
            <span className="text-xs font-bold text-indigo-600 bg-indigo-50 px-2 py-1 rounded-full">{q.topic}</span>
            {isGraded&&isSel&&<span className="ml-auto text-base">{isCorrect?'вң…':'вқҢ'}</span>}
          </div>
          <div className="font-bold text-gray-800 text-sm leading-relaxed mb-3">{q.q}</div>
          {/* кё°н•ҳ л¬ём ң к·ёлһҳн”„ лҜёлҰ¬ліҙкё° */}
          {q.graph&&<div className="flex justify-center mb-2"><GraphPreview q={q}/></div>}
          <div className="grid grid-cols-1 gap-2">
            {q.choices.map((ch,j)=>{
              let cls='bg-gray-50 border-gray-200 text-gray-700';
              if(isGraded){if(sel[i]===j)cls=j===q.answer?'bg-green-100 border-green-400 text-green-800 font-bold':'bg-red-100 border-red-400 text-red-700';else if(j===q.answer)cls='bg-green-50 border-green-300 text-green-700 font-semibold';}
              else if(sel[i]===j)cls='bg-indigo-100 border-indigo-400 text-indigo-800 font-semibold';
              return(<button key={j} onClick={()=>{
                if(isGraded)return;
                const now=Date.now()-startTime;
                // мІ« м„ нғқ: firstClickMs кё°лЎқ
                if(firstClickTimes[i]===undefined) setFirstClickTimes(p=>({...p,[i]:now}));
                // мқҙнӣ„ м„ нғқ: мқҙлҜё лӢӨлҘё лӢө м„ нғқн•ң кІҪмҡ°м—җл§Ң revisionCount++
                else if(sel[i]!==undefined&&sel[i]!==j) setRevisionCounts(p=>({...p,[i]:(p[i]||0)+1}));
                setSel(s=>({...s,[i]:j}));
              }}
                className={`text-left text-base px-4 py-3 rounded-xl border-2 transition-all active:scale-95 ${cls}`}>
                {ORD[j]} <MathText v={ch}/>
              </button>);
            })}
          </div>
          {isGraded&&!isCorrect&&(<div className="mt-3 text-sm bg-red-50 border border-red-200 rounded-xl px-3 py-2 text-red-700 font-bold">м •лӢө: {ORD[q.answer]} <MathText v={q.choices[q.answer]}/></div>)}
        </div>);
      })}
      {answered===10&&!isGraded&&(<div className="fade-in">
        <button onClick={()=>setIsGraded(true)} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-xl shadow-lg active:scale-95 transition-transform">мұ„м җн•ҳкё° рҹ“қ</button>
      </div>)}
      {isGraded&&!saved&&(<div className="bg-white p-6 rounded-3xl shadow-sm text-center border-2 border-indigo-100 fade-in">
        <div className="text-2xl font-black text-indigo-700 mb-1">рҹҺҜ {correctCount}/10 м •лӢө!</div>
        <div className="text-sm text-gray-500 mb-4">мқҙлІҲ лӘЁмқҳкі мӮ¬лҠ” м–ҙл– м…ЁлӮҳмҡ”? нҸүк°Җ нӣ„ кё°лЎқмқҙ м ҖмһҘлҗ©лӢҲлӢӨ.</div>
        <div className="flex gap-2 justify-center">
          <button onClick={()=>saveResult('easy')} className="flex-1 py-4 bg-green-100 text-green-700 rounded-2xl font-black active:scale-95 transition-transform">мү¬мӣ м–ҙмҡ” рҹҳҠ</button>
          <button onClick={()=>saveResult('normal')} className="flex-1 py-4 bg-blue-100 text-blue-700 rounded-2xl font-black active:scale-95 transition-transform">м ҒлӢ№н•ҙмҡ” рҹҳҗ</button>
          <button onClick={()=>saveResult('hard')} className="flex-1 py-4 bg-red-100 text-red-700 rounded-2xl font-black active:scale-95 transition-transform">м–ҙл ӨмӣҢмҡ” рҹҳҘ</button>
        </div>
      </div>)}
      {isGraded&&saved&&(<div className="text-center fade-in space-y-3">
        <div className="inline-block bg-green-100 text-green-700 font-bold px-6 py-4 rounded-2xl">вң… н•ҷмҠө кё°лЎқм—җ м ҖмһҘлҗҳм—ҲмҠөлӢҲлӢӨ!</div>
        <button onClick={()=>setScreen('start')} className="block w-full py-4 bg-indigo-50 text-indigo-600 rounded-2xl font-bold">лӢӨмӢң лҸ„м „н•ҳкё° вҶ’</button>
      </div>)}
    </div>);
  }
  return null;
}

/* ===== STUDENT DASHBOARD ===== */
function StudentDashboard({userData,onLogout,onUpdate}){
  const[tab,setTab]=useState('home');
  const[feedbacks,setFeedbacks]=useState([]);
  const[showFbModal,setShowFbModal]=useState(false);
  const TABS=[{k:'home',icon:'рҹҸ ',lbl:'нҷҲ'},{k:'practice',icon:'вңҸпёҸ',lbl:'л¬ём ңн’Җкё°'},{k:'geometry',icon:'рҹ“җ',lbl:'кё°н•ҳн•ҷ'},{k:'exam',icon:'рҹ“қ',lbl:'лӘЁмқҳкі мӮ¬'},{k:'history',icon:'рҹ“…',lbl:'кё°лЎқ'}];

  // в”Җв”Җ м ‘мҶҚ heartbeat: 30мҙҲл§ҲлӢӨ Firestore onlineStatus к°ұмӢ  в”Җв”Җ
  useEffect(()=>{
    if(userData.role==='admin')return;
    const updateOnline=()=>{
      db.collection('onlineStatus').doc(userData.name).set({
        name:userData.name,
        lastSeen:new Date(),
        ts:Date.now()
      }).catch(()=>{});
    };
    updateOnline();
    const hb=setInterval(updateOnline,30000);
    const clearOnline=()=>{
      db.collection('onlineStatus').doc(userData.name).delete().catch(()=>{});
    };
    window.addEventListener('beforeunload',clearOnline);
    return()=>{clearInterval(hb);clearOnline();window.removeEventListener('beforeunload',clearOnline);};
  },[userData.name,userData.role]);

  // н•ҷмғқ ліёмқёмқҳ н”јл“ңл°ұ л¶Ҳлҹ¬мҳӨкё° л°Ҹ м•ҲмқҪмқҢ м•ҢлҰј мІҙнҒ¬
  useEffect(()=>{
    const fetchFb = async () => {
      try {
        const snap = await db.collection('feedback').where('studentName','==',userData.name).get();
        let arr = [];
        snap.forEach(d=>arr.push({id:d.id, ...d.data()}));
        arr.sort((a,b)=> {
          const timeA = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : new Date(a.createdAt).getTime();
          const timeB = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : new Date(b.createdAt).getTime();
          return timeB - timeA;
        });
        setFeedbacks(arr);
        // м•ҲмқҪмқҖ н”јл“ңл°ұмқҙ н•ҳлӮҳлқјлҸ„ мһҲмңјл©ҙ лӘЁлӢ¬ лқ„мҡ°кё°
        if(arr.some(f => !f.read)) setShowFbModal(true);
      } catch(e) {}
    };
    fetchFb();
  },[userData.name]);

  // нҷ•мқё лІ„нҠј лҲ„лҘҙл©ҙ лӘЁл‘җ мқҪмқҢ мІҳлҰ¬
  const markAllAsRead = async () => {
    const unreads = feedbacks.filter(f => !f.read);
    for(let f of unreads) {
      await db.collection('feedback').doc(f.id).set({read: true}, {merge:true});
    }
    setFeedbacks(prev => prev.map(f => ({...f, read:true})));
    setShowFbModal(false);
  };

  return(<div className="flex flex-col min-h-screen max-w-lg mx-auto bg-gray-50 relative" style={{overflowX:'hidden',width:'100%',maxWidth:'100vw'}}>
    <header className="bg-white border-b px-4 py-3 flex items-center gap-3 sticky top-0 z-20 shadow-sm">
      <div className="text-2xl">рҹҺ“</div>
      <h1 className="text-lg font-black text-gray-800 flex-1">нғңмІӯм•јн•ҷ мҲҳн•ҷл°ҳ</h1>
      <span className="text-sm font-bold text-gray-500">{userData.name}</span>
      <DarkToggle/>
      <button onClick={onLogout} className="text-xs text-gray-400 font-bold px-2 py-1 rounded-lg bg-gray-100">лЎңк·ём•„мӣғ</button>
    </header>
    <div className="flex-1 overflow-auto scroll-body">
      {tab==='home'&&<HomeTab userData={userData} onUpdate={onUpdate} onGoPractice={()=>setTab('practice')}/>}
      {tab==='practice'&&<DailyPracticeTab userData={userData} onUpdate={onUpdate}/>}
      {tab==='geometry'&&<GeometryTab userData={userData} onUpdate={onUpdate}/>}
      {tab==='exam'&&<MockExamTab userData={userData} onUpdate={onUpdate}/>}
      {/* кё°лЎқ нғӯмңјлЎң к°Җм ёмҳЁ н”јл“ңл°ұ лҚ°мқҙн„°лҘј л„ҳкІЁмӨҢ */}
      {tab==='history'&&<HistoryTab userData={userData} feedbacks={feedbacks}/>}
    </div>
    <nav className="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg z-20 max-w-lg mx-auto">
      <div className="flex">{TABS.map(t=><button key={t.k} onClick={()=>setTab(t.k)} className={`flex-1 flex flex-col items-center py-3 gap-1 transition-all ${tab===t.k?'text-indigo-600':'text-gray-400'}`}><span className="text-2xl">{t.icon}</span><span className="text-xs font-bold">{t.lbl}</span></button>)}</div>
      <div className="text-center text-[10px] text-gray-300 font-semibold pb-1 tracking-wide">Made by мҶҢлӘ… рҹҺ“</div>
    </nav>

    {/* н”јл“ңл°ұ лҸ„м°© м•ҢлҰј лӘЁлӢ¬ */}
    {showFbModal && (
      <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
        <div className="bg-white rounded-3xl p-6 shadow-2xl w-full max-w-sm max-h-[80vh] flex flex-col fade-in">
          <div className="text-center mb-4 flex-shrink-0">
            <div className="text-5xl mb-2">рҹ’Ң</div>
            <div className="text-xl font-black text-gray-800">м„ мғқлӢҳмқҳ н”јл“ңл°ұ лҸ„м°©!</div>
            <div className="text-sm text-gray-500 mt-1">мғҲлЎңмҡҙ н”јл“ңл°ұмқ„ нҷ•мқён•ҙліҙм„ёмҡ”.</div>
          </div>
          <div className="space-y-3 mb-6 overflow-y-auto flex-1 p-1">
            {feedbacks.filter(f => !f.read).map(fb => (
              <div key={fb.id} className="bg-indigo-50 rounded-2xl p-4 border border-indigo-100 shadow-sm">
                {fb.relatedLog && <div className="text-xs text-indigo-600 font-black mb-2 bg-white px-2.5 py-1.5 rounded-lg inline-block border border-indigo-100">рҹ“Ӣ {fb.relatedLog}</div>}
                <div className="text-gray-800 font-bold text-base leading-relaxed">{fb.message}</div>
              </div>
            ))}
          </div>
          <button onClick={markAllAsRead} className="w-full py-4 bg-indigo-600 text-white font-black text-lg rounded-2xl active:scale-95 transition-all flex-shrink-0">нҷ•мқён–ҲмҠөлӢҲлӢӨ вң“</button>
        </div>
      </div>
    )}
  </div>);
}

/* ===== TEACHER DASHBOARD ===== */

/* в”Җв”Җ к°қкҙҖм Ғ н•ҷмҠө м§Җн‘ң л¶„м„қ м—”м§„ (v8 мһ¬м„Өкі„) в”Җв”Җ
   м„Өкі„ мӣҗм№ҷ:
   - м¶ңм ңмһҗ мЈјкҙҖ нғңк·ё(getDiffWeight) мҷ„м „ нҸҗкё°
   - н•ҷмғқ н–үлҸҷ лЎңк·ё(firstClickMs, revisionCount, timeSec)м—җм„ң м§Ғм ‘ м¶”м¶ң
   - нҒ¬лЎңмҠӨ-н•ҷмғқ нҶ н”Ҫ нҶөкі„(qStats)лЎң мғҒлҢҖм Ғ лӮңмқҙлҸ„ мёЎм •
   - лҚ°мқҙн„° м—Ҷмқ„ л•Ң "лҚ°мқҙн„° л¶ҖмЎұ" лӘ…мӢң вҶ’ к°Җм§ң м§Җн‘ң н‘ңмӢң кёҲм§Җ

   к°қкҙҖ м§Җн‘ң 4м¶•:
   1. мӢӨм§Ҳ м°ём—¬ м¶”м •      - мң нңҙ м¶”м • нҸ¬н•Ё м„ём…ҳ мӢңк°„ л¶„м„қ (estimateActiveTime)
   2. л§қм„Өмһ„ нҢЁн„ҙ л¶„нҸ¬    - firstClickMs кё°л°ҳ н–үлҸҷ л¶„лҘҳ
   3. лӢөм•Ҳ мҲҳм • нҢЁн„ҙ      - revisionCount кё°л°ҳ н–үлҸҷ л¶„лҘҳ
   4. мҳҒм—ӯ мғҒлҢҖ м„ұм·ЁлҸ„    - qStats(нҒ¬лЎңмҠӨ-н•ҷмғқ) кё°л°ҳ лҸҷм Ғ лӮңмқҙлҸ„ лҢҖл№„ м„ұм·Ё

   + мӢңкі„м—ҙ лӘЁл©ҳн…Җ (мҲңмҲҳ м •лӢөлҘ  м¶”мқҙ, к°қкҙҖ)
*/

// в”Җв”Җ кё°ліё м§‘кі„ (мЈјкҙҖ к°ҖмӨ‘м№ҳ м—Ҷмқҙ мҲңмҲҳ м •лӢөлҘ ) в”Җв”Җ
function calcRawAccuracy(questions){
  if(!questions||questions.length===0)return null;
  const c=questions.filter(q=>q.isOk).length;
  return Math.round((c/questions.length)*100);
}

// в”Җв”Җ мӢңкі„м—ҙ лӘЁл©ҳн…Җ (мҲңмҲҳ м •лӢөлҘ  кё°л°ҳ - к°қкҙҖм Ғ) в”Җв”Җ
function detectMomentum(logs){
  const sessions=logs.slice(0,10)
    .map(l=>calcRawAccuracy(l.questions))
    .filter(v=>v!==null);
  if(sessions.length<3)return{trend:'insufficient',delta:0,sessions};
  const half=Math.floor(sessions.length/2);
  const avgRecent=sessions.slice(0,half).reduce((a,b)=>a+b,0)/half;
  const avgOlder=sessions.slice(half).reduce((a,b)=>a+b,0)/(sessions.length-half);
  const delta=Math.round(avgRecent-avgOlder);
  const trend=delta>=8?'rising':delta<=-8?'declining':'stable';
  return{trend,delta,sessions,avgRecent:Math.round(avgRecent),avgOlder:Math.round(avgOlder)};
}

// в”Җв”Җ л§қм„Өмһ„ нҢЁн„ҙ л¶„нҸ¬ м§‘кі„ в”Җв”Җ
function buildHesitationProfile(logs){
  const base={impulsive:0,fluent:0,effortful:0,struggling:0,moderate:0,unknown:0};
  // DailyPractice(мҲңм°Ё 1л¬ён•ӯм”©) vs ListFormat(кё°н•ҳ/лӘЁмқҳкі мӮ¬ лҸҷмӢң л ҢлҚ”)мқҖ firstClickMs н•ҙм„қмқҙ лӢӨлҰ„
  const isListFormat=t=>t?.includes('лӘЁмқҳкі мӮ¬')||t?.includes('кё°н•ҳ:')||t?.includes('м•Ҫм җ');

  const seq={...base};let seqTotal=0;  // DailyPractice: м§„м§ң л§қм„Өмһ„ мӢңк°„
  const lst={...base};let lstTotal=0;  // ListFormat: м„ём…ҳ лӮҙ м°ём—¬ нғҖмқҙл°Қ

  logs.slice(0,8).forEach(l=>{
    const isList=isListFormat(l.type);
    if(!l.questions)return;
    l.questions.forEach(q=>{
      const cls=classifyHesitation(q.firstClickMs,q.isOk);
      if(isList){lst[cls]=(lst[cls]||0)+1;lstTotal++;}
      else{seq[cls]=(seq[cls]||0)+1;seqTotal++;}
    });
  });
  return{
    seq:{counts:seq,total:seqTotal,hasData:seqTotal>0&&seq.unknown<seqTotal},
    lst:{counts:lst,total:lstTotal,hasData:lstTotal>0&&lst.unknown<lstTotal},
  };
}

// в”Җв”Җ лӢөм•Ҳ мҲҳм • нҢЁн„ҙ л¶„нҸ¬ м§‘кі„ (ListFormat м „мҡ©: DailyPracticeлҠ” revisionCount лҜёмҲҳм§‘) в”Җв”Җ
function buildRevisionProfile(logs){
  const counts={fixated:0,confident:0,uncertain_capable:0,searching:0,reconsidered:0};
  let total=0;
  const isListFormat=t=>t?.includes('лӘЁмқҳкі мӮ¬')||t?.includes('кё°н•ҳ:')||t?.includes('м•Ҫм җ');

  logs.slice(0,8).forEach(l=>{
    if(!isListFormat(l.type))return; // DailyPractice лӘ…мӢңм Ғ м ңмҷё
    if(!l.questions)return;
    l.questions.forEach(q=>{
      if(q.revisionCount===null||q.revisionCount===undefined)return; // кө¬лІ„м „ лЎңк·ё л¬ҙмӢң
      const cls=classifyRevision(q.revisionCount,q.isOk);
      counts[cls]=(counts[cls]||0)+1;
      total++;
    });
  });
  return{counts,total,hasData:total>0};
}

// в”Җв”Җ м„ём…ҳлі„ м°ём—¬ мӢңк°„ м§‘кі„ в”Җв”Җ
function buildActiveTimeSummary(logs){
  let totalActive=0,totalIdle=0,flaggedSessions=0;
  const recentLogs=logs.slice(0,6);
  recentLogs.forEach(l=>{
    if(!l.totalSec)return;
    const qCount=l.questions?.length||10;
    const{activeSec,idleSec,flagged}=estimateActiveTime(l.totalSec,qCount);
    totalActive+=activeSec;
    totalIdle+=idleSec;
    if(flagged)flaggedSessions++;
  });
  return{
    totalActive,totalIdle,flaggedSessions,
    sessionCount:recentLogs.filter(l=>l.totalSec).length,
    avgActiveMin:recentLogs.length>0?Math.round(totalActive/Math.max(recentLogs.filter(l=>l.totalSec).length,1)/60):0
  };
}

/* в”Җв”Җ мһҗкё°мЈјлҸ„ нғҗмғү мҡ”м•Ҫ (к·ёлһҳн”„ нғҗн—ҳ мғҒнҳёмһ‘мҡ© кё°л°ҳ) в”Җв”Җ
   мІҙлҘҳ мӢңк°„ лҢҖмӢ  мғҒнҳёмһ‘мҡ© нҡҹмҲҳВ·мӢӨм§Ҳ мЎ°мһ‘ мӢңк°„В·нғҗмғү к°ңл…җ нҸӯмқ„ м§‘кі„.
   'м„ұм·ЁлҸ„'к°Җ м•„лӢҢ 'нғҗмғү м°ём—¬' м§Җн‘ңмқҙл©°, лҸҷмқј к°ңл…җ нҖҙмҰҲ м •лӢөлҘ кіј м—°кі„ н•ҙм„қмқ„ мң„н•ң
   conceptLinkлҘј н•Ёк»ҳ мӮ°м¶ңн•ңлӢӨ(нғҗмғүмқҙ мӢӨм ң мӢӨл ҘмңјлЎң мқҙм–ҙмЎҢлҠ”м§Җ нҷ•мқён•ҳлҠ” мҡ©лҸ„). */
const GEO_CONCEPT_LABELS={rad:'л¬ҙлҰ¬н•ЁмҲҳ',rat:'мң лҰ¬н•ЁмҲҳ',qua:'мқҙм°Ён•ЁмҲҳ',dis:'м җвҶ”м§Ғм„ ',cir:'мӣҗ',sym:'лҢҖм№ӯмқҙлҸҷ'};
function buildExploreSummary(student){
  const x=student.geoExplore;
  if(!x||!x.sessions)return{has:false};
  const conceptsObj=x.concepts||{};
  const breadth=Object.keys(conceptsObj).filter(k=>conceptsObj[k]>0).length; // нғҗмғүн•ң к°ңл…җ мҲҳ(0~6)
  const activeMin=Math.round((x.totalActiveSec||0)/60*10)/10;
  const perSession=x.sessions>0?Math.round((x.totalInteractions||0)/x.sessions):0;

  // нғҗмғү-м„ұм·Ё м—°кі„: л§Һмқҙ нғҗмғүн•ң к°ңл…җмқҳ кё°н•ҳ нҖҙмҰҲ м •лӢөлҘ мқ„ л§Өм№ӯ
  const logs=student.logs||[];
  const quizByConcept={}; // к°ңл…җлқјлІЁ вҶ’ {c,t}
  logs.forEach(l=>{
    (l.questions||[]).forEach(q=>{
      const t=q.meta?.type; if(!t)return;
      if(!quizByConcept[t])quizByConcept[t]={c:0,t:0};
      quizByConcept[t].t++; if(q.isOk)quizByConcept[t].c++;
    });
  });
  const conceptLink=Object.keys(conceptsObj)
    .filter(k=>conceptsObj[k]>0)
    .map(k=>{
      const lbl=GEO_CONCEPT_LABELS[k]||k;
      const qz=quizByConcept[lbl];
      return{concept:lbl,explores:conceptsObj[k],quizRate:qz&&qz.t>0?Math.round((qz.c/qz.t)*100):null,quizN:qz?qz.t:0};
    })
    .sort((a,b)=>b.explores-a.explores);

  return{has:true,sessions:x.sessions,activeMin,totalInteractions:x.totalInteractions||0,perSession,breadth,conceptLink};
}

// в”Җв”Җ нҒ¬лЎңмҠӨ-н•ҷмғқ qStats лЎңл“ң (л№„лҸҷкё°, көҗмӮ¬ лҢҖмӢңліҙл“ңмҡ©) в”Җв”Җ
async function fetchQStatsForLogs(logs){
  const hashes=new Set();
  logs.slice(0,8).forEach(l=>{
    if(!l.questions)return;
    l.questions.forEach(q=>{if(q.qTopicHash)hashes.add(q.qTopicHash);});
  });
  if(hashes.size===0)return{};
  try{
    const snap=await db.collection('qStats').get();
    const map={};
    snap.forEach(d=>{if(hashes.has(d.id))map[d.id]=d.data();});
    return map;
  }catch(e){return{};}
}

// в”Җв”Җ мҳҒм—ӯ мғҒлҢҖ м„ұм·ЁлҸ„ (qStats кё°л°ҳ) в”Җв”Җ
function buildRelativeMastery(logs,qStats){
  const topicMap={};
  logs.slice(0,8).forEach(l=>{
    if(!l.questions)return;
    l.questions.forEach(q=>{
      const h=q.qTopicHash;
      if(!h)return;
      const topic=q.meta?.type||'кё°нғҖ';
      if(!topicMap[h])topicMap[h]={topic,myTotal:0,myCorrect:0,allTotal:0,allCorrect:0};
      topicMap[h].myTotal++;
      if(q.isOk)topicMap[h].myCorrect++;
      if(qStats[h]){
        topicMap[h].allTotal=qStats[h].total;
        topicMap[h].allCorrect=qStats[h].correct;
      }
    });
  });
  return Object.entries(topicMap)
    .filter(([,v])=>v.myTotal>=2)
    .map(([hash,v])=>{
      const myRate=Math.round((v.myCorrect/v.myTotal)*100);
      const allRate=v.allTotal>=5?Math.round((v.allCorrect/v.allTotal)*100):null; // N<5 лҜёмӢ лў°
      const gap=allRate!=null?myRate-allRate:null;
      return{hash,topic:v.topic,myRate,allRate,gap,myTotal:v.myTotal,allTotal:v.allTotal};
    })
    .sort((a,b)=>a.myRate-b.myRate);
}

// в”Җв”Җ мӢ нҳёл“ұ л¶„лҘҳ (мҲңмҲҳ м •лӢөлҘ  кё°л°ҳ) в”Җв”Җ
function analyzeStudent(sData){
  let daysInactive=999;
  if(sData.lastDate){
    const today=new Date();today.setHours(0,0,0,0);
    const last=new Date(sData.lastDate);last.setHours(0,0,0,0);
    daysInactive=Math.floor((today-last)/(1000*60*60*24));
  }
  let recentAcc=100;
  const logs=sData.logs||[];
  if(logs.length>0){
    const recentQs=logs.slice(0,3).flatMap(l=>l.questions||[]);
    if(recentQs.length>0)recentAcc=Math.round((recentQs.filter(q=>q.isOk).length/recentQs.length)*100);
  }
  let color='light-grn',icon='рҹҹў',text='мҲңн•ӯ мӨ‘';
  if(daysInactive>=5||(recentAcc>0&&recentAcc<40)){color='light-red';icon='рҹ”ҙ';text='м§‘мӨ‘ мјҖм–ҙ н•„мҡ”';}
  else if(daysInactive>=3||(recentAcc>=40&&recentAcc<70)){color='light-yel';icon='рҹҹЎ';text='кІ©л Ө н•„мҡ”';}
  return{daysInactive,recentAcc,status:{color,icon,text}};
}

  const revision=useMemo(()=>buildRevisionProfile(logs),[logs]);

    const exploreTheory  = `м •лӢөмқҙ м—ҶлҠ” нғҗн—ҳнҳ• н•ҷмҠөмқҖ 'м–јл§ҲлӮҳ мҳӨлһҳ лЁёл¬јл ҖлӮҳ'лЎң мёЎм •н•  мҲҳ м—ҶлӢӨ. мІҙлҘҳ мӢңк°„мқҖ м§„м§Җн•ң нғҗмғүВ·л§үнһҳВ·мң нңҙ(л°°кІҪ л…ём¶ң)лҘј кө¬л¶„н•ҳм§Җ лӘ»н•ҙ <b>кө¬мқёнғҖлӢ№лҸ„(construct validity)</b>к°Җ лӮ®кё° л•Ңл¬ёмқҙлӢӨ. лҢҖмӢ  <b>лҠҘлҸҷм Ғ н–үлҸҷ нқ”м Ғ</b>(мЎ°мһ‘ нҡҹмҲҳВ·мң нңҙ ліҙм • нҷңлҸҷ мӢңк°„В·нғҗмғүн•ң к°ңл…җ нҸӯ)мңјлЎң мһҗкё°мЈјлҸ„м„ұкіј нҳёкё°мӢ¬мқ„ мёЎм •н•ңлӢӨ. лӢӨл§Ң нғҗмғүлҹү мһҗмІҙлҠ” <b>м„ұм·Ёк°Җ м•„лӢҲлқј н•ҷмҠөмқҳ м„ н–ү(antecedent) ліҖмҲҳ</b>мқҙлҜҖлЎң, лҸҷмқј к°ңл…җмқҳ нҖҙмҰҲ м •лӢөлҘ кіј м—°кі„н•ҙ 'нғҗмғүмқҙ мӢӨм ң мӢӨл Ҙ н–ҘмғҒмңјлЎң мқҙм–ҙмЎҢлҠ”м§Җ' кІҖмҰқн•ҙм•ј л№„лЎңмҶҢ н•ҷмҠө мӢ нҳёлЎңм„ң мқҳлҜёлҘј к°–лҠ”лӢӨ.`;
    const exploreStudent = !explore.has
      ? `м•„м§Ғ к·ёлһҳн”„ нғҗн—ҳ нҷңлҸҷ кё°лЎқмқҙ м—ҶмҠөлӢҲлӢӨ. мқҙ н•ҷмғқмқҖ нғҗн—ҳ лҸ„кө¬лҘј кұ°мқҳ мӮ¬мҡ©н•ҳм§Җ м•Ҡм•ҳкұ°лӮҳ, мӮ¬мҶҢн•ң л°©л¬ё(мғҒнҳёмһ‘мҡ© 3нҡҢ лҜёл§Ң)л§Ң мһҲм—ҲмҠөлӢҲлӢӨ. к°ңл…җ м„ӨлӘ…мқ„ кёҖлЎңл§Ң мқҪлҠ” кІғліҙлӢӨ м§Ғм ‘ к·ёлһҳн”„лҘј мӣҖм§Ғм—¬ліҙлҠ” кІҪн—ҳмқҙ мӢңк°Ғм Ғ мқҙн•ҙм—җ лҸ„мӣҖмқҙ лҗ©лӢҲлӢӨ.`
      : `мөңк·ј лҲ„м Ғ <b style="color:#2563eb;">${explore.sessions}нҡҢ</b> нғҗн—ҳм—җм„ң <b>${explore.totalInteractions}нҡҢ</b> мғҒнҳёмһ‘мҡ©(м„ём…ҳлӢ№ нҸүк·  ${explore.perSession}нҡҢ), мӢӨм§Ҳ мЎ°мһ‘ мӢңк°„ <b>${explore.activeMin}л¶„</b>мқҙ м§‘кі„лҗҳм—ҲмҠөлӢҲлӢӨ. 6к°ң н•ЁмҲҳ к°ңл…җ мӨ‘ <b>${explore.breadth}к°ң</b>лҘј нғҗмғүн–ҲмҠөлӢҲлӢӨ. ${
          explore.conceptLink.some(c=>c.quizRate!=null)
            ? 'нғҗмғү-м„ұм·Ё м—°кі„: ' + explore.conceptLink.filter(c=>c.quizRate!=null).slice(0,4).map(c=>`<b>${c.concept}</b>(нғҗмғү ${c.explores}нҡҢ В· нҖҙмҰҲ ${c.quizRate}%)`).join(', ') + ' вҖ” нғҗмғүмқҙ л§ҺмқҖ к°ңл…җм—җм„ң м •лӢөлҘ мқҙ н•Ёк»ҳ лҶ’лӢӨл©ҙ нғҗн—ҳмқҙ мӢӨл ҘмңјлЎң м „мқҙлҗҳкі  мһҲлӢӨлҠ” мӢ нҳёмһ…лӢҲлӢӨ.'
            : 'м•„м§Ғ лҸҷмқј к°ңл…җмқҳ нҖҙмҰҲ лҚ°мқҙн„°к°Җ м—Ҷм–ҙ нғҗмғү-м„ұм·Ё м—°кі„лҠ” н‘ңмӢңлҗҳм§Җ м•ҠмҠөлӢҲлӢӨ. нғҗмғүн•ң к°ңл…җмқҳ л¬ём ңм§ҖлҘј н’ҖкІҢ н•ҳл©ҙ м „мқҙ нҡЁкіјлҘј нҷ•мқён•  мҲҳ мһҲмҠөлӢҲлӢӨ.'
        }`;
    const exploreAction = !explore.has
      ? `к°ңл…җ м„ӨлӘ… нғӯл§ҢмңјлЎң мқҙн•ҙк°Җ лҚ”л”ҳ н•ҷмғқм—җкІҢ "рҹ”ӯ к·ёлһҳн”„ нғҗн—ҳ"м—җм„ң мҠ¬лқјмқҙлҚ”лҘј м§Ғм ‘ мӣҖм§Ғм—¬ ліҙлҸ„лЎқ кө¬мІҙм ҒмңјлЎң м•ҲлӮҙн•ҳм„ёмҡ”. мҳҲ: "л¬ҙлҰ¬н•ЁмҲҳм—җм„ң pк°’мқ„ л°”кҫёл©ҙ к·ёлһҳн”„к°Җ м–ҙл””лЎң мӣҖм§ҒмқҙлҠ”м§Җ м§Ғм ‘ нҷ•мқён•ҙ ліҙм„ёмҡ”."`
      : explore.breadth >= 3
      ? `нғҗмғүмқҙ нҷңл°ңн•©лӢҲлӢӨ. <b>нғҗмғүлҹүмқҖ м„ұм·Ёк°Җ м•„лӢҲлҜҖлЎң</b> м№ӯм°¬мқҖ 'мӢңлҸ„' мһҗмІҙм—җ н•ңм •н•ҳкі , л§Һмқҙ нғҗмғүн•ң к°ңл…җмқҳ нҖҙмҰҲ м •лӢөлҘ мқҙ н•Ёк»ҳ мҳӨлҘҙлҠ”м§ҖлҘј мӢӨнҡЁм„ұ нҢҗлӢЁ кё°мӨҖмңјлЎң мӮјмңјм„ёмҡ”. нғҗмғүмқҖ нҷңл°ңн•ңлҚ° м •лӢөлҘ мқҙ м •мІҙлҗҳм–ҙ мһҲлӢӨл©ҙ, мЎ°мһ‘мқҖ н•ҳлҗҳ мӣҗлҰ¬лҘј м–ём–ҙнҷ”н•ҳм§Җ лӘ»н•ҳлҠ” лӢЁкі„мқј мҲҳ мһҲм–ҙ м§§мқҖ кө¬л‘җ м„ӨлӘ…мқ„ лҚ§л¶ҷмқҙкІҢ н•ҳм„ёмҡ”.`
      : `нғҗмғүмқҙ н•ңл‘җ к°ңл…җм—җ м№ҳмҡ°міҗ мһҲмҠөлӢҲлӢӨ. м•„м§Ғ л§Ңм ёліҙм§Җ м•ҠмқҖ к°ңл…җмқ„ м§Ғм ‘ мЎ°мһ‘н•ҳлҸ„лЎқ к¶Ңн•ҳкі , нғҗмғү нӣ„ "л¬ҙм—Үмқ„ л°ңкІ¬н–ҲлҠ”м§Җ" н•ң л¬ёмһҘмңјлЎң л§җн•ҙліҙкІҢ н•ҳл©ҙ нғҗмғүмқҙ лҠҘлҸҷм Ғ мқҙн•ҙлЎң м—°кІ°лҗ©лӢҲлӢӨ.`;
    const exploreWarn = `мқҙ м§Җн‘ңлҠ” <b>м°ём—¬В·нҳёкё°мӢ¬мқҳ н–үлҸҷ нқ”м Ғ</b>мқј лҝҗ м„ұм·ЁлҸ„к°Җ м•„лӢҷлӢҲлӢӨ. нғҗмғүлҹүмқҙ л§ҺлӢӨкі  мӢӨл Ҙмқҙ ліҙмһҘлҗҳм§Җ м•Ҡмңјл©°, л°ҳл“ңмӢң лҸҷмқј к°ңл…җмқҳ нҖҙмҰҲ м •лӢөлҘ кіј н•Ёк»ҳ н•ҙм„қн•ҙм•ј н•©лӢҲлӢӨ. лҳҗн•ң мӮ¬мҶҢн•ң л°©л¬ё(мғҒнҳёмһ‘мҡ© 3нҡҢ лҜёл§ҢВ·8мҙҲ лҜёл§Ң)мқҖ л…ёмқҙмҰҲ м°ЁлӢЁмқ„ мң„н•ҙ м§‘кі„м—җм„ң м ңмҷёлҗ©лӢҲлӢӨ.`;

    // мҳҒм—ӯлі„ м„ұм·ЁлҸ„ мғҒм„ё н–ү
    const masteryDetailRows2 = relativeMastery.length === 0
      ? `<tr><td colspan="5" style="text-align:center;padding:20px;color:#94a3b8;font-size:11px;line-height:1.8;">
           м•„м§Ғ мҳҒм—ӯлі„ л№„көҗ лҚ°мқҙн„°к°Җ м¶©л¶„н•ҳм§Җ м•ҠмҠөлӢҲлӢӨ.<br/>
           <b>кІҖм •кі мӢң мҳҒм—ӯ м—°мҠөВ·лӘЁмқҳкі мӮ¬В·кё°н•ҳ л¬ём ңм§Җ</b>лҘј к°Ғ мҳҒм—ӯ 5л¬ён•ӯ мқҙмғҒ н’Җл©ҙ мқҙ м„№м…ҳмқҙ нҷңм„ұнҷ”лҗ©лӢҲлӢӨ.
         </td></tr>`
      : relativeMastery.map((m, idx) => {
          const sc  = m.myRate ?? 0;
          const clr = sc >= 80 ? '#16a34a' : sc >= 60 ? '#d97706' : '#dc2626';
          const lv  = sc >= 95 ? 'мҡ°мҲҳ' : sc >= 80 ? 'м–‘нҳё' : sc >= 60 ? 'л°ңм „ мӨ‘' : 'ліҙм¶© н•„мҡ”';
          const reliable = m.myTotal >= 5;
          const interpText = !reliable
            ? `${m.myTotal}л¬ён•ӯл§Ң н’Җм–ҙ <b>мӢ лў°лҸ„ лӮ®мқҢ</b>. мөңмҶҢ 5л¬ён•ӯ мқҙмғҒ н•„мҡ”`
            : sc >= 80
            ? `н•өмӢ¬ к°ңл…җ мқҙн•ҙк°Җ м¶©л¶„н•©лӢҲлӢӨ. мӢ¬нҷ” мқ‘мҡ© л¬ём ң лҸ„м „мқ„ к¶ҢмһҘн•©лӢҲлӢӨ`
            : sc >= 60
            ? `кё°ліё к°ңл…җмқҖ мһҲмңјлӮҳ мқ‘мҡ© мӢӨмҲҳк°Җ мһҲмҠөлӢҲлӢӨ. мҳӨлӢө мң нҳ• л¶„лҘҳ нӣ„ м§‘мӨ‘ ліҙм¶©н•ҳм„ёмҡ”`
            : `к°ңл…җ мқҙн•ҙк°Җ л¶ҖмЎұн•©лӢҲлӢӨ. көҗкіјм„ң кё°ліё к°ңл…җл¶Җн„° лӢЁкі„м ҒмңјлЎң мһ¬м ‘к·јн•ҳм„ёмҡ”`;
          const tips = {
            'л¬ҙлҰ¬н•ЁмҲҳ':    'к·ёлһҳн”„ нғҗн—ҳ лҸ„кө¬лЎң нҸүн–үмқҙлҸҷ нҢЁн„ҙмқ„ мӢңк°Ғм ҒмңјлЎң л°ҳліө нҷ•мқён•ҳм„ёмҡ”',
            'мң лҰ¬н•ЁмҲҳ':    'м җк·јм„  к°ңл…җмқ„ лЁјм Җ нҷ•мқён•ң л’Ө к·ёлһҳн”„ нҳ•нғңмҷҖ м—°кІ°н•ҳм„ёмҡ”',
            'мқҙм°Ён•ЁмҲҳ':    'кјӯм§“м җ мўҢн‘ң кіөмӢқкіј к·ёлһҳн”„мқҳ кҙҖкі„лҘј м§Ғм ‘ к·ёл Ө нҷ•мқён•ҳм„ёмҡ”',
            'мӣҗмқҳ л°©м •мӢқ': 'мӨ‘мӢ¬кіј л°ҳм§ҖлҰ„ к°ңл…җ нҷ•мқё нӣ„ мўҢн‘ңнҸүл©ҙм—җ м§Ғм ‘ мӣҗмқ„ к·ёл Өліҙм„ёмҡ”',
            'лҢҖм№ӯмқҙлҸҷ':    'xм¶•В·yм¶•В·мӣҗм җ лҢҖм№ӯ 3к°Җм§ҖлҘј н‘ңлЎң м •лҰ¬н•ҙ л№„көҗн•ҳм„ёмҡ”',
            'м җкіј м§Ғм„  кұ°лҰ¬': 'кіөмӢқ м•”кё°ліҙлӢӨ мң лҸ„ кіјм •мқ„ н•ҷмғқмқҙ м§Ғм ‘ м„ӨлӘ…н•ҳкІҢ н•ҙліҙм„ёмҡ”',
            'лҸ„нҳ•кіј кё°н•ҳ': 'лҸ„нҳ• л¬ём ңлҠ” л°ҳл“ңмӢң к·ёлҰјмқ„ к·ёлҰ¬кі  мўҢн‘ңлҘј н‘ңмӢңн•ҳлҠ” мҠөкҙҖмқ„ л“Өмқҙм„ёмҡ”',
            'м§‘н•©кіј н•ЁмҲҳ': 'м§‘н•© кё°нҳё(вҲӘвҲ©)лҘј лІӨлӢӨмқҙм–ҙк·ёлһЁмңјлЎң мӢңк°Ғнҷ”н•ҙ мқҙн•ҙлҘј лҸ•м„ёмҡ”',
            'нҷ•лҘ кіј нҶөкі„': 'мҲңм—ҙВ·мЎ°н•©мқҳ м°ЁмқҙлҘј мӢӨмғқнҷң мӮ¬лЎҖлЎң кө¬л¶„н•ҳм—¬ м„ӨлӘ…н•ҳм„ёмҡ”',
          };
          const tip = tips[m.topic] || 'кҙҖл Ё лӢЁмӣҗ л¬ём ңлҘј м¶”к°ҖлЎң м ңкіөн•ҳм„ёмҡ”';
          const gapStr = m.gap != null ? (m.gap >= 0 ? '+' : '') + m.gap + '%p' : 'вҖ“';
          const gapClr = m.gap != null && m.gap < 0 ? '#dc2626' : '#16a34a';
          return `<tr style="background:${idx%2===0?'white':'#f8fafc'};">
            <td style="padding:7px 9px;font-weight:700;border:1px solid #e2e8f0;vertical-align:middle;">${m.topic}</td>
            <td style="padding:7px 8px;text-align:center;border:1px solid #e2e8f0;vertical-align:middle;">
              <div style="font-size:16px;font-weight:900;color:${clr};">${sc}%</div>
              <div style="font-size:9px;color:#94a3b8;">${m.myTotal}л¬ён•ӯ${!reliable?' вҡ пёҸ':''}</div>
            </td>
            <td style="padding:7px 8px;text-align:center;border:1px solid #e2e8f0;vertical-align:middle;font-weight:700;font-size:10.5px;color:${clr};">${lv}</td>
            <td style="padding:7px 8px;text-align:center;border:1px solid #e2e8f0;vertical-align:middle;font-size:10.5px;">
              <div style="color:${gapClr};font-weight:700;">${gapStr}</div>
              <div style="color:#94a3b8;font-size:9px;">${m.allRate!=null?m.allRate+'% нҸүк· ':'л№„көҗл¶Ҳк°Җ'}</div>
            </td>
            <td style="padding:7px 9px;border:1px solid #e2e8f0;vertical-align:top;font-size:10px;color:#334155;line-height:1.6;">
              <div style="margin-bottom:3px;">${interpText}</div>
              <div style="color:#6366f1;font-size:9.5px;">рҹ’Ў ${tip}</div>
            </td>
          </tr>`;
        }).join('');

    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    // page3a: нҳ„нҷ© м§Җн‘ң мғҒм„ё н•ҙм„Ө
    // в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ
    const page3a = `
    <div style="width:794px;min-height:1123px;background:white;padding:34px 40px;box-sizing:border-box;font-family:'Noto Sans KR',sans-serif;color:#1e293b;">

      ${pageHeader2('нҳ„нҷ© м§Җн‘ң мғҒм„ё н•ҙм„Ө', '3/5')}

      ${sH2('рҹ“Ҡ','нҳ„нҷ© м§Җн‘ң')}

      ${dc('нҳ„мһ¬ мғҒнғң', 'нҳ„мһ¬ мғҒнғң',

      ${dc('мөңк·ј м •лӢөлҘ ', 'мөңк·ј м •лӢөлҘ ',

      ${dc('н•ҷмҠө лӘЁл©ҳн…Җ', 'н•ҷмҠө лӘЁл©ҳн…Җ',
        `${momentumInfo.icon} ${momentumInfo.label} ${momentumInfo.delta}`, momColor,
        momFormula, momTheory, momStudent, momAction)}

      <!-- н‘ён„° -->
      <div style="border-top:1px solid #e2e8f0;padding-top:7px;margin-top:10px;text-align:center;color:#94a3b8;font-size:9px;">
        ліё лҰ¬нҸ¬нҠёлҠ” нғңмІӯм•јн•ҷ мҲҳн•ҷл°ҳ AI н•ҷмҠө л¶„м„қ м—”м§„м—җ мқҳн•ҙ мһҗлҸҷ мғқм„ұлҗҳм—ҲмҠөлӢҲлӢӨ. В· м¶ңл Ҙмқј: ${new Date().toLocaleDateString('ko-KR')}

                          <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded-full border ${rCls}`}>
                            вҶ© {q.revisionCount}нҡҢ мҲҳм •
                          </span>
                        )}
                        {q.timeSec!=null&&q.timeSec>0&&!q.firstClickMs&&(
                          <span className="text-[10px] text-gray-400 font-bold">вҸұпёҸ{q.timeSec}мҙҲ</span>
                        )}
                      </div>
                      {!q.isOk&&<div className="mt-1.5 pl-6 text-gray-500">лӮҙ лӢө: {q.uAns} вҶ’ <span className="text-red-600 font-bold">{q.cAns}</span></div>}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        );
      })}
    </div>)}
  </div>);
}

function WorksheetTab(){

  const[wsList,setWsList]=useState([]);const[loading,setLoading]=useState(false);const[toast,setToast]=useState('');

  const[editingWsId, setEditingWsId] = useState(null);
  const[editTitle, setEditTitle] = useState('');

  // лӘЁмқҳкі мӮ¬ л¬ём ңм§Җ м „мҡ© мғҒнғң
  const[examSheet,setExamSheet]=useState(null); // мғқм„ұлҗң л¬ём ңм§Җ лҜёлҰ¬ліҙкё°
  const[examMode,setExamMode]=useState('random'); // 'random' | 'weak'
  const[targetStudent,setTargetStudent]=useState(''); // м·Ём•Ҫм җ л¶„м„қ лҢҖмғҒ н•ҷмғқ

  // мұ„м җ(Grading) м „мҡ© мғҒнғң
  const[gradeModal, setGradeModal] = useState(null);
  const[studentList, setStudentList] = useState([]);
  const[selStudent, setSelStudent] = useState('');
  const[grades, setGrades] = useState({});

  const TYPE_DESC={div:'м„ё мһҗлҰ¬ мҲҳ Г· л‘җ мһҗлҰ¬ мҲҳ (к°ҖлЎңм…Ҳ, лӮҳлЁём§Җ мһҲмқҢ)',gcd:'л‘җ мҲҳмқҳ м•ҪмҲҳ, кіөм•ҪмҲҳ, мөңлҢҖкіөм•ҪмҲҳ кө¬н•ҳкё°',lcm:'л‘җ мҲҳмқҳ л°°мҲҳ 7к°ңм”©, кіөл°°мҲҳ, мөңмҶҢкіөл°°мҲҳ кө¬н•ҳкё°',story:'мҙҲ3~мҙҲ4 л§һм¶Өнҳ• мҠӨнҶ лҰ¬н…”л§Ғ л¬ёмһҘм ң л¬ём ң',mock:'2021~2026 кі мЎё кІҖм •кі мӢң мҲҳн•ҷ кё°м¶ң мң нҳ• ліҖнҳ• (10л¬ён•ӯ мӮ¬м§Җм„ лӢӨ)',geo:'кё°н•ҳн•ҷ 6нҢҢнҠё (л¬ҙлҰ¬/мң лҰ¬/мқҙм°Ён•ЁмҲҳВ·кұ°лҰ¬В·мӣҗВ·лҢҖм№ӯмқҙлҸҷ) мӮ¬м§Җм„ лӢӨ л¬ём ң'};

  // мҳҒм—ӯлі„ м •лӢөлҘ  кі„мӮ° (н•ҷмғқ лЎңк·ё кё°л°ҳ)
  const DOMAINS_T=['лӢӨн•ӯмӢқ кі„мӮ°','л°©м •мӢқкіј л¶Җл“ұмӢқ','лҸ„нҳ•кіј кё°н•ҳ','м§‘н•©кіј н•ЁмҲҳ','нҷ•лҘ кіј нҶөкі„'];
  const DOMAIN_GENS_T={'лӢӨн•ӯмӢқ кі„мӮ°':genMockPoly,'л°©м •мӢқкіј л¶Җл“ұмӢқ':genMockEqInequal,'лҸ„нҳ•кіј кё°н•ҳ':genMockGeometry,'м§‘н•©кіј н•ЁмҲҳ':genMockSetFunc,'нҷ•лҘ кіј нҶөкі„':genMockProbStat};
  const computeStatsT=(logs)=>{
    const s={};DOMAINS_T.forEach(d=>s[d]={c:0,t:0});
    (logs||[]).forEach(log=>{
      if(!log.questions)return;
      log.questions.forEach(q=>{
        const type=(q.meta?.type||log.type||'').toLowerCase();
        const cat=(q.meta?.category||'').toLowerCase();
        if(type.includes('лӢӨн•ӯмӢқ')||cat==='poly'||type.includes('н•ӯл“ұмӢқ')||type.includes('мқёмҲҳл¶„н•ҙ')||type.includes('лӮҳлЁём§Җ'))
          {s['лӢӨн•ӯмӢқ кі„мӮ°'].t++;if(q.isOk)s['лӢӨн•ӯмӢқ кі„мӮ°'].c++;}
        else if(type.includes('л°©м •мӢқ')||type.includes('л¶Җл“ұмӢқ')||cat==='eq'||cat==='ineq')
          {s['л°©м •мӢқкіј л¶Җл“ұмӢқ'].t++;if(q.isOk)s['л°©м •мӢқкіј л¶Җл“ұмӢқ'].c++;}
        else if(type.includes('кё°н•ҳ')||type.includes('лҸ„нҳ•')||cat==='geometry')
          {s['лҸ„нҳ•кіј кё°н•ҳ'].t++;if(q.isOk)s['лҸ„нҳ•кіј кё°н•ҳ'].c++;}
        else if(type.includes('н•ЁмҲҳ')||type.includes('м§‘н•©')||type.includes('лӘ…м ң')||cat==='set'||cat==='func')
          {s['м§‘н•©кіј н•ЁмҲҳ'].t++;if(q.isOk)s['м§‘н•©кіј н•ЁмҲҳ'].c++;}
        else if(type.includes('нҷ•лҘ ')||type.includes('мҲңм—ҙ')||type.includes('мЎ°н•©')||cat==='stat')
          {s['нҷ•лҘ кіј нҶөкі„'].t++;if(q.isOk)s['нҷ•лҘ кіј нҶөкі„'].c++;}
      });
    });
    return s;
  };

  // лӘЁмқҳкі мӮ¬ л¬ём ңм§Җ мғқм„ұ
  const createExamSheet=()=>{
    const safeGen=(gen)=>{try{const q=gen();return q||null;}catch(e){return null;}};
    let pool=[];
    if(examMode==='weak'&&targetStudent){
      const stu=studentList.find(s=>s.name===targetStudent);
      const stats=stu?computeStatsT(stu.logs||[]):{};
      const weakDomains=DOMAINS_T.filter(d=>!stats[d]||stats[d].t===0||(stats[d].c/stats[d].t)<0.7);
      const targets=weakDomains.length>0?weakDomains:DOMAINS_T;
      // в”Җв”Җ м·Ём•Ҫм җ лӘЁл“ң мӨ‘ліө л°©м§Җ: нҶ н”Ҫ + л¬ём ң н…ҚмҠӨнҠё кё°мӨҖ в”Җв”Җ
      const seenQ=new Set();
      let safety=0;
      while(pool.length<10&&safety<60){
        safety++;
        const dom=targets[pool.length%targets.length];
        const q=safeGen(DOMAIN_GENS_T[dom]);
        if(q){
          const qKey=`${q.topic}::${q.q?.slice(0,30)||''}`;
          if(!seenQ.has(qKey)){seenQ.add(qKey);pool.push(q);}
        }
      }
    }else{
      // в”Җв”Җ лһңлҚӨ лӘЁл“ң: нҶ н”Ҫ мӨ‘ліө л°©м§Җ + л¬ём ң н…ҚмҠӨнҠё мӨ‘ліө л°©м§Җ в”Җв”Җ
      const usedTopics=new Set();
      const usedQTexts=new Set();
      DOMAINS_T.forEach(dom=>{
        let added=0,retries=0;
        while(added<2&&retries<15){
          const q=safeGen(DOMAIN_GENS_T[dom]);
          if(q){
            const qKey=`${q.topic}::${q.q?.slice(0,30)||''}`;
            const topicOk=!usedTopics.has(q.topic);
            const textOk=!usedQTexts.has(qKey);
            if(topicOk&&textOk){
              usedTopics.add(q.topic);usedQTexts.add(qKey);pool.push(q);added++;
            } else if(retries>=13&&textOk){
              // нҶ н”Ҫ мӨ‘ліөмқҖ н—Ҳмҡ©н•ҳлҗҳ л¬ём ң н…ҚмҠӨнҠё мӨ‘ліөмқҖ лҒқк№Ңм§Җ л°©м§Җ
              usedQTexts.add(qKey);pool.push(q);added++;
            }
          }
          retries++;
        }
      });
      pool=shuffle(pool);
    }
    let safety=0;
    const usedTopicsAll=new Set(pool.map(q=>q.topic));
    const usedQAll=new Set(pool.map(q=>`${q.topic}::${q.q?.slice(0,30)||''}`));
    while(pool.length<10&&safety++<30){
      const q=safeGen(pick(Object.values(DOMAIN_GENS_T)));
      if(q){
        const qKey=`${q.topic}::${q.q?.slice(0,30)||''}`;
        if(!usedQAll.has(qKey)){usedTopicsAll.add(q.topic);usedQAll.add(qKey);pool.push(q);}
        else if(safety>20){usedQAll.add(qKey);pool.push(q);} // мөңнӣ„ мҲҳлӢЁ
      }
    }
    const t=title.trim()||`кІҖм •кі мӢң лӘЁмқҳкі мӮ¬ (${todayStr()})`;
    const mode=examMode==='weak'&&targetStudent?`м·Ём•Ҫм җ кіөлһө - ${targetStudent} н•ҷмғқ`:'лһңлҚӨ нҳјн•©';
    setExamSheet({title:t,mode,questions:pool.slice(0,10)});
    setExamSaved(false);
  };

  // лӘЁмқҳкі мӮ¬ л¬ём ңм§Җ мқёмҮ„ (лёҢлқјмҡ°м Җ н”„лҰ°нҠё)
  const printExamSheet=(showAns)=>{
    if(!examSheet)return;
    const ORD=['в‘ ','в‘Ў','в‘ў','в‘Ј'];
    let html=`<html><head><style>
      body{font-family:'Noto Sans KR',sans-serif;padding:32px;color:#111;}
      h1{text-align:center;font-size:22px;border-bottom:2px solid #000;padding-bottom:10px;margin-bottom:6px;}
      .meta{text-align:center;font-size:12px;color:#666;margin-bottom:24px;}

      .choices{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;margin-left:16px;}
      .choice{font-size:13px;padding:4px 0;}

    </style></head><body>
    <h1>${examSheet.title}</h1>
    <div class="meta">м¶ңм ң л°©мӢқ: ${examSheet.mode} В· мҙқ 10л¬ён•ӯ В· кІҖм •кі мӢң кё°м¶ң ліҖнҳ•</div>`;
    examSheet.questions.forEach((q,i)=>{
      html+=`<div class="q">
        <div><span class="qnum">${i+1}.</span>${q.q}<span class="qtag">${q.topic}</span></div>
        <div class="choices">${q.choices.map((c,j)=>`<div class="choice">${ORD[j]} ${c}</div>`).join('')}</div>
        <div class="ans">м •лӢө: ${ORD[q.answer]} ${q.choices[q.answer]}</div>
      </div>`;
    });
    html+=`</body></html>`;
    const w=window.open('','_blank','width=800,height=900');
    w.document.write(html);w.document.close();
    setTimeout(()=>w.print(),400);
  };

  // лӘЁмқҳкі мӮ¬ л¬ём ңм§Җ Firestore м ҖмһҘ
  const[examSaved,setExamSaved]=useState(false);
  const saveExamSheet=async()=>{
    if(!examSheet||examSaved)return;
    try{
      const ws={title:examSheet.title,wsType:'mock',mode:examSheet.mode,questions:examSheet.questions,createdAt:new Date()};

      setExamSaved(true);
      showToast('вң… м ҖмһҘлҗң л¬ём ңм§Җм—җ м¶”к°Җлҗҳм—ҲмҠөлӢҲлӢӨ!');
      loadWsList();
    }catch(e){showToast('вқҢ м ҖмһҘ мӢӨнҢЁ. мқён„°л„·мқ„ нҷ•мқён•ҳм„ёмҡ”.');}
  };

  useEffect(()=>{
    db.collection('users').where('role','==','student').get().then(snap => {
       const arr = []; snap.forEach(d => arr.push(d.data())); setStudentList(arr);
    });
    loadWsList(); // н•ҷмҠөм§Җ нғӯ мІ« м§„мһ… мӢң л¬ём ңм§‘ нҸҙлҚ” мһҗлҸҷ лЎңл”©(мғҲлЎңкі м№Ё л¶Ҳн•„мҡ”)
  },[]);
  
  const loadWsList=async()=>{try{const snap=await db.collection('worksheets').orderBy('createdAt','desc').limit(30).get();const arr=[];snap.forEach(d=>arr.push({id:d.id,...d.data()}));setWsList(arr)}catch(e){}};
  const showToast=msg=>{setToast(msg);setTimeout(()=>setToast(''),2500)};

  const handleRatioChange = (op, val) => {
    let newVal = Math.max(0, parseInt(val) || 0);
    setOpRatios(prev => ({ ...prev, [op]: newVal }));
  };

  const create=async()=>{
    if (wsType === 'story') {
      const totalRatio = opRatios.add + opRatios.sub + opRatios.mul + opRatios.div;
      if (totalRatio !== 100) { showToast(`вқҢ л№„мңЁмқҳ н•©мқҙ 100%к°Җ лҗҳм–ҙм•ј н•©лӢҲлӢӨ! (нҳ„мһ¬: ${totalRatio}%)`); return; }
    }
    if(wsType==='mock'||wsType==='geo'){showToast('лЁјм Җ [мғқм„ұ вҶ’] лІ„нҠјмңјлЎң л¬ём ңлҘј л§Ңл“  нӣ„ м ҖмһҘн•ҳм„ёмҡ”.');setLoading(false);return;}
    setLoading(true);try{
      let qs=[];
      if (wsType === 'story') qs = generateStoryWorksheet(storyCounts, opRatios);
      else {
        // в”Җв”Җ н•ҷмҠөм§Җ мӨ‘ліө л°©м§Җ: к°ҷмқҖ (a,b) мҢҚмқҙ лӮҳмҳӨм§Җ м•ҠлҸ„лЎқ в”Җв”Җ
        const seenPairs = new Set();
        let attempts = 0;
        const MAX_ATTEMPTS = count * 20;
        while(qs.length < count && attempts < MAX_ATTEMPTS){
          attempts++;
          let q;
          if(wsType==='gcd')       q = genGCDQuestion(gcdMin, gcdMax);
          else if(wsType==='lcm')  q = genLCMQuestion(lcmMin, lcmMax);
          else                     q = generate3By2Div();
          // нӮӨ: aмҷҖ bмқҳ мЎ°н•© (мҲңм„ң л¬ҙкҙҖ)
          const key = wsType==='div' ? `${q.a}-${q.b}` : `${Math.min(q.a,q.b)}-${Math.max(q.a,q.b)}`;
          if(!seenPairs.has(key)){
            seenPairs.add(key);
            qs.push(q);
          }
        }
        // fallback: мӨ‘ліө н—Ҳмҡ©н•ҳм—¬ лӮҳлЁём§Җ мұ„мҡ°кё°
        while(qs.length < count){
          if(wsType==='gcd')       qs.push(genGCDQuestion(gcdMin, gcdMax));
          else if(wsType==='lcm')  qs.push(genLCMQuestion(lcmMin, lcmMax));
          else                     qs.push(generate3By2Div());
        }
      }
      const ws={title:title.trim()||`${todayStr()} н•ҷмҠөм§Җ`,wsType,questions:qs,createdAt:new Date()};
      await db.collection('worksheets').add(ws);setTitle('');showToast('вң… л¬ём ңм§Җ мғқм„ұ мҷ„лЈҢ!');loadWsList();
    }catch(e){showToast('вқҢ мғқм„ұ мӢӨнҢЁ. мқён„°л„·мқ„ нҷ•мқён•ҳм„ёмҡ”.')}setLoading(false);
  };
  
const del=async(id)=>{if(!confirm('мқҙ л¬ём ңм§ҖлҘј мӮӯм ңн•ҳмӢңкІ мҠөлӢҲк№Ң?'))return;try{await db.collection('worksheets').doc(id).delete();showToast('рҹ—‘пёҸ мӮӯм ңлҗҳм—ҲмҠөлӢҲлӢӨ.');loadWsList()}catch(e){}};

  // в”Җв”Җ мҳӨн”„лқјмқё н•ҷмҠөм§Җ мұ„м җ м ңм¶ң н•ЁмҲҳ в”Җв”Җ
  const submitGrades = async () => {

       let qTxt = isStory ? q.txt : (q.type==='gcd' ? `${q.a}мҷҖ ${q.b} мөңлҢҖкіөм•ҪмҲҳ` : (q.type==='lcm' ? `${q.a}мҷҖ ${q.b} мөңмҶҢкіөл°°мҲҳ` : `${q.a} Г· ${q.b}`));
       let cAns = isStory ? q.ans : (q.type==='gcd' ? q.gcdVal : (q.type==='lcm' ? q.lcmVal : `лӘ« ${q.q}, лӮҳлЁём§Җ ${q.r}`));
       let isOk = !!grades[i]; // мІҙнҒ¬н–Ҳмңјл©ҙ true, м•„лӢҲл©ҙ false
       return {
           qTxt, 
           uAns: isOk ? 'м •лӢө' : 'мҳӨлӢө (м„ мғқлӢҳ мұ„м җ)',
           cAns: String(cAns),

       };

    const correctCount = qs.filter(q => q.isOk).length;

    } catch(e) { alert('кё°лЎқ м ҖмһҘ мӨ‘ мҳӨлҘҳк°Җ л°ңмғқн–ҲмҠөлӢҲлӢӨ.'); }
  };

  // в”Җв”Җ лӘЁмқҳкі мӮ¬ л¬ём ңм§Җ лҜёлҰ¬ліҙкё° нҷ”л©ҙ в”Җв”Җ
  if(examSheet){
    const ORD=['в‘ ','в‘Ў','в‘ў','в‘Ј'];
    return(<div className="p-4 pb-36 space-y-4">
      <button onClick={()=>setExamSheet(null)} className="text-gray-500 font-bold text-sm">вҶҗ л’ӨлЎң</button>

function StudentFeedbackPanel(){
  const[msgs,setMsgs]=React.useState([]);const[loading,setLoading]=React.useState(false);

  React.useEffect(()=>{load();},[]);
  const fmtTime=ts=>{if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ko-KR')+' '+d.toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});};
  const markRead=async(id)=>{try{await db.collection('studentFeedback').doc(id).set({read:true},{merge:true});setMsgs(prev=>prev.map(m=>m.id===id?{...m,read:true}:m));}catch(e){}};
  const del=async(id)=>{if(!confirm('мқҙ мқҳкІ¬мқ„ мӮӯм ңн• к№Ңмҡ”?'))return;try{await db.collection('studentFeedback').doc(id).delete();setMsgs(prev=>prev.filter(m=>m.id!==id));}catch(e){alert('мӮӯм ң мӢӨнҢЁ');}};

    {msgs.map(m=><div key={m.id} className={`border rounded-2xl p-3.5 mb-2.5 ${m.read?'border-gray-100 bg-gray-50':'border-indigo-200 bg-indigo-50'}`}>
      <div className="flex items-center gap-2 mb-1.5 flex-wrap">
        <span className="font-black text-gray-800 text-sm">рҹ‘Ө {m.studentName}</span>
        {!m.read&&<span className="text-[11px] bg-indigo-500 text-white font-bold px-2 py-0.5 rounded-full">NEW</span>}
        <span className="text-[11px] text-gray-400 ml-auto">{fmtTime(m.sentAt)}</span>
      </div>

      <div className="flex gap-2 mt-2.5 justify-end">

  const[loading,setLoading]=useState(false);
  const[feedbacks,setFeedbacks]=useState([]);
  const[sent,setSent]=useState(false);
  const[editFbId,setEditFbId]=useState(null);
  const[editFbText,setEditFbText]=useState('');

  const search=async()=>{
    if(!sid.trim())return;
    setLoading(true);
    try{
      const doc=await db.collection('users').doc(sid.trim()).get();
      if(doc.exists && doc.data().role!=='admin'){
        setStudent(doc.data());
        const fbSnap=await db.collection('feedback').where('studentName','==',sid.trim()).get();
        let arr=[];
        fbSnap.forEach(d=>arr.push({id:d.id, ...d.data()}));
        arr.sort((a, b) => {
          const timeA = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : new Date(a.createdAt).getTime();
          const timeB = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : new Date(b.createdAt).getTime();
          return timeB - timeA;
        });
        setFeedbacks(arr.slice(0, 10));
        setRelatedLogIdx(''); 
      }else{
        alert('н•ҙлӢ№ н•ҷмғқмқ„ м°ҫмқ„ мҲҳ м—Ҷкұ°лӮҳ м„ мғқлӢҳ кі„м •мһ…лӢҲлӢӨ.');

      alert('кІҖмғү мӢӨнҢЁ: ' + e.message);
    }
    setLoading(false);
  };

  const send=async()=>{
    if(!msg.trim())return;
    try{
      let logStr = '';
      if(relatedLogIdx !== '' && student?.logs?.[relatedLogIdx]) {
         const l = student.logs[relatedLogIdx];
         logStr = `${fmtDate(l.date)} ${l.time} | ${l.type} | м җмҲҳ: ${l.score}`;
      }
      await db.collection('feedback').add({
        studentName: sid.trim(),
        message: msg.trim(),
        relatedLog: logStr, // н…ҚмҠӨнҠё кј¬лҰ¬н‘ңлЎң м ҖмһҘ
        read: false, 
        createdAt: new Date()
      });
      setMsg(''); setRelatedLogIdx(''); setSent(true);
      setTimeout(()=>setSent(false), 2000);
      search(); 
    }catch(e){
      alert('н”јл“ңл°ұ м ҖмһҘ мӢӨнҢЁ: ' + e.message);
    }
  };

      await db.collection('feedback').doc(id).delete();
      search();

      alert('мӮӯм ң мӢӨнҢЁ: ' + e.message);

  const startFbEdit=(fb)=>{setEditFbId(fb.id);setEditFbText(fb.message);};

    if(!editFbText.trim())return;
    try{
      await db.collection('feedback').doc(id).set({message:editFbText.trim()},{merge:true});
      setEditFbId(null);setEditFbText('');
      search();

        {feedbacks.length>0&&<div className="mt-6"><div className="text-sm font-bold text-gray-600 mb-3">рҹ“¬ ліҙлӮё н”јл“ңл°ұ кё°лЎқ</div>

            </div>
            {fb.relatedLog && <div className="text-[11px] text-indigo-600 font-black mb-2 inline-block bg-white px-2 py-1 rounded-lg border border-indigo-100 break-keep">кҙҖл Ё: {fb.relatedLog}</div>}
            {editFbId===fb.id?(
              <div className="space-y-2">
                <textarea value={editFbText} onChange={e=>setEditFbText(e.target.value)} rows={3} className="w-full border-2 border-indigo-200 rounded-xl px-3 py-2 text-base font-bold resize-none outline-none focus:border-indigo-400"/>
                <div className="flex gap-2">
                  <button onClick={()=>saveFbEdit(fb.id)} className="flex-1 py-2.5 bg-indigo-500 text-white rounded-xl font-bold text-sm">м ҖмһҘ</button>
                  <button onClick={()=>setEditFbId(null)} className="flex-1 py-2.5 bg-gray-200 text-gray-600 rounded-xl font-bold text-sm">м·ЁмҶҢ</button>
                </div>

            ):(
              <>
                <div className="text-gray-800 font-bold text-base leading-relaxed break-keep">{fb.message}</div>
                <div className="flex gap-2 mt-3 justify-end">
                  {!fb.read&&<button onClick={()=>startFbEdit(fb)} className="text-[11px] px-3 py-1.5 bg-indigo-50 text-indigo-600 rounded-lg font-bold">вңҸпёҸ мҲҳм •</button>}
                  <button onClick={()=>deleteFb(fb.id)} className="text-[11px] px-3 py-1.5 bg-red-50 text-red-500 rounded-lg font-bold">рҹ—‘пёҸ мӮӯм ң</button>
                </div>
                {!fb.read&&<div className="text-[10px] text-gray-400 mt-1.5 text-right">м•„м§Ғ м•Ҳ мқҪм—Ҳмқ„ л•Ңл§Ң мҲҳм •н•  мҲҳ мһҲм–ҙмҡ”</div>}
              </>
            )}
          </div>)}
        </div>}
      </div>}
    </div>
  </div>);
}
